<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="gcoin-page-title">G Coin Airdrop Guide - MGL Signal</title>
    <link rel="icon" type="image/png" href="/static/new/images/logogo1.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 'dark': '#05070a', 'dark-blue': '#0f1217', 'gold': '#c5a059', 'border': '#1f242d' }
                    },
                    fontFamily: { 'inter': ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/main_style.css">
</head>
<body class="bg-brand-dark text-white font-inter flex flex-col min-h-screen">
    <script src="/static/js/main_translate.js"></script>
    <script src="/static/js/header.js"></script>

    <main class="flex-grow pt-24 pb-12 px-6">
        <div class="max-w-4xl mx-auto">
            <div class="text-center mb-16">
                <h1 data-i18n="gcoin-main-title" class="text-3xl md:text-5xl font-black uppercase tracking-tight text-white mb-4">
                    G Coin <span class="text-brand-gold italic">Airdrop Guide</span>
                </h1>
                <div class="w-20 h-1 bg-brand-gold mx-auto mt-6"></div>
            </div>

            <div class="bg-brand-dark-blue border border-brand-border rounded-xl p-8 md:p-12 shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 right-0 w-64 h-64 bg-blue-500 opacity-5 blur-[100px] -mr-16 -mt-16"></div>
                
                <div class="relative z-10 space-y-8 text-gray-300 leading-relaxed">
                    <img src="/static/images/gcoin.jpg" alt="G Coin Airdrop" class="w-full max-w-2xl mx-auto rounded-xl border border-brand-border shadow-lg">

                    <section>
                        <h2 data-i18n="gcoin-what-is-title" class="text-xl font-bold text-white mb-4"></h2>
                        <p data-i18n="gcoin-what-is-desc1" class="text-sm mb-4"></p>
                        <p data-i18n="gcoin-what-is-desc2" class="text-sm"></p>
                    </section>

                    <div class="border-t border-brand-border pt-8">
                        <h2 data-i18n="gcoin-details-title" class="text-xl font-bold text-brand-gold mb-4"></h2>
                        <div class="space-y-3 text-sm">
                            <p data-i18n="gcoin-details-1"></p>
                            <p data-i18n="gcoin-details-2"></p>
                            <p data-i18n="gcoin-details-3"></p>
                            <p data-i18n="gcoin-details-4"></p>
                        </div>
                    </div>

                    <div class="border-t border-brand-border pt-8">
                        <h2 data-i18n="gcoin-how-to-title" class="text-xl font-bold text-brand-gold mb-4"></h2>
                        <p data-i18n="gcoin-how-to-desc" class="mb-4 text-sm italic"></p>
                        <ul class="space-y-3 text-sm">
                            <li data-i18n="gcoin-step-1" class="flex items-start"></li>
                            <li data-i18n="gcoin-step-2" class="flex items-start"></li>
                            <li data-i18n="gcoin-step-3" class="flex items-start"></li>
                            <li data-i18n="gcoin-step-4" class="flex items-start"></li>
                            <li data-i18n="gcoin-step-5" class="flex items-start"></li>
                            <li data-i18n="gcoin-step-8" class="flex items-start"></li>
                        </ul>
                    </div>

                    <div class="border-t border-brand-border pt-8">
                        <h2 data-i18n="gcoin-faq-title" class="text-xl font-bold text-white mb-4"></h2>
                        <div class="space-y-6">
                            <div class="bg-black/20 p-4 rounded-lg border border-brand-border"><p data-i18n="gcoin-faq-1" class="text-xs"></p></div>
                            <div class="bg-black/20 p-4 rounded-lg border border-brand-border"><p data-i18n="gcoin-faq-2" class="text-xs"></p></div>
                            <div class="bg-black/20 p-4 rounded-lg border border-brand-border"><p data-i18n="gcoin-faq-3" class="text-xs"></p></div>
                            <div class="bg-black/20 p-4 rounded-lg border border-brand-border"><p data-i18n="gcoin-faq-4" class="text-xs"></p></div>
                        </div>
                    </div>

                    <div class="border-t border-brand-border pt-8">
                        <h2 data-i18n="gcoin-conc-title" class="text-xl font-bold text-white mb-4"></h2>
                        <p data-i18n="gcoin-conc-1" class="text-sm mb-4"></p>
                        <p data-i18n="gcoin-conc-2" class="text-sm mb-4"></p>
                        <p data-i18n="gcoin-conc-3" class="text-sm"></p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="/static/js/footer.js"></script>
    <script src="/static/lock.js"></script>
</body>
</html>
