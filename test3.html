<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGL Signal - Stable Supabase Chart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { 'dark': '#05070a', 'dark-blue': '#0f1217', 'gold': '#c5a059', 'border': '#1f242d' } }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-dark text-white p-6 min-h-screen">

    <div class="max-w-7xl mx-auto flex flex-col gap-4">
        <!-- Удирдлага -->
        <div class="flex items-center gap-4 p-4 bg-brand-dark-blue border border-brand-border rounded-xl shadow-lg">
            <div class="flex items-center space-x-2">
                <span class="text-xs font-bold text-gray-400 uppercase">Engine:</span>
                <span class="bg-blue-500/10 text-blue-500 border border-blue-500/20 px-3 py-1 rounded text-xs font-black uppercase">Supabase Stable Live</span>
            </div>
            <div class="flex items-center space-x-2">
                <label for="coin" class="text-gray-500 font-bold uppercase text-[10px]">Pair:</label>
                <input type="text" id="coin" value="BTCUSDT" class="bg-brand-dark border border-brand-border text-white rounded px-3 py-1.5 w-32 uppercase font-bold text-xs" />
            </div>
            <div class="ml-auto flex items-center space-x-2 bg-black/40 px-3 py-1.5 rounded-lg border border-brand-border">
                <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                <span class="text-[9px] font-black uppercase text-green-500">SYNCED</span>
            </div>
        </div>

        <!-- Canvas Чарт -->
        <div id="chart-wrapper" class="relative w-full h-[600px] bg-[#05070a] border border-brand-border rounded-xl overflow-hidden">
            <canvas id="chart" class="block w-full h-full cursor-crosshair"></canvas>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const canvas = document.getElementById("chart");
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        
        const coinEl = document.getElementById("coin");
        let symbol = "BTCUSDT";
        let allData = [];
        let visibleCount = 80;
        let offset = 0;
        let dragging = false;
        let lastX = 0;
        let priceOffset = 0;

        // 🚨 ЧИНИЙ SUPABASE ТОХИРГОО (Үүнийг өөрийнхөөрөө солиорой)
        const SUPABASE_URL = "https://bsdkbxyjwjljximdxdst.supabase.co"; 
        const SUPABASE_KEY = "чиний_нийтийн_anon_key"; // Түрүүн хуулж авсан анон түлхүүрээ тавиарай

        function resize() {
            if (canvas.parentElement) {
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = canvas.parentElement.clientHeight;
            }
            draw();
        }
        window.addEventListener("resize", resize);
        setTimeout(resize, 100);

        // 🔄 СУПАБЭЙСЭЭС ДАТА ТАТАХ (Блок хийгдэх ямар ч боломжгүй зам)
        async function fetchFromSupabase() {
            symbol = coinEl.value.toUpperCase().replace(/[^A-Z0-9]/g, '') || "BTCUSDT";
            
            // Чиний `market_data` эсвэл койн хадгалдаг таблицын нэрээр солино
            const url = `${SUPABASE_URL}/rest/v1/market_data?symbol=eq.${symbol}&order=timestamp.desc&limit=200`;

            try {
                const res = await fetch(url, {
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`
                    }
                });
                const supabaseData = await res.json();
                
                if (supabaseData && supabaseData.length > 0) {
                    // Супабэйсийн өгөгдлийг Canvas-ийн [Time, Open, High, Low, Close, Volume] формат руу гүйглэх
                    // Жишээ нь супабэйсийн баганы нэр чинь өөр бол d.open, d.high гэж солиорой
                    allData = supabaseData.map(d => [
                        new Date(d.timestamp).getTime(), 
                        Number(d.open), 
                        Number(d.high), 
                        Number(d.low), 
                        Number(d.close), 
                        Number(d.volume)
                    ]).reverse(); // Хуучныг нь урд нь гаргахын тулд reverse хийнэ
                    
                    draw();
                }
            } catch (e) {
                console.error("Supabase Fetch Error:", e);
            }
        }

        function draw() {
            if (!allData || !allData.length) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const padding = 40; const priceScaleWidth = 80;
            const chartHeight = canvas.height - padding * 2 - 30;
            const chartWidth = canvas.width - padding * 2 - priceScaleWidth;

            const end = allData.length - offset;
            const start = Math.max(0, end - visibleCount);
            const data = allData.slice(start, end);

            const prices = data.flatMap(d => [d[2], d[3]]);
            let maxPrice = Math.max(...prices);
            let minPrice = Math.min(...prices);

            const priceRange = maxPrice - minPrice;
            maxPrice += priceRange * 0.05 + priceOffset;
            minPrice -= priceRange * 0.05 - priceOffset;

            const priceToY = p => padding + (maxPrice - p) / (maxPrice - minPrice) * chartHeight;
            const candleWidth = chartWidth / data.length;

            // Үнийн торлог
            ctx.font = "12px monospace"; ctx.strokeStyle = "#1f242d"; ctx.fillStyle = "#666";
            for (let i = 0; i <= 5; i++) {
                const price = minPrice + (i / 5) * (maxPrice - minPrice);
                const y = priceToY(price);
                ctx.beginPath(); ctx.moveTo(padding, y); ctx.lineTo(padding + chartWidth, y); ctx.stroke();
                ctx.fillText(price.toFixed(2), padding + chartWidth + 5, y + 4);
            }

            // Лаануудыг зурах
            data.forEach((d, i) => {
                const open = d[1], high = d[2], low = d[3], close = d[4];
                const x = padding + i * candleWidth;
                const yO = priceToY(open); const yC = priceToY(close);
                const yH = priceToY(high); const yL = priceToY(low);
                const bull = close >= open;

                ctx.strokeStyle = bull ? "#0ecb81" : "#ff3b30";
                ctx.fillStyle = bull ? "#0ecb81" : "#ff3b30";

                ctx.beginPath(); ctx.moveTo(x + candleWidth / 2, yH); ctx.lineTo(x + candleWidth / 2, yL); ctx.stroke();
                ctx.fillRect(x + candleWidth * 0.2, Math.min(yO, yC), candleWidth * 0.6, Math.max(1, Math.abs(yO - yC)));
            });

            // Амьд үнийн шар шугам
            const lastClose = allData[allData.length - 1][4];
            const yLast = priceToY(lastClose);
            ctx.setLineDash([4, 4]); ctx.strokeStyle = "#f0b90b";
            ctx.beginPath(); ctx.moveTo(padding, yLast); ctx.lineTo(padding + chartWidth, yLast); ctx.stroke();
            ctx.setLineDash([]); ctx.fillStyle = "#f0b90b";
            ctx.fillText(lastClose.toFixed(2), padding + chartWidth + 5, yLast - 4);
        }

        coinEl.addEventListener("change", fetchFromSupabase);
        canvas.addEventListener("mousedown", e => { dragging = true; lastX = e.clientX; });
        canvas.addEventListener("mouseup", () => { dragging = false; });
        canvas.addEventListener("mousemove", e => {
            if (dragging) {
                const dx = e.clientX - lastX;
                offset = Math.max(0, Math.min(allData.length - visibleCount, offset + Math.round(dx / 10)));
                lastX = e.clientX;
                draw();
            }
        });

        // Анхны дуудлага
        fetchFromSupabase();
        
        // 🚨 5 СЕКУНД ТУТАМД СУПАБЭЙСЭЭС ШИНЭ ДАТА ШАЛГАЖ ЧАРТЫГ АМЬД БОЛГОНО
        setInterval(fetchFromSupabase, 5000);
    });
    </script>
</body>
</html>
