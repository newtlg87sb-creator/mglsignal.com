<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuCoin Pro Terminal - MGL Signal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #05070a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .terminal-table { border-collapse: separate; border-spacing: 0; width: 100%; }
        .terminal-table th { position: sticky; top: 0; background: #1e293b; z-index: 40; border-bottom: 2px solid #0f172a; }
        .group-header { background: #1e293b; color: #fbbf24; font-weight: 900; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; }
        .news-scroll::-webkit-scrollbar { width: 4px; }
        .news-scroll::-webkit-scrollbar-track { background: #0f172a; }
        .news-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        tr:nth-child(even) { background-color: rgba(30, 41, 59, 0.3); }
        .cell-mono { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 13px; }
    </style>
</head>
<body class="p-4 md:p-6">
    <div class="max-w-[1400px] mx-auto space-y-4">
        
        <!-- Top Control Bar -->
        <header class="bg-[#0f172a] border border-[#1e293b] p-4 rounded-xl flex flex-col md:flex-row justify-between items-center gap-4 shadow-2xl">
            <div class="flex items-center space-x-4">
                <h1 class="text-xl font-black text-[#38bdf8] tracking-tighter uppercase flex items-center">
                    <i class="fas fa-microchip mr-3 animate-pulse"></i> KuCoin Terminal
                </h1>
                <div id="sentiment-badge" class="px-3 py-1 rounded bg-[#1e293b] border border-[#334155] text-[10px] font-black uppercase flex items-center gap-1">
                    <select id="sentiment-type-selector" onchange="onSentimentTypeChange()" class="bg-transparent text-white outline-none cursor-pointer appearance-none pr-4">
                        <option value="client_real_change">Real%</option>
                        <option value="h1_change">1H%</option>
                    </select>
                    <i class="fas fa-caret-down text-gray-400 text-[8px] -ml-3 pointer-events-none"></i>
                    <span id="sentiment-text" class="ml-2">📡 Scanning...</span>
                </div>
            </div>

            <div class="flex flex-wrap items-center gap-3">
                <!-- Search -->
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-xs pointer-events-none"></i>
                    <input type="text" id="symbol-search" placeholder="Search Symbols..." class="bg-[#05070a] border border-[#334155] rounded-lg py-1.5 pl-9 pr-4 text-xs focus:border-[#38bdf8] outline-none transition w-32 md:w-44 text-white">
                </div>

                <!-- Hide Filters -->
                <div class="flex flex-wrap gap-1 bg-[#05070a] border border-[#334155] rounded-lg p-0.5 mr-2">
                    <button onclick="toggleHide('blacklist')" id="btn-blacklist" class="px-2 py-1 rounded text-[9px] font-bold uppercase transition bg-[#334155] text-white">Show BL</button>
                    <button onclick="toggleHide('lowVol')" id="btn-lowVol" class="px-2 py-1 rounded text-[9px] font-bold uppercase transition bg-[#334155] text-white">Show LV</button>
                    <button onclick="toggleHide('highSpr')" id="btn-highSpr" class="px-2 py-1 rounded text-[9px] font-bold uppercase transition bg-[#334155] text-white">Show HS</button>
                    <button onclick="toggleHide('minHigh')" id="btn-minHigh" class="px-2 py-1 rounded text-[9px] font-bold uppercase transition bg-[#334155] text-white">Show MH</button>
                    <button onclick="toggleHide('limitHigh')" id="btn-limitHigh" class="px-2 py-1 rounded text-[9px] font-bold uppercase transition bg-[#334155] text-white">Show LH</button>
                    <button onclick="resetSessionPrices()" class="px-2 py-1 rounded text-[9px] font-bold uppercase bg-brand-gold text-black ml-1">Reset Real%</button>
                </div>

                <div id="last-sync" class="text-[10px] font-mono text-gray-500">Initializing...</div>
            </div>
        </header>

        <!-- Main Table Area -->
        <div class="bg-[#0f172a] border border-[#1e293b] rounded-xl overflow-hidden shadow-2xl overflow-x-auto overflow-y-auto news-scroll" style="max-height: calc(100vh - 220px);">
            <table class="terminal-table text-left">
                <thead>
                    <tr class="text-[10px] text-gray-400 uppercase font-black tracking-widest">
                        <th class="p-4 w-12 text-center">#</th>
                        <th class="p-4 cursor-pointer hover:text-white" onclick="updateSort('symbol')">Symbol <i class="fas fa-sort ml-1"></i></th>
                        <th class="p-4 cursor-pointer hover:text-white" onclick="updateSort('ask')">Bid Price <i class="fas fa-sort ml-1"></i></th>
                        <th class="p-4 cursor-pointer hover:text-white" onclick="updateSort('ask')">Ask Price <i class="fas fa-sort ml-1"></i></th>
                        <th class="p-4 cursor-pointer hover:text-white" onclick="updateSort('spread')">Spread <i class="fas fa-sort ml-1"></i></th>
                        <th class="p-4 cursor-pointer hover:text-white" onclick="updateSort('min_usdt')">Min $ <i class="fas fa-sort ml-1"></i></th>
                        <th class="p-4 cursor-pointer hover:text-white" onclick="updateSort('real_change')">Real% <i class="fas fa-sort ml-1"></i></th>
                        <th class="p-4 cursor-pointer hover:text-white" onclick="updateSort('h1_change')">1H% <i class="fas fa-sort ml-1"></i></th>
                        <th class="p-4 cursor-pointer hover:text-white" onclick="updateSort('change_24h')">24H% <i class="fas fa-sort ml-1"></i></th>
                        <th class="p-4 cursor-pointer hover:text-white" onclick="updateSort('volume')">Volume <i class="fas fa-sort ml-1"></i></th>
                        <th class="p-4 cursor-pointer hover:text-white" onclick="updateSort('min_order_cost')">Limit $ <i class="fas fa-sort ml-1"></i></th>
                    </tr>
                </thead>
                <tbody id="market-body" class="cell-mono">
                    <!-- Data rows injected by JS -->
                </tbody>
            </table>
        </div>

    </div>

    <script>
        const SUPABASE_URL = "https://bsdkbxyjwjljximdxdst.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzZGtieHlqd2psanhpbWR4ZHN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzODg1MTQsImV4cCI6MjA5MDk2NDUxNH0.Qwfpd0cEaAKwlv5B-Uh0MlTLR-WH8qt19HHlTxUnUYs";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allData = [];
        let sessionInitialPrices = {}; // For client-side Real% calculation, reset by user
        let currentSort = { col: 'real_change', desc: true };
        let hideSettings = { 
            blacklist: false, // Default: Blacklist is SHOWN (not hidden)
            lowVol: false,    // Default: Low Volume is SHOWN
            highSpr: false,   // Default: High Spread is SHOWN
            minHigh: false,   // Default: Min High is SHOWN
            limitHigh: false  // Default: Limit High is SHOWN
        };
        const blacklist = ['LUNC-USDT', 'USTC-USDT', 'BSV-USDT']; // Example blacklist
        let sentimentType = 'real_change'; // Тооцооллыг харагдах Real% баганатай ижил болгов

        function getButtonText(type, isHidden) { // isHidden is the value of hideSettings[type]
            const texts = { blacklist: 'BL', lowVol: 'LV', highSpr: 'HS', minHigh: 'MH', limitHigh: 'LH' };
            return `${isHidden ? 'Show' : 'Hide'} ${texts[type]}`;
        }

        function updateButtonState(id, isHidden) {
            const btn = document.getElementById(id);
            if (btn) {
                const type = id.replace('btn-', '');
                btn.textContent = getButtonText(type, isHidden);
                btn.className = `px-2 py-1 rounded text-[9px] font-bold uppercase transition ${isHidden ? 'bg-[#05070a] text-gray-500 border border-[#334155] hover:bg-[#334155]/50' : 'bg-[#334155] text-white'}`;
            }
        }

        function toggleHide(type) {
            hideSettings[type] = !hideSettings[type]; // Toggle the hidden state
            updateButtonState(`btn-${type}`, hideSettings[type]); // Update button appearance
            renderUI();
        }

        function updateSort(col) {
            if(currentSort.col === col) currentSort.desc = !currentSort.desc;
            else { currentSort.col = col; currentSort.desc = true; }
            renderUI();
        }

        function resetSessionPrices() {
            sessionInitialPrices = {}; // Clear previous initial prices
            allData.forEach(d => { // Set current ask price as new initial price for all coins
                sessionInitialPrices[d.symbol] = d.ask;
            });
            renderUI(); // Re-render the UI with new Real% calculations
        }

        function onSentimentTypeChange() {
            sentimentType = document.getElementById('sentiment-type-selector').value;
            renderUI();
        }

        async function fetchMarketData() {
            try {
                const { data, error } = await supabaseClient.from('market_data').select('*');
                if (error) throw error;
                allData = data;

                // Initialize sessionInitialPrices for new symbols
                allData.forEach(d => {
                    if (!sessionInitialPrices[d.symbol]) {
                        sessionInitialPrices[d.symbol] = d.ask;
                    }
                });

                renderUI();
                document.getElementById('last-sync').innerText = "Last Sync: " + new Date().toLocaleTimeString();
            } catch (err) { console.error("Fetch Error:", err); }
        }

        function renderUI() {
            // 0. Pre-process data for client-side Real%
            allData.forEach(d => {
                const initialPrice = sessionInitialPrices[d.symbol] || d.ask;
                d.client_real_change = initialPrice > 0 ? ((d.ask - initialPrice) / initialPrice * 100) : 0;
            });

            const tbody = document.getElementById('market-body');
            const search = document.getElementById('symbol-search').value.toUpperCase();
            const sentimentTextSpan = document.getElementById('sentiment-text');
            
            // 1. Apply search filter
            let searchedData = allData.filter(d => d.symbol.includes(search) && d.symbol.includes('-'));

            // 2. Apply visibility filters to get the final set of visible coins
            let visibleCoins = searchedData.filter(d => {
                if (hideSettings.blacklist && blacklist.includes(d.symbol)) return false;
                if (hideSettings.highSpr && d.spread > 0.3) return false;
                if (hideSettings.lowVol && d.volume < 30000) return false;
                if (hideSettings.minHigh && d.min_usdt > 0.11) return false;
                if (hideSettings.limitHigh && d.min_order_cost > 0.1) return false;
                return true;
            });
            
            // 3. Calculate totals for sentiment and footer from the 'visibleCoins'
            let totals = { real: 0, h1: 0, c24: 0, ups: 0, dns: 0, count: visibleCoins.length };
            visibleCoins.forEach(d => {
                totals.real += d.client_real_change;
                totals.h1 += d.h1_change;
                totals.c24 += d.change_24h;
                
                const sentVal = d[sentimentType];
                if(sentVal > 0.5) totals.ups++;
                if(sentVal < -0.5) totals.dns++;
            });

            // 4. Sort the visible coins
            visibleCoins.sort((a, b) => {
                const valA = a[currentSort.col] !== undefined && a[currentSort.col] !== null ? a[currentSort.col] : (currentSort.desc ? -Infinity : Infinity);
                const valB = b[currentSort.col] !== undefined && b[currentSort.col] !== null ? b[currentSort.col] : (currentSort.desc ? -Infinity : Infinity);
                return currentSort.desc ? (valB - valA) : (valA - valB);
            });

            // 5. Categorization Logic for rendering (using visibleCoins)
            const groups = {
                ST: { title: "🚫 BLACKLISTED / ST RISK", list: [], color: "bg-[#7f1d1d]" },
                HIGH_SPR: { title: "⚠️ HIGH SPREAD (>0.3%)", list: [], color: "bg-[#92400e]" },
                LOW_VOL: { title: "📉 VOLUME LOW (<30K)", list: [], color: "bg-[#4c1d95]" },
                MIN_HIGH: { title: "⚖️ MINIMUM HIGH (>0.11)", list: [], color: "bg-[#334155]" },
                LIMIT_HIGH: { title: "🚧 LIMIT HIGH (>0.1)", list: [], color: "bg-[#4b5563]" },
                MARKET: { title: "📊 MARKET LIST", list: [], color: "bg-[#334155]" }
            };

            visibleCoins.forEach(d => {
                if (blacklist.includes(d.symbol)) groups.ST.list.push(d);
                else if (d.spread > 0.3) groups.HIGH_SPR.list.push(d);
                else if (d.volume < 30000) groups.LOW_VOL.list.push(d);
                else if (d.min_usdt > 0.11) groups.MIN_HIGH.list.push(d);
                else if (d.min_order_cost > 0.1) groups.LIMIT_HIGH.list.push(d);
                else groups.MARKET.list.push(d);
            });

            tbody.innerHTML = '';
            let idx = 1;

            Object.values(groups).forEach(g => {
                if (g.list.length === 0) return;

                // Group Header
                const hRow = document.createElement('tr');
                hRow.innerHTML = `<td colspan="11" class="group-header p-2 px-4 ${g.color} text-white font-black">${g.title} (${g.list.length})</td>`;
                tbody.appendChild(hRow);

                g.list.forEach(d => {
                    const rRow = document.createElement('tr');
                    rRow.className = "hover:bg-[#1e293b] transition duration-150";
                    
                    const realColor = (d.real_change || 0) >= 0 ? 'text-[#fbbf24]' : 'text-[#ef4444]';
                    const h1Color = (d.h1_change || 0) >= 0 ? 'text-[#38bdf8]' : 'text-[#fb7185]';
                    const chColor = (d.change_24h || 0) >= 0 ? 'text-[#22c55e]' : 'text-[#ef4444]';
                    const minUsdtColor = (d.min_usdt || 0) <= 0.11 ? 'text-[#22c55e]' : 'text-gray-400'; // Use (d.min_usdt || 0) for safety
                    const limitColor = (d.min_order_cost || 0) <= 0.1 ? 'text-[#22c55e]' : 'text-gray-400'; // Use (d.min_order_cost || 0) for safety
                    
                    rRow.innerHTML = `
                        <td class="p-3 text-center text-gray-600 text-[10px] border-b border-[#1e293b]">${idx++}</td>
                        <td class="p-3 font-bold text-white border-b border-[#1e293b]">${d.symbol}</td>
                        <td class="p-3 text-gray-400 border-b border-[#1e293b]">${(d.bid || 0).toFixed(8)}</td>
                        <td class="p-3 text-white border-b border-[#1e293b]">${(d.ask || 0).toFixed(8)}</td>
                        <td class="p-3 ${(d.spread || 0) > 0.3 ? 'text-[#fbbf24]' : 'text-gray-400'} border-b border-[#1e293b]">${(d.spread || 0).toFixed(2)}%</td>
                        <td class="p-3 ${minUsdtColor} border-b border-[#1e293b]">${(d.min_usdt || 0).toFixed(4)}</td> 
                        <td class="p-3 font-bold ${realColor} border-b border-[#1e293b]">${(d.real_change || 0) > 0 ? '+' : ''}${(d.real_change || 0).toFixed(2)}%</td>
                        <td class="p-3 font-bold ${h1Color} border-b border-[#1e293b]">${(d.h1_change || 0) > 0 ? '+' : ''}${(d.h1_change || 0).toFixed(2)}%</td>
                        <td class="p-3 font-bold ${chColor} border-b border-[#1e293b]">${(d.change_24h || 0) > 0 ? '+' : ''}${(d.change_24h || 0).toFixed(2)}%</td>
                        <td class="p-3 text-gray-500 border-b border-[#1e293b]">${formatVol(d.volume || 0)}</td>
                        <td class="p-3 ${limitColor} border-b border-[#1e293b]">${(d.min_order_cost || 0).toFixed(4)}</td>
                    `;
                    tbody.appendChild(rRow);
                });
            });

            // --- Хүснэгтийн доор нийлбэр мөрийг нэмэх (Totals Row) ---
            const tRow = document.createElement('tr');
            tRow.className = "bg-[#0f172a] font-black sticky bottom-0 z-20 border-t-2 border-brand-gold/50 shadow-[0_-4px_10px_rgba(0,0,0,0.5)]";
            
            const totalRealColor = totals.real >= 0 ? 'text-[#fbbf24]' : 'text-[#ef4444]';
            const totalH1Color = totals.h1 >= 0 ? 'text-[#38bdf8]' : 'text-[#fb7185]';
            const totalChColor = totals.c24 >= 0 ? 'text-[#22c55e]' : 'text-[#ef4444]';

            tRow.innerHTML = `
                <td class="p-3 text-center text-brand-gold text-[10px]">Σ</td>
                <td class="p-3 text-white uppercase tracking-widest text-[10px]">TOTALS (${totals.count})</td>
                <td colspan="4"></td>
                <td class="p-3 font-black text-lg ${totalRealColor}">${totals.real > 0 ? '+' : ''}${totals.real.toFixed(2)}%</td>
                <td class="p-3 font-black text-lg ${totalH1Color}">${totals.h1 > 0 ? '+' : ''}${totals.h1.toFixed(2)}%</td>
                <td class="p-3 font-black text-lg ${totalChColor}">${totals.c24 > 0 ? '+' : ''}${totals.c24.toFixed(2)}%</td>
                <td colspan="2"></td>
            `;
            tbody.appendChild(tRow);

            updateSentiment(totals);
        }

        function updateSentiment(t) {
            const badge = document.getElementById('sentiment-text');
            let text, color;
            
            if (t.ups > t.dns * 3 && t.ups > 5) { text = "🚀 Strong Bull"; color = "text-[#22c55e] border-[#22c55e]/30 bg-[#22c55e]/10"; }
            else if (t.ups > t.dns * 1.5) { text = "📈 Bullish"; color = "text-[#4ade80] border-[#4ade80]/30 bg-[#4ade80]/10"; }
            else if (t.dns > t.ups * 1.5) { text = "📉 Bearish"; color = "text-[#f87171] border-[#f87171]/30 bg-[#f87171]/10"; }
            else { text = "⚖️ Flat Market"; color = "text-gray-400"; }

            badge.className = `ml-2 transition-all duration-500 ${color}`;
            badge.innerText = `${text} (U:${t.ups} D:${t.dns})`; // Update only the span
        }

        function formatVol(vol) {
            if (vol >= 1000000) return (vol / 1000000).toFixed(1) + 'M';
            if (vol >= 1000) return (vol / 1000).toFixed(1) + 'K';
            return vol.toFixed(0);
        }

        document.addEventListener('DOMContentLoaded', () => {
            Object.keys(hideSettings).forEach(type => { // Initialize button states based on hideSettings
                updateButtonState(`btn-${type}`, hideSettings[type]);
            }); 
        });

        document.getElementById('symbol-search').addEventListener('input', renderUI);
        
        fetchMarketData();
        setInterval(fetchMarketData, 5000);
    </script>
</body>
</html>
