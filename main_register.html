<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бүртгүүлэх - MGL Signal</title>

    <meta name="description" content="Register a new account on MGL Signal.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://mglsignal.com/main_register.html"> 

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="icon" type="image/png" href="/static/new/images/logogo1.png">
    <link rel="apple-touch-icon" href="/static/new/images/logogo1.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 'dark': '#05070a', 'dark-blue': '#0f1217', 'gold': '#c5a059', 'border': '#1f242d' }
                    },
                    fontFamily: { 'inter': ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="/static/main_style.css">
</head>
<body class="bg-brand-dark text-white font-inter flex flex-col min-h-screen">

    <script>
        const pageTranslations = {
            mn: {
                "reg-title": "Бүртгүүлэх",
                "reg-subtitle": "MGL Signal-д нэгдэж амжилтаа эхлүүл",
                "lbl-username": "Хэрэглэгчийн нэр",
                "ph-username": "User123",
                "lbl-email": "Имэйл хаяг",
                "ph-email": "name@example.com",
                "lbl-password": "Нууц үг",
                "ph-password": "••••••••",
                "lbl-confirm-password": "Нууц үг давтах",
                "terms-link": "Үйлчилгээний нөхцөл",
                "terms-agree": "-ийг зөвшөөрч байна.",
                "btn-reg-submit": "Бүртгүүлэх",
                "text-has-account": "Бүртгэлтэй хэрэглэгч үү?",
                "link-login-now": "Нэвтрэх",
                "btn-loading": "Уншиж байна...",
                "msg-reg-success": "Амжилттай бүртгэгдлээ! {seconds} секундын дараа нэвтрэх хуудас руу шилжинэ."
            },
            en: {
                "reg-title": "Register",
                "reg-subtitle": "Join MGL Signal and start your success",
                "lbl-username": "Username",
                "ph-username": "User123",
                "lbl-email": "Email Address",
                "ph-email": "name@example.com",
                "lbl-password": "Password",
                "ph-password": "••••••••",
                "lbl-confirm-password": "Confirm Password",
                "terms-link": "Terms of Service",
                "terms-agree": "I agree to the",
                "btn-reg-submit": "Register",
                "text-has-account": "Already have an account?",
                "link-login-now": "Login",
                "btn-loading": "Loading...",
                "msg-reg-success": "Registration successful! Redirecting to login in {seconds} seconds."
            }
        };
        Object.keys(pageTranslations).forEach(lang => {
            if (!window.translations) window.translations = { mn: {}, en: {} };
            Object.assign(window.translations[lang], pageTranslations[lang]);
        });
    </script>
    <script src="/static/js/header.js"></script>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center pt-32 pb-20 px-4">
        <div class="w-full max-w-md bg-brand-dark-blue border border-brand-border rounded-xl p-8 shadow-2xl relative overflow-hidden">
            <!-- Decorative Element -->
            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-600 opacity-5 blur-[50px] -mr-16 -mt-16"></div>
            
            <div class="text-center mb-8 relative z-10">
                <h1 data-i18n="reg-title" class="text-2xl font-black uppercase tracking-wider text-white mb-2">Бүртгүүлэх</h1>
                <p data-i18n="reg-subtitle" class="text-xs text-gray-500">MGL Signal-д нэгдэж амжилтаа эхлүүл</p>
            </div>
            
            <form id="register-form" class="space-y-4 relative z-10">
                <div class="space-y-1">
                    <label data-i18n="lbl-username" for="username" class="text-[10px] font-bold uppercase text-gray-500 tracking-wider">Хэрэглэгчийн нэр</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-user text-gray-600 text-sm"></i>
                        </div>
                        <input type="text" id="username" name="username" required data-i18n-placeholder="ph-username" placeholder="User123" class="w-full bg-[#05070a] border border-brand-border rounded-lg py-3 pl-10 pr-3 text-sm focus:border-brand-gold focus:outline-none focus:ring-1 focus:ring-brand-gold transition text-white placeholder-gray-700">
                    </div>
                </div>

                <div class="space-y-1">
                    <label data-i18n="lbl-email" for="email" class="text-[10px] font-bold uppercase text-gray-500 tracking-wider">Имэйл хаяг</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-envelope text-gray-600 text-sm"></i>
                        </div>
                        <input type="email" id="email" name="email" required data-i18n-placeholder="ph-email" placeholder="name@example.com" class="w-full bg-[#05070a] border border-brand-border rounded-lg py-3 pl-10 pr-3 text-sm focus:border-brand-gold focus:outline-none focus:ring-1 focus:ring-brand-gold transition text-white placeholder-gray-700">
                    </div>
                </div>

                <div class="space-y-1">
                    <label data-i18n="lbl-password" for="password" class="text-[10px] font-bold uppercase text-gray-500 tracking-wider">Нууц үг</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-600 text-sm"></i>
                        </div>
                        <input type="password" id="password" name="password" required data-i18n-placeholder="ph-password" placeholder="••••••••" class="w-full bg-[#05070a] border border-brand-border rounded-lg py-3 pl-10 pr-3 text-sm focus:border-brand-gold focus:outline-none focus:ring-1 focus:ring-brand-gold transition text-white placeholder-gray-700">
                    </div>
                </div>

                <div class="space-y-1">
                    <label data-i18n="lbl-confirm-password" for="confirm-password" class="text-[10px] font-bold uppercase text-gray-500 tracking-wider">Нууц үг давтах</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-600 text-sm"></i>
                        </div>
                        <input type="password" id="confirm-password" name="confirm-password" required data-i18n-placeholder="ph-password" placeholder="••••••••" class="w-full bg-[#05070a] border border-brand-border rounded-lg py-3 pl-10 pr-3 text-sm focus:border-brand-gold focus:outline-none focus:ring-1 focus:ring-brand-gold transition text-white placeholder-gray-700">
                    </div>
                </div>

                <div class="flex items-center space-x-2 py-2">
                    <input type="checkbox" id="terms" required class="w-4 h-4 rounded border-gray-700 bg-[#05070a] text-brand-gold focus:ring-brand-gold/50">
                    <label for="terms" class="text-xs text-gray-500"><a data-i18n="terms-link" href="main_terms.html" target="_blank" class="text-brand-gold hover:underline">Үйлчилгээний нөхцөл</a> <span data-i18n="terms-agree">-ийг зөвшөөрч байна.</span></label>
                </div>

                <div id="error-message" class="hidden text-red-500 text-xs text-center bg-red-500/10 p-2 rounded border border-red-500/20"></div>

                <button type="submit" id="submit-btn" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-lg hover:bg-blue-500 transition transform hover:scale-[1.01] shadow-lg shadow-blue-600/20 uppercase text-xs tracking-widest flex justify-center items-center">
                    <span data-i18n="btn-reg-submit" id="btn-text">Бүртгүүлэх</span>
                    <i id="btn-spinner" class="fas fa-circle-notch fa-spin ml-2 hidden"></i>
                </button>
            </form>

            <div class="mt-8 text-center text-xs text-gray-500 relative z-10">
                <span data-i18n="text-has-account">Бүртгэлтэй хэрэглэгч үү?</span> <a data-i18n="link-login-now" href="main_login.html" class="text-brand-gold font-bold hover:underline ml-1">Нэвтрэх</a>
            </div>
        </div>
    </main>

    <script src="/static/js/footer.js"></script>

    <!-- Backend Integration Script -->
    <script>
        // 'header.js' дотор 'sb' нэртэй Supabase client үүсгэгдсэн байгаа тул тэрийг ашиглана.
        // Ингэснээр 'headers' алдаа болон 'GoTrueClient detected' анхааруулга арилна.
        const supabaseClient = sb;

        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.getElementById('register-form');
            const errorDiv = document.getElementById('error-message');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            const submitBtn = document.getElementById('submit-btn');

            registerForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const username = document.getElementById('username').value.trim();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirm-password').value;
                
                const currentLang = localStorage.getItem('lang') || 'mn';
                const t = (window.translations && window.translations[currentLang]) ? 
                    window.translations[currentLang] : 
                    { 'btn-loading': 'Уншиж байна...', 'msg-reg-success': 'Амжилттай бүртгүүллээ! {seconds} секундын дараа шилжинэ.', 'btn-reg-submit': 'Бүртгүүлэх' };

                if (password !== confirmPassword) {
                    showStatus('Нууц үгнүүд таарахгүй байна.', 'error');
                    return;
                }

                if (password.length < 6) {
                    showStatus('Нууц үг дор хаяж 6 тэмдэгт байх ёстой.', 'error');
                    return;
                }

                setLoading(true);

                try {
                    const { data, error } = await supabaseClient.auth.signUp({
                        email: email,
                        password: password,
                        options: {
                            data: { display_name: username, membership_type: 'free' }
                        }
                    });

                    if (error) throw error;

                    // Хүлээхгүйгээр шууд нэвтрэх хуудас руу
                    window.location.href = 'main_login.html';

                } catch (error) {
                    showStatus(error.message, 'error');
                    setLoading(false);
                }
            });

            function setLoading(isLoading) {
                btnText.textContent = isLoading ? (window.translations?.[localStorage.getItem('lang')]?.['btn-loading'] || 'Уншиж байна...') : (window.translations?.[localStorage.getItem('lang')]?.['btn-reg-submit'] || 'Бүртгүүлэх');
                btnSpinner.classList.toggle('hidden', !isLoading);
                submitBtn.disabled = isLoading;
                submitBtn.classList.toggle('opacity-75', isLoading);
                submitBtn.classList.toggle('cursor-not-allowed', isLoading);
                if (isLoading) errorDiv.classList.add('hidden');
            }

            function showStatus(message, type) {
                errorDiv.textContent = message;
                errorDiv.className = type === 'error' ? "text-red-500 text-xs text-center bg-red-500/10 p-2 rounded border border-red-500/20" : "text-green-500 text-xs text-center bg-green-500/10 p-2 rounded border border-green-500/20";
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
