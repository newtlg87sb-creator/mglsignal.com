<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нууц үг сэргээх - MGL Signal</title>
    <link rel="icon" type="image/png" href="/static/new/images/logogo1.png"> 
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 'dark': '#05070a', 'dark-blue': '#0f1217', 'gold': '#c5a059', 'border': '#1f242d' }
                    },
                    fontFamily: { 'inter': ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/main_style.css">
</head>
<body class="bg-brand-dark text-white font-inter flex flex-col min-h-screen">
    <script>
        const pageTranslations = {
            mn: {
                "fp-title": "Нууц үг сэргээх",
                "fp-subtitle": "Бүртгэлтэй имэйл хаягаа оруулна уу",
                "lbl-email": "Имэйл хаяг",
                "btn-send-link": "Холбоос илгээх"
            },
            en: {
                "fp-title": "Recover Password",
                "fp-subtitle": "Enter your registered email address",
                "lbl-email": "Email Address",
                "btn-send-link": "Send Reset Link"
            }
        };
        Object.keys(pageTranslations).forEach(lang => {
            if (!window.translations) window.translations = { mn: {}, en: {} };
            Object.assign(window.translations[lang], pageTranslations[lang]);
        });
    </script>
    <script src="/static/js/header.js"></script>

    <main class="flex-grow flex items-center justify-center pt-32 pb-20 px-4">
        <div class="w-full max-w-md bg-brand-dark-blue border border-brand-border rounded-xl p-8 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-brand-gold opacity-5 blur-[50px] -mr-16 -mt-16"></div>
            
            <div class="text-center mb-8 relative z-10">
                <h1 data-i18n="fp-title" class="text-2xl font-black uppercase tracking-wider text-white mb-2">Нууц үг сэргээх</h1>
                <p data-i18n="fp-subtitle" class="text-xs text-gray-500">Бүртгэлтэй имэйл хаягаа оруулна уу</p>
            </div>
            
            <form id="forgot-form" class="space-y-5 relative z-10">
                <div class="space-y-1">
                    <label data-i18n="lbl-email" for="email" class="text-[10px] font-bold uppercase text-gray-500 tracking-wider">Имэйл хаяг</label>
                    <input type="email" id="email" required class="w-full bg-[#05070a] border border-brand-border rounded-lg py-3 px-3 text-sm focus:border-brand-gold focus:outline-none transition text-white">
                </div>

                <div id="message-area" class="hidden text-xs text-center p-2 rounded border"></div>

                <button type="submit" id="submit-btn" class="w-full bg-brand-gold text-black font-bold py-3.5 rounded-lg hover:bg-white transition uppercase text-xs tracking-widest">
                    <span data-i18n="btn-send-link">Холбоос илгээх</span>
                </button>
            </form>
            <div class="mt-6 text-center text-xs">
                <a href="main_login.html" class="text-gray-500 hover:text-white">Буцах</a>
            </div>
        </div>
    </main>
    <script src="/static/js/footer.js"></script>
    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const msgArea = document.getElementById('message-area');
            const btn = document.getElementById('submit-btn');
            
            msgArea.classList.add('hidden');
            btn.disabled = true;
            btn.classList.add('opacity-50');

            try {
                // Supabase-ийн 'sb' client-ийг ашиглан нууц үг сэргээх хүсэлт илгээх
                // (header.js-д үүсгэгдсэн 'sb' объектыг ашиглана)
                const { error } = await sb.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/main_reset-password.html',
                });

                if (error) throw error;

                msgArea.classList.remove('hidden');
                msgArea.className = "text-green-500 bg-green-500/10 border-green-500/20 p-2 rounded text-center text-xs block";
                
                const currentLang = localStorage.getItem('lang') || 'mn';
                msgArea.textContent = currentLang === 'mn' 
                    ? "Нууц үг сэргээх холбоос таны имэйл рүү илгээгдлээ." 
                    : "Password reset link has been sent to your email.";

            } catch (err) {
                msgArea.classList.remove('hidden');
                msgArea.className = "text-red-500 bg-red-500/10 border-red-500/20 p-2 rounded text-center text-xs block";
                msgArea.textContent = err.message;
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }
        });
    </script>
</body>
</html>
