<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Pro Terminal - MGL Signal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 'dark': '#05070a', 'dark-blue': '#0f1217', 'gold': '#c5a059', 'border': '#1f242d' }
                    },
                    fontFamily: { 'inter': ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/main_style.css">
    <style>
        body { background-color: #05070a; color: #e2e8f0; }
        .terminal-table { border-collapse: separate; border-spacing: 0; width: 100%; }
        .terminal-table th { position: sticky; top: 0; background: #1e293b; z-index: 40; border-bottom: 2px solid #0f172a; }
        .group-header { background: #1e293b; color: #f3ba2f; font-weight: 900; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; }
        .news-scroll::-webkit-scrollbar { width: 4px; }
        .news-scroll::-webkit-scrollbar-track { background: #0f172a; }
        .news-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        tr:nth-child(even) { background-color: rgba(30, 41, 59, 0.3); }
        .cell-mono { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 13px; }
    </style>
</head>
<body class="bg-brand-dark text-white font-inter flex flex-col min-h-screen">

    <script src="/static/js/main_translate.js"></script>
    <script src="/static/js/header.js"></script>

    <main class="flex-grow pt-32 pb-12 px-4 md:px-6">
        <div class="max-w-[1400px] mx-auto space-y-4">
            
            <div class="flex flex-col gap-4 mb-6">
                <a href="exchanges.html" data-i18n="back-to-home" class="w-fit inline-flex items-center text-brand-gold hover:text-white transition text-xs font-bold uppercase tracking-widest">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Back to Terminals
                </a>
                <div class="bg-brand-gold/5 border border-brand-gold/10 rounded-lg p-3 flex items-start gap-3 max-w-2xl shadow-sm">
                    <i class="fas fa-lightbulb text-brand-gold mt-0.5 text-xs"></i>
                    <p data-i18n="terminal-reminder" class="text-[11px] text-gray-400 font-medium leading-relaxed italic"></p>
                </div>
            </div>

            <header class="bg-[#0f172a] border border-[#1e293b] p-4 rounded-xl flex flex-col md:flex-row justify-between items-center gap-4 shadow-2xl">
                <div class="flex items-center space-x-4">
                    <h1 class="text-xl font-black text-[#f3ba2f] tracking-tighter uppercase flex items-center">
                        <i class="fab fa-binance mr-3 animate-pulse text-[#f3ba2f]"></i> Binance Pro
                    </h1>
                    <div id="sentiment-badge" class="px-3 py-1 rounded bg-[#1e293b] border border-[#334155] text-[10px] font-black uppercase flex items-center gap-1">
                        <select id="sentiment-type-selector" onchange="onSentimentTypeChange()" class="bg-transparent text-white outline-none cursor-pointer appearance-none pr-4">
                            <option value="client_real_change">Real%</option>
                            <option value="h1_change">1H%</option>
                        </select>
                        <i class="fas fa-caret-down text-gray-400 text-[8px] -ml-3 pointer-events-none"></i>
                        <span id="sentiment-text" class="ml-2">📡 Scanning...</span>
                    </div>
                </div>

                <div class="flex flex-wrap items-center gap-3">
                    <div class="relative">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-xs pointer-events-none"></i>
                        <input type="text" id="symbol-search" placeholder="Search Symbols..." class="bg-[#05070a] border border-[#334155] rounded-lg py-2 pl-9 pr-4 text-xs focus:border-[#f3ba2f] outline-none transition w-32 md:w-44 text-white">
                    </div>

                    <div class="flex flex-wrap gap-1 bg-[#05070a] border border-[#334155] rounded-lg p-0.5 mr-2">
                        <button onclick="toggleHide('blacklist')" id="btn-blacklist" class="px-2 py-1 rounded text-[9px] font-bold uppercase transition bg-[#334155] text-white">Show BL</button>
                        <button onclick="toggleHide('lowVol')" id="btn-lowVol" class="px-2 py-1 rounded text-[9px] font-bold uppercase transition bg-[#334155] text-white">Show LV</button>
                        <button onclick="toggleHide('highSpr')" id="btn-highSpr" class="px-2 py-1 rounded text-[9px] font-bold uppercase transition bg-[#334155] text-white">Show HS</button>
                    </div>

                    <button onclick="resetSessionPrices()" class="px-4 py-2 rounded-lg text-[10px] font-black uppercase bg-[#f3ba2f] text-black hover:bg-white transition-all shadow-xl flex items-center gap-2 active:scale-95 border-2 border-white/10">
                        <i class="fas fa-sync-alt"></i> Reset Real%
                    </button>
                </div>
            </header>

            <div class="bg-[#0f172a] border border-[#1e293b] rounded-xl overflow-hidden shadow-2xl overflow-x-auto overflow-y-auto news-scroll" style="max-height: calc(100vh - 280px);">
                <table class="terminal-table text-left">
                    <thead>
                        <tr class="text-[10px] text-gray-400 uppercase font-black tracking-widest">
                            <th class="p-4 w-12 text-center">#</th>
                            <th class="p-4 cursor-pointer hover:text-white" onclick="updateSort('symbol')">Symbols <i class="fas fa-sort ml-1"></i></th>
                            <th class="p-4 cursor-pointer hover:text-white" onclick="updateSort('ask')">Bid Price <i class="fas fa-sort ml-1"></i></th>
                            <th class="p-4 cursor-pointer hover:text-white" onclick="updateSort('ask')">Ask Price <i class="fas fa-sort ml-1"></i></th>
                            <th class="p-4 cursor-pointer hover:text-white" onclick="updateSort('spread')">Spread <i class="fas fa-sort ml-1"></i></th>
                            <th class="p-4 cursor-pointer hover:text-white" onclick="updateSort('client_real_change')">Real% <i class="fas fa-sort ml-1"></i></th>
                            <th class="p-4 cursor-pointer hover:text-white" onclick="updateSort('h1_change')">1H% <i class="fas fa-sort ml-1"></i></th>
                            <th class="p-4 cursor-pointer hover:text-white" onclick="updateSort('volume')">Volume <i class="fas fa-sort ml-1"></i></th>
                        </tr>
                    </thead>
                    <tbody id="market-body" class="cell-mono">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="/static/js/footer.js"></script>

    <script>
        const supabaseClient = sb;

        let allData = [];
        let sessionInitialPrices = {};
        let currentSort = { col: 'client_real_change', desc: true };
        let hideSettings = { 
            blacklist: true, 
            lowVol: false, 
            highSpr: false 
        };
        let sentimentType = 'client_real_change';

        function onSentimentTypeChange() {
            sentimentType = document.getElementById('sentiment-type-selector').value;
            renderUI();
        }

        async function fetchMarketData() {
            try {
                const { data, error } = await supabaseClient.from('binance_market_data').select('*');
                if (error) throw error;
                
                console.log(`Fetched ${data.length} Binance rows`); // Дата ирж байгааг хянах
                allData = data;
                allData.forEach(d => { if (!sessionInitialPrices[d.symbol]) sessionInitialPrices[d.symbol] = d.ask; });
                
                renderUI();
            } catch (err) { console.error("Fetch Error:", err); }
        }

        function renderUI() {
            allData.forEach(d => {
                const init = sessionInitialPrices[d.symbol] || d.ask;
                d.client_real_change = init > 0 ? ((d.ask - init) / init * 100) : 0;
            });

            const tbody = document.getElementById('market-body');
            const search = document.getElementById('symbol-search').value.toUpperCase();
            
            // 1. Шүүлтүүр
            let searchedData = allData.filter(d => d.symbol.includes(search) && d.symbol.includes('-'));

            let visibleCoins = searchedData.filter(d => {
                if (hideSettings.blacklist && d.is_st) return false;
                if (hideSettings.highSpr && d.spread > 1.0) return false;
                if (hideSettings.lowVol && (d.volume || 0) < 30000) return false;
                return true;
            });

            // 2. Нийлбэр тооцоолох
            let totals = { real: 0, h1: 0, count: visibleCoins.length, ups: 0, dns: 0 };
            visibleCoins.forEach(d => {
                totals.real += d.client_real_change;
                totals.h1 += d.h1_change;
                if(d[sentimentType] > 0.5) totals.ups++;
                if(d[sentimentType] < -0.5) totals.dns++;
            });

            // 3. Эрэмбэлэх
            visibleCoins.sort((a, b) => {
                const valA = a[currentSort.col] !== undefined ? a[currentSort.col] : (currentSort.desc ? -Infinity : Infinity);
                const valB = b[currentSort.col] !== undefined ? b[currentSort.col] : (currentSort.desc ? -Infinity : Infinity);
                return currentSort.desc ? (valB - valA) : (valA - valB);
            });

            // 4. Ангилал
            const groups = {
                ST: { title: "🚫 BLACKLISTED / ST RISK", list: [], color: "bg-[#7f1d1d]" },
                HIGH_SPR: { title: "⚠️ HIGH SPREAD (>1.0%)", list: [], color: "bg-[#92400e]" },
                LOW_VOL: { title: "📉 VOLUME LOW (<30K)", list: [], color: "bg-[#4c1d95]" },
                MARKET: { title: "📊 MARKET LIST", list: [], color: "bg-[#334155]" }
            };

            visibleCoins.forEach(d => {
                if (d.is_st) groups.ST.list.push(d);
                else if (d.spread > 1.0) groups.HIGH_SPR.list.push(d);
                else if ((d.volume || 0) < 30000) groups.LOW_VOL.list.push(d);
                else groups.MARKET.list.push(d);
            });

            tbody.innerHTML = '';
            let idx = 1;

            Object.values(groups).forEach(g => {
                if (g.list.length === 0) return;
                
                const hRow = document.createElement('tr');
                hRow.innerHTML = `<td colspan="8" class="group-header p-2 px-4 ${g.color} text-white font-black">${g.title} (${g.list.length})</td>`;
                tbody.appendChild(hRow);

                g.list.forEach(d => {
                    const rRow = document.createElement('tr');
                    rRow.className = "hover:bg-[#1e293b] transition duration-150";
                    const realColor = (d.client_real_change || 0) >= 0 ? 'text-[#f3ba2f]' : 'text-[#ef4444]';
                    const h1Color = (d.h1_change || 0) >= 0 ? 'text-[#38bdf8]' : 'text-[#fb7185]';
                    
                    rRow.innerHTML = `
                        <td class="p-3 text-center text-gray-600 text-[10px] border-b border-[#1e293b]">${idx++}</td>
                        <td class="p-3 font-bold ${d.is_st ? 'text-[#f87171]' : 'text-white'} border-b border-[#1e293b]">${d.symbol}</td>
                        <td class="p-3 text-gray-400 border-b border-[#1e293b]">${(d.bid || 0).toFixed(4)}</td>
                        <td class="p-3 text-white border-b border-[#1e293b]">${(d.ask || 0).toFixed(4)}</td>
                        <td class="p-3 ${(d.spread || 0) > 1.0 ? 'text-[#f3ba2f]' : 'text-gray-400'} border-b border-[#1e293b]">${(d.spread || 0).toFixed(2)}%</td>
                        <td class="p-3 font-bold ${realColor} border-b border-[#1e293b]">${(d.client_real_change || 0) > 0 ? '+' : ''}${(d.client_real_change || 0).toFixed(2)}%</td>
                        <td class="p-3 font-bold ${h1Color} border-b border-[#1e293b]">${(d.h1_change || 0) > 0 ? '+' : ''}${(d.h1_change || 0).toFixed(2)}%</td>
                        <td class="p-3 text-gray-500 border-b border-[#1e293b]">${((d.volume || 0)/1e6).toFixed(2)}M</td>
                    `;
                    tbody.appendChild(rRow);
                });
            });

            // Хамгийн доор Нийлбэр мөр
            const tRow = document.createElement('tr');
            tRow.className = "bg-[#0f172a] font-black sticky bottom-0 z-20 border-t-2 border-[#f3ba2f]/50 shadow-[0_-4px_10px_rgba(0,0,0,0.5)]";
            tRow.innerHTML = `
                <td class="p-3 text-center text-[#f3ba2f] text-[10px]">Σ</td>
                <td class="p-3 text-white uppercase tracking-widest text-[10px]">BINANCE TOTALS (${totals.count})</td>
                <td colspan="3"></td>
                <td class="p-3 font-black text-lg ${totals.real >= 0 ? 'text-[#f3ba2f]' : 'text-red-500'}">${totals.real > 0 ? '+' : ''}${totals.real.toFixed(2)}%</td>
                <td class="p-3 font-black text-lg ${totals.h1 >= 0 ? 'text-[#38bdf8]' : 'text-rose-500'}">${totals.h1 > 0 ? '+' : ''}${totals.h1.toFixed(2)}%</td>
                <td></td>
                `;
            tbody.appendChild(tRow);

            updateSentiment(totals);
        }

        function updateSentiment(t) {
            const badge = document.getElementById('sentiment-text');
            let text, color, icon;
            
            if (t.ups > t.dns * 3 && t.ups > 5) { text = "STRONG BULL ↑↑"; color = "text-[#22c55e]"; icon = "🚀"; }
            else if (t.ups > t.dns * 1.5) { text = "BULL ↑"; color = "text-[#4ade80]"; icon = "📈"; }
            else if (t.dns > t.ups * 3 && t.dns > 5) { text = "STRONG BEAR ↓↓"; color = "text-[#ef4444]"; icon = "🩸"; }
            else if (t.dns > t.ups * 1.5) { text = "BEAR ↓"; color = "text-[#f87171]"; icon = "📉"; }
            else { text = "FLAT ↔"; color = "text-gray-400"; icon = "⚖️"; }

            badge.className = `ml-2 transition-all duration-500 ${color}`;
            badge.innerText = `${icon} ${text} | Up: ${t.ups} | Down: ${t.dns}`;
        }

        function toggleHide(type) {
            hideSettings[type] = !hideSettings[type];
            const btn = document.getElementById(`btn-${type}`);
            btn.className = `px-2 py-1 rounded text-[9px] font-bold uppercase transition ${hideSettings[type] ? 'bg-black text-gray-500' : 'bg-[#334155] text-white'}`;
            renderUI();
        }

        function resetSessionPrices() {
            sessionInitialPrices = {};
            allData.forEach(d => { sessionInitialPrices[d.symbol] = d.ask; });
            renderUI();
        }

        function updateSort(col) {
            if(currentSort.col === col) currentSort.desc = !currentSort.desc;
            else { currentSort.col = col; currentSort.desc = true; }
            renderUI();
        }

        setInterval(fetchMarketData, 5000);
        fetchMarketData();
        
        document.getElementById('symbol-search').addEventListener('input', renderUI);
    </script>
</body>
</html>
