        tailwind.config = {
            theme: {
                extend: {

        body { background-color: #05070a; color: #e2e8f0; }

        .terminal-table th { position: sticky; top: 0; background: #1e293b; z-index: 40; border-bottom: 2px solid #0f172a; }

</head>

                        <button onclick="toggleHide('lowVol')" id="btn-lowVol" class="px-2 py-1 rounded text-[9px] font-bold uppercase transition bg-[#334155] text-white">Show LV</button>
                        <button onclick="toggleHide('highSpr')" id="btn-highSpr" class="px-2 py-1 rounded text-[9px] font-bold uppercase transition bg-[#334155] text-white">Show HS</button>

                    <button onclick="resetSessionPrices()" class="px-4 py-2 rounded-lg text-[10px] font-black uppercase bg-[#f3ba2f] text-black hover:bg-white transition-all shadow-xl flex items-center gap-2 active:scale-95 border-2 border-white/10">

                            <th class="p-4 cursor-pointer hover:text-white" onclick="updateSort('bid')">Bid Price <i class="fas fa-sort ml-1"></i></th>
                            <th class="p-4 cursor-pointer hover:text-white" onclick="updateSort('ask')">Ask Price <i class="fas fa-sort ml-1"></i></th>

                            <th class="p-4 cursor-pointer hover:text-white" onclick="updateSort('change_24h')">24H% <i class="fas fa-sort ml-1"></i></th>
                            <th class="p-4 cursor-pointer hover:text-white" onclick="updateSort('volume')">Volume <i class="fas fa-sort ml-1"></i></th>
                        </tr>
                    </thead>
                    <tbody id="market-body" class="cell-mono">
                    </tbody>
                </table>
            </div>

            <!-- Terminal Usage Guide Section -->
            <div class="mt-20 border-t border-brand-border pt-12">
                <div class="bg-brand-dark-blue/50 border border-brand-border rounded-2xl p-8 md:p-10 shadow-2xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-64 h-64 bg-brand-gold/5 blur-[100px] -mr-32 -mt-32"></div>
                    <div class="relative z-10">

                        </h2>
                        <div class="space-y-6 text-gray-400 text-sm leading-relaxed">
                            <div class="bg-brand-gold/10 border-l-4 border-brand-gold p-6 rounded-r-xl">

                                    <h3 data-i18n="guide-item-1-title" class="text-brand-gold font-bold uppercase text-xs tracking-widest"></h3>

                                </div>
                                <div class="space-y-4">
                                    <h3 data-i18n="guide-item-2-title" class="text-brand-gold font-bold uppercase text-xs tracking-widest"></h3>
                                    <p data-i18n="guide-item-2-desc" class="text-xs"></p>
                                </div>
                                <div class="space-y-4">
                                    <h3 data-i18n="guide-item-3-title" class="text-brand-gold font-bold uppercase text-xs tracking-widest"></h3>
                                    <p data-i18n="guide-item-3-desc" class="text-xs"></p>
                                </div>
                                <div class="space-y-4">
                                    <h3 data-i18n="guide-item-6-title" class="text-brand-gold font-bold uppercase text-xs tracking-widest"></h3>
                                    <p data-i18n="guide-item-6-desc" class="text-xs"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/footer.js"></script>

    <script>
        const supabaseClient = sb;

        let allData = [];
        let sessionInitialPrices = {};
        let currentSort = { col: 'client_real_change', desc: true };
        let hideSettings = { 
            blacklist: true, 
            lowVol: false, 
            highSpr: false 
        };
        let sentimentType = 'client_real_change';

        const pageTranslations = {
            mn: {
                "terminal-reminder": "💡 Санамж: 'Hide' шүүлтүүрүүдийг ашиглан эрсдэлтэй болон арилжаанд шаардлагагүй зооснуудыг жагсаалтаас хасаж, өөрийн арилжааны тактикт тохирох оновчтой зоосыг сонгон арилжаагаа хийгээрэй.",
                "back-to-home": '<svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>Терминалууд руу буцах',
                "guide-title": '<i class="fas fa-book-open text-brand-gold mr-3"></i> Биржүүдийн Терминал ашиглах заавар',
                "guide-intro": "Энэхүү биржүүдийн дата нь маш онцгой зүйлсийг агуулдаг бөгөөд үүнийг ойлгож мэдсэнээр аль ч бирж дээр арилжаа хийж байсан авах ёсгүй койнуудыг авахгүй байх чадвартай болох юм...",
                "guide-item-1-title": "1. BLACKLISTED / ST RISK (SHOW BL)",
                "guide-item-1-desc": "ST (Special Treatment) буюу биржийн гэрээний зөрчилтэй, арилжаанаас хасагдах өндөр эрсдэлтэй койнууд. Систем эдгээрийг автоматаар улаанаар тэмдэглэж анхааруулна.",
                "guide-item-2-title": "2. SPREAD MONITOR (HIDE HS)",
                "guide-item-2-desc": "Худалдах, худалдан авах үнийн зөрүү ихтэй койнууд. Халимнуудын өгөөш болох магадлал өндөр, занга ихтэй байдаг тул арилжаанд орох нь эрсдэлтэй.",
                "guide-item-3-title": "3. LOW VOL COINS (HIDE LV)",
                "guide-item-3-desc": "Сүүлийн нэг өдрийн зах зээлийн эргэлт багатай койнууд. Хөрвөх чадвар муу тул арилжааны явцад үнийн гэнэтийн савлагаа үүсэх аюултай.",
                "guide-item-6-title": "6. RESET REAL% (RESET REAL%)",
                "guide-item-6-desc": "Бүх цаг үеийн арилжааны хамгийн чухал хэрэгсэл. Үүнийг дарснаар үнийг одоо цагаас хойш reset хийж, хэрхэн өсөж унаж байгааг бодитоор харна."
            },
            en: {
                "terminal-reminder": "💡 Tip: Use the 'Hide' filters to remove risky or irrelevant coins from the list, allowing you to focus on the most suitable assets for your trading strategy.",
                "back-to-home": '<svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>Back to Terminals',
                "guide-title": '<i class="fas fa-book-open text-brand-gold mr-3"></i> Exchange Terminal Usage Guide',
                "guide-intro": "This exchange data contains very unique insights. By understanding this, you will be able to avoid purchasing high-risk coins on any exchange you trade on...",
                "guide-item-1-title": "1. BLACKLISTED / ST RISK (SHOW BL)",
                "guide-item-1-desc": "Coins with ST (Special Treatment) status or contract violations. High risk of delisting; system highlights these in red.",
                "guide-item-2-title": "2. SPREAD MONITOR (HIDE HS)",
                "guide-item-2-desc": "Assets with wide bid-ask spreads. These are likely whale bait or manipulative traps; entry is highly risky.",
                "guide-item-3-title": "3. LOW VOL COINS (HIDE LV)",
                "guide-item-3-desc": "Coins with low market turnover in the last 24 hours. Poor liquidity often leads to extreme volatility.",
                "guide-item-6-title": "6. RESET REAL% (RESET REAL%)",
                "guide-item-6-desc": "A vital tool for all trading. Resets price tracking to the current moment to monitor live gains or losses from this point forward."
            }
        };

        function onSentimentTypeChange() {
            sentimentType = document.getElementById('sentiment-type-selector').value;
            renderUI();
        }

        async function fetchMarketData() {
            try {
                const { data, error } = await supabaseClient.from('binance_market_data').select('*');
                if (error) throw error;
                console.log("Supabase raw data:", data); // Энд дата ирж байгааг шалгана
                
                console.log(`Fetched ${data.length} Binance rows`); // Дата ирж байгааг хянах
                allData = data;
                allData.forEach(d => { if (!sessionInitialPrices[d.symbol]) sessionInitialPrices[d.symbol] = d.ask; });
                
                renderUI();
            } catch (err) { console.error("Fetch Error:", err); }
        }

        function renderUI() {
            allData.forEach(d => {
                const init = sessionInitialPrices[d.symbol] || d.ask;
                d.client_real_change = init > 0 ? ((d.ask - init) / init * 100) : 0;
            });

            const tbody = document.getElementById('market-body');
            const search = document.getElementById('symbol-search').value.toUpperCase();
            
            // 1. Шүүлтүүр
            // Үнэгүй эсвэл үхмэл койнуудыг хасч тоог цэгцлэх
            let searchedData = allData.filter(d => d.symbol.includes(search) && d.ask > 0);

            let visibleCoins = searchedData.filter(d => {
                if (hideSettings.blacklist && d.is_st) return false;
                if (hideSettings.highSpr && d.spread > 1.0) return false;
                if (hideSettings.lowVol && (d.volume || 0) < 100000) return false; // Binance-д 100K босго арай тохиромжтой
                return true;
            });

            // 2. Нийлбэр тооцоолох
            let totals = { real: 0, h1: 0, c24: 0, count: visibleCoins.length, ups: 0, dns: 0 };
            visibleCoins.forEach(d => {
                totals.real += d.client_real_change;
                totals.c24 += d.change_24h || 0; 
                totals.h1 += d.h1_change;
                if((d[sentimentType] || 0) > 0.5) totals.ups++; 
                if((d[sentimentType] || 0) < -0.5) totals.dns++;
            });

            // 3. Эрэмбэлэх
            visibleCoins.sort((a, b) => {
                const valA = (a[currentSort.col] !== undefined && a[currentSort.col] !== null) ? a[currentSort.col] : (currentSort.desc ? -Infinity : Infinity);
                const valB = (b[currentSort.col] !== undefined && b[currentSort.col] !== null) ? b[currentSort.col] : (currentSort.desc ? -Infinity : Infinity);
                return currentSort.desc ? (valB - valA) : (valA - valB);
            });

            // 4. Ангилал
            const groups = {
                ST: { title: "🚫 BLACKLISTED / ST RISK", list: [], color: "bg-[#7f1d1d]" },
                HIGH_SPR: { title: "⚠️ HIGH SPREAD (>1.0%)", list: [], color: "bg-[#92400e]" },
                LOW_VOL: { title: "📉 VOLUME LOW (<100K)", list: [], color: "bg-[#2e1065]" },
                MARKET: { title: "📊 MARKET LIST", list: [], color: "bg-[#334155]" }
            };

            visibleCoins.forEach(d => {
                if (d.is_st) groups.ST.list.push(d);
                else if (d.spread > 1.0) groups.HIGH_SPR.list.push(d);
                else if ((d.volume || 0) < 100000) groups.LOW_VOL.list.push(d);
                else groups.MARKET.list.push(d);
            });

            tbody.innerHTML = '';
            let idx = 1;

            Object.values(groups).forEach(g => {
                if (g.list.length === 0) return;
                
                const hRow = document.createElement('tr');
                hRow.innerHTML = `<td colspan="9" class="group-header p-2 px-4 ${g.color} text-white font-black">${g.title} (${g.list.length})</td>`;
                tbody.appendChild(hRow);

                g.list.forEach(d => {
                    const rRow = document.createElement('tr');
                    rRow.className = "hover:bg-[#1e293b] transition duration-150";
                    const realColor = (d.client_real_change || 0) >= 0 ? 'text-[#f3ba2f]' : 'text-[#ef4444]';
                    const h1Color = (d.h1_change || 0) >= 0 ? 'text-[#38bdf8]' : 'text-[#fb7185]'; // KuCoin-той ижил
                    const chColor = (d.change_24h || 0) >= 0 ? 'text-[#22c55e]' : 'text-[#ef4444]'; // KuCoin-той ижил
                    const minUsdtColor = (d.min_usdt || 0) <= 10.01 ? 'text-[#10b981]' : 'text-gray-400'; // 10 USDT-ээс бага бол ногоон
                    
                    rRow.innerHTML = `
                        <td class="p-3 text-center text-gray-600 text-[10px] border-b border-[#1e293b]">${idx++}</td>
                        <td class="p-3 font-bold ${d.is_st ? 'text-[#f87171]' : 'text-white'} border-b border-[#1e293b]">${d.symbol}</td>
                        <td class="p-3 text-gray-400 border-b border-[#1e293b]">${(d.bid || 0).toFixed(8)}</td>
                        <td class="p-3 text-white border-b border-[#1e293b]">${(d.ask || 0).toFixed(8)}</td>
                        <td class="p-3 ${(d.spread || 0) > 1.0 ? 'text-[#f3ba2f]' : 'text-gray-400'} border-b border-[#1e293b]">${(d.spread || 0).toFixed(2)}%</td>
                        <td class="p-3 ${minUsdtColor} border-b border-[#1e293b]">${(d.min_usdt || 0).toFixed(4)}</td>
                        <td class="p-3 font-bold ${realColor} border-b border-[#1e293b]">${(d.client_real_change || 0) > 0 ? '+' : ''}${(d.client_real_change || 0).toFixed(2)}%</td>
                        <td class="p-3 font-bold ${h1Color} border-b border-[#1e293b]">${(d.h1_change || 0) > 0 ? '+' : ''}${(d.h1_change || 0).toFixed(2)}%</td>
                        <td class="p-3 text-gray-500 border-b border-[#1e293b]">${((d.volume || 0)/1e6).toFixed(2)}M</td>
                        <td class="p-3 font-bold ${chColor} border-b border-[#1e293b]">${(d.change_24h || 0) > 0 ? '+' : ''}${(d.change_24h || 0).toFixed(2)}%</td>
                    `;
                    tbody.appendChild(rRow);
                });
            });

            // Хамгийн доор Нийлбэр мөр
            const tRow = document.createElement('tr');
            tRow.className = "bg-[#0f172a] font-black sticky bottom-0 z-20 border-t-2 border-[#f3ba2f]/50 shadow-[0_-4px_10px_rgba(0,0,0,0.5)]";
            tRow.innerHTML = `
                <td class="p-3 text-center text-[#f3ba2f] text-[10px]">Σ</td>
                <td class="p-3 text-white uppercase tracking-widest text-[10px]">BINANCE TOTALS (${totals.count})</td>
                <td colspan="4"></td>
                <td class="p-3 font-black text-lg ${totals.real >= 0 ? 'text-[#f3ba2f]' : 'text-red-500'}">${totals.real > 0 ? '+' : ''}${totals.real.toFixed(2)}%</td>
                <td class="p-3 font-black text-lg ${totals.h1 >= 0 ? 'text-[#38bdf8]' : 'text-rose-500'}">${totals.h1 > 0 ? '+' : ''}${totals.h1.toFixed(2)}%</td>
                <td class="p-3 font-black text-lg ${totals.c24 >= 0 ? 'text-[#22c55e]' : 'text-red-500'}">${totals.c24 > 0 ? '+' : ''}${totals.c24.toFixed(2)}%</td>
                <td></td>
                `;
            tbody.appendChild(tRow);

            updateSentiment(totals);
        }

        function updateSentiment(t) {
            const badge = document.getElementById('sentiment-text');
            if (!badge) return;
            let text, color, icon;
            
            if (t.ups > t.dns * 3 && t.ups > 5) { text = "STRONG BULL ↑↑"; color = "text-[#22c55e]"; icon = "🚀"; }
            else if (t.ups > t.dns * 1.5) { text = "BULL ↑"; color = "text-[#4ade80]"; icon = "📈"; }
            else if (t.dns > t.ups * 3 && t.dns > 5) { text = "STRONG BEAR ↓↓"; color = "text-[#ef4444]"; icon = "🩸"; }
            else if (t.dns > t.ups * 1.5) { text = "BEAR ↓"; color = "text-[#f87171]"; icon = "📉"; }
            else { text = "FLAT ↔"; color = "text-gray-400"; icon = "⚖️"; }

            badge.className = `ml-2 transition-all duration-500 ${color}`;
            badge.innerText = `${icon} ${text} | Up: ${t.ups} | Down: ${t.dns}`;
        }

        function getButtonText(type, isHidden) {
            const texts = { blacklist: 'BL', lowVol: 'LV', highSpr: 'HS' };
            return `${isHidden ? 'Show' : 'Hide'} ${texts[type]}`;
        }

        function updateButtonState(id, isHidden) {
            const btn = document.getElementById(id);
            if (btn) {
                const type = id.replace('btn-', '');
                btn.textContent = getButtonText(type, isHidden);
                btn.className = `px-2 py-1 rounded text-[9px] font-bold uppercase transition ${isHidden ? 'bg-black text-gray-500' : 'bg-[#334155] text-white'}`;
            }
        }

        function toggleHide(type) {
            hideSettings[type] = !hideSettings[type];
            updateButtonState(`btn-${type}`, hideSettings[type]);
            renderUI();
        }

        function resetSessionPrices() {
            sessionInitialPrices = {};
            allData.forEach(d => { sessionInitialPrices[d.symbol] = d.ask; });
            renderUI();
        }

        function updateSort(col) {
            if(currentSort.col === col) currentSort.desc = !currentSort.desc;
            else { currentSort.col = col; currentSort.desc = true; }
            renderUI();
        }

        setInterval(fetchMarketData, 5000);
        
        document.addEventListener('DOMContentLoaded', () => {
            const lang = localStorage.getItem('lang') || 'mn';
            if (typeof translations !== 'undefined') {
                Object.keys(pageTranslations).forEach(l => Object.assign(translations[l], pageTranslations[l]));
            }
            if (typeof changeLang === 'function') changeLang(lang);
            fetchMarketData();
            Object.keys(hideSettings).forEach(type => updateButtonState(`btn-${type}`, hideSettings[type]));
        });
        
        document.getElementById('symbol-search').addEventListener('input', renderUI);
    </script>
</body>
</html>
