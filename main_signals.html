<body class="bg-brand-dark text-white font-inter flex flex-col min-h-screen">

    <!-- Main Content -->

                <div class="w-20 h-1 bg-brand-gold mx-auto mt-6"></div>
            </div>

            <div class="w-full">
                
                <!-- Main Column: Signals Table -->
                <div class="w-full">
                    <div class="page-container">
                        <h2 class="text-xl font-bold text-white uppercase mb-6 hidden">Select Signal</h2> <!-- Hidden initially, text set by JS -->
                        <div class="signal-grid grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                            <!-- Cards will be injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('lang') || 'mn';
            changeLang(savedLang);
            
            const mobileMenuButton = document.querySelector('.mobile-menu-button');
            const mobileMenu = document.querySelector('.mobile-menu');
            if(mobileMenuButton) {
                mobileMenuButton.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));
            }

            // Render signal cards using global translations from main_translate.js
            function renderSignals() {
                const lang = localStorage.getItem('lang') || 'mn';
                if (typeof translations === 'undefined' || !translations[lang]) return;
                
                const t = translations[lang];
                const cards = (t['signal-list'] || []); // Шүүлтүүрийг авч бүх сигналыг харуулдаг болгов
                const comingSoonText = t['sig-coming-soon'] || 'Coming Soon';
                const readMoreText = t['sig-read-more'] || 'Read More...';

                const grid = document.querySelector('.signal-grid');
                if (!grid) return;

                grid.innerHTML = cards.map((card) => {
                const isComingSoon = card.status === 'coming_soon';
                if (isComingSoon) {
                    return `
                    <div class="signal-card-new disabled bg-brand-dark-blue border border-brand-border rounded-xl p-6 relative overflow-hidden opacity-70">
                        <h3 class="text-white font-bold text-lg mb-2">${card.title}</h3>
                        <p class="text-gray-400 text-sm">${card.description}</p>
                        <div class="status-badge absolute top-2 right-2 bg-yellow-500/20 text-yellow-500 text-[10px] font-bold px-2 py-1 rounded">${comingSoonText}</div>
                    </div>
                    `;
                } else {
                    return `
                    <a href="/${card.link}" class="signal-card-new bg-brand-dark-blue border border-brand-border rounded-xl p-6 flex flex-col h-full hover:border-brand-gold transition duration-300 transform hover:-translate-y-1 group">
                        <h3 class="text-white font-bold text-lg mb-2 text-brand-gold">${card.title}</h3>
                        <p class="text-gray-400 text-sm flex-grow">${card.description}</p>
                        <span class="text-[10px] text-gray-500 mt-4 block italic group-hover:text-brand-gold transition">${readMoreText}</span>
                    </a>
                    `;
                }
                }).join('');
            }

            // Initial render
            renderSignals();

            // Override changeLang to re-render the grid when language is switched
            const originalChangeLang = window.changeLang;
            window.changeLang = function(lang) {
                if (originalChangeLang) originalChangeLang(lang);
                renderSignals();
            };
        });
    </script>
