    <script>
        // Динамик мэдээг орчуулах туслах функц
        async function translateText(text, targetLang = 'mn') {
            if (!text || targetLang === 'en') return text;
            try {
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`);
                const data = await res.json();
                return data[0].map(item => item[0]).join('');
            } catch (e) {
                return text; // Алдаа гарвал эх хувиар нь буцаана
            }
        }

        // Custom Script to fetch Crypto News
        async function fetchCryptoNews() {
            const container = document.getElementById('crypto-news-container');
            try {
                const lang = localStorage.getItem('lang') || 'mn';
                // CryptoCompare API-руу шууд хандах (Анхааруулга: API Key ил харагдана)
                const apiKey = "e1a405da7b5c9741bea263ba620e6de9eeea91b8d1cafc81e36dd5d0ebdaa6ea"; 
                const response = await fetch(`https://min-api.cryptocompare.com/data/v2/news/?lang=EN&api_key=${apiKey}`);
                
                const data = await response.json();
                
                // More robust check for API errors or empty data
                if (data.Response === 'Error' || !data.Data || data.Data.length === 0) {
                    console.error('CryptoCompare API Error:', data.Message || 'No news data returned');
                    container.innerHTML = `<div class="col-span-full text-center text-yellow-500/80 p-8 bg-yellow-900/10 border border-yellow-500/20 rounded-lg text-sm" data-i18n="news-error">Мэдээлэл авахад алдаа гарлаа.</div>`;
                    return;
                }

                container.innerHTML = ''; // Clear loading message
                const readMoreBtnText = lang === 'mn' ? "Дэлгэрэнгүй" : "Read More";
                
                // Take first 6 news items
                const newsItems = data.Data.slice(0, 6);

                // Бүх мэдээг зэрэг орчуулах (Parallel processing)
                const translatedItems = await Promise.all(newsItems.map(async (news) => {
                    let title = news.title;
                    let body = news.body;
                    
                    if (lang === 'mn') {
                        // Title болон Body-г (эхний 400 тэмдэгт) зэрэг орчуулах
                        [title, body] = await Promise.all([
                            translateText(news.title, 'mn'),
                            translateText(news.body.substring(0, 400), 'mn')
                        ]);
                    }
                    
                    return { ...news, displayTitle: title, displayBody: body };
                }));

                translatedItems.forEach(news => {
                    const date = new Date(news.published_on * 1000).toLocaleDateString(lang === 'mn' ? 'mn-MN' : 'en-US');
                    const html = `
                        <a href="${news.url}" target="_blank" class="bg-brand-dark-blue border border-brand-border rounded-xl overflow-hidden hover:border-brand-gold/50 transition duration-300 group flex flex-col h-full relative">
                            <div class="aspect-video w-full overflow-hidden relative bg-gray-800">
                                <img src="${news.imageurl}" alt="News Image" class="w-full h-full object-cover group-hover:scale-105 transition duration-500 opacity-80 group-hover:opacity-100" onerror="this.src='https://via.placeholder.com/300x170?text=No+Image'">
                            </div>
                            <div class="p-5 flex-grow flex flex-col">
                                <div class="flex items-center space-x-2 mb-3">
                                    <span class="text-[10px] text-brand-gold font-bold uppercase tracking-wider">${news.categories.split('|')[0]}</span>
                                    <span class="text-[10px] text-gray-600">•</span>
                                    <span class="text-[10px] text-gray-500 font-mono">${date}</span>
                                </div>
                                <h3 class="text-white font-bold text-sm mb-3 line-clamp-2 leading-relaxed group-hover:text-brand-gold transition">${news.displayTitle}</h3>
                                <p class="text-gray-400 text-xs line-clamp-3 mb-4 flex-grow leading-relaxed">${news.displayBody}</p>
                                <div class="text-brand-gold text-[10px] font-black uppercase tracking-widest flex items-center">
                                    ${readMoreBtnText} <i class="fas fa-arrow-right ml-2 group-hover:translate-x-1 transition"></i>
                                </div>
                            </div>
                        </a>
                    `;
                    container.insertAdjacentHTML('beforeend', html);
                });

            } catch (error) {
                console.error('Error fetching news:', error);
                container.innerHTML = '<div class="col-span-full text-center text-red-500 p-8 bg-red-900/10 border border-red-500/20 rounded-lg text-sm">Could not connect to the news service. Please check your network connection.</div>';
            }
        }

        // Run fetch on load
        fetchCryptoNews();

        // Хэл солигдох үед мэдээг дахин татаж орчуулах
        const originalChangeLang = window.changeLang;
        window.changeLang = function(lang) {
            if (originalChangeLang) originalChangeLang(lang);
            document.getElementById('crypto-news-container').innerHTML = `<div class="col-span-full text-center py-12 text-gray-500"><i class="fas fa-circle-notch fa-spin mr-2"></i> ...</div>`;
            fetchCryptoNews();
        };

        // 🚨 ЗАСВАР: Давхардсан changeLang функцийг устгаж, global функцийг ашигладаг болов

        const mobileMenuButton = document.querySelector('.mobile-menu-button');
        const mobileMenu = document.querySelector('.mobile-menu');
        if(mobileMenuButton) {
            mobileMenuButton.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));
        }
    </script>
