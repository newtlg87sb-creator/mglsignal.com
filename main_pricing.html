    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('payment-modal');
            const qpayBtn = document.getElementById('qpay-button');
            const freeBtn = document.getElementById('free-plan-btn');
            const close = document.getElementById('close-modal');
            const nowpaymentsBtn = document.getElementById('nowpayments-button');

            if(freeBtn) {
                freeBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (!localStorage.getItem('user')) {
                        window.location.href = '/main_login.html';
                    }
                });
            }

            // "Сонгох" дарахад Модал нээх хуучин логик
            if(qpayBtn && modal) {
                qpayBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (!localStorage.getItem('user')) {
                        window.location.href = '/main_login.html';
                        return;
                    }
                    modal.classList.remove('hidden');
                });
            }

            // Автомат төлбөрийн логик
            if(nowpaymentsBtn) {
                nowpaymentsBtn.addEventListener('click', async (e) => {
                    e.preventDefault();
                    
                    const userStr = localStorage.getItem('user');
                    if (!userStr) return;
                    const user = JSON.parse(userStr);

                    nowpaymentsBtn.innerText = "ТӨЛБӨРИЙН ЛИНК ҮҮСГЭЖ БАЙНА...";
                    nowpaymentsBtn.style.pointerEvents = 'none';
                    nowpaymentsBtn.style.opacity = '0.7';

                    try {
                        const response = await fetch('/api/create-invoice', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ userId: user.id })
                        });

                        const data = await response.json();

                        if (data.invoiceUrl) {
                            window.location.href = data.invoiceUrl;
                        } else {
                            alert('Алдаа гарлаа. Дахин оролдоно уу.');
                            resetCryptoButton();
                        }
                    } catch (error) {
                        console.error('Error:', error);
                        alert('Сүлжээний алдаа гарлаа.');
                        resetCryptoButton();
                    }
                });
            }

            function resetCryptoButton() {
                if(nowpaymentsBtn) {
                    nowpaymentsBtn.innerHTML = '<i class="fab fa-bitcoin mr-2 text-base"></i> КРИПТОГООР АВТОМАТАР ТӨЛӨХ';
                    nowpaymentsBtn.style.pointerEvents = 'auto';
                    nowpaymentsBtn.style.opacity = '1';
                }
            }

            if(close) {
                close.addEventListener('click', () => modal.classList.add('hidden'));
            }

            if(modal) {
                modal.addEventListener('click', (e) => {
                    if(e.target === modal) modal.classList.add('hidden');
                });
            }
        });
    </script>
