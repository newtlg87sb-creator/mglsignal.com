    <script>
        // Global copy function for better UX
        window.copyToClipboard = function(text, feedbackElementId) {
            navigator.clipboard.writeText(text).then(() => {
                const feedbackEl = document.getElementById(feedbackElementId);
                if (feedbackEl) {
                    const currentLang = localStorage.getItem('lang') || 'mn';
                    // Try to find translation for "Copied!", fallback to a default
                    const successText = (typeof translations !== 'undefined' && translations[currentLang]) 
                        ? (translations[currentLang]['copy-success'] || 'Copied!') 
                        : 'Copied!';
                    feedbackEl.textContent = successText;
                    setTimeout(() => {
                        feedbackEl.textContent = '';
                    }, 2000);
                }
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        };

        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('payment-modal');
            const btn = document.getElementById('qpay-button');
            const freeBtn = document.getElementById('free-plan-btn');
            const close = document.getElementById('close-modal');
            const emailDisplay = document.getElementById('user-email-display');
            const emailDisplayCrypto = document.getElementById('user-email-display-crypto');

            if(freeBtn) {
                freeBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const userStr = localStorage.getItem('user');
                    if (!userStr) {
                        // Нэвтрээгүй бол нэвтрэх рүү илгээнэ
                        window.location.href = '/main_login.html';
                    }
                    // Хэрэв нэвтэрсэн бол юу ч болохгүй (User is already on free plan)
                });
            }

            if(btn && modal) {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    
                    // Хэрэглэгч нэвтэрсэн эсэхийг шалгах
                    const userStr = localStorage.getItem('user');
                    if (!userStr) {
                        // Нэвтрээгүй бол Login хуудас руу шилжүүлнэ
                        window.location.href = '/main_login.html';
                        return;
                    }

                    // Хэрэглэгчийн имэйлийг гүйлгээний утга хэсэгт харуулах
                    try {
                        const user = JSON.parse(userStr);
                        const currentLang = localStorage.getItem('lang') || 'mn';
                        const t = translations[currentLang] || translations['mn'];
                        if(emailDisplay) emailDisplay.textContent = `${t['ph-email-note']}: ${user.email}`;
                        if(emailDisplayCrypto) emailDisplayCrypto.textContent = `${t['ph-email-note']}: ${user.email}`;
                    } catch(e) {}

                    // Цонхыг нээх
                    modal.classList.remove('hidden');
                });
            }

            if(close) {
                close.addEventListener('click', () => modal.classList.add('hidden'));
            }

            // Цонхны гадна талд дарвал хаах
            if(modal) {
                modal.addEventListener('click', (e) => {
                    if(e.target === modal) modal.classList.add('hidden');
                });
            }
        });
    </script>
