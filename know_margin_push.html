            const setHTML = (id, html) => { const el = document.getElementById(id); if (el) el.innerHTML = html; };

            const updateContent = (language) => {
                const t = texts[language] || texts.en;
                document.title = t.pageTitle;
                
                Object.keys(t).forEach(key => {
                    if (['pros', 'cons', 'prosConsHeader1', 'prosConsHeader2', 'pageTitle'].includes(key)) return;
                    const elementId = key
                        .replace(/([a-z])([A-Z])/g, '$1-$2')
                        .replace(/([A-Za-z])([0-9])/g, '$1-$2')
                        .toLowerCase();
                    setHTML(elementId, t[key]);
                });

                const table = document.getElementById('pros-cons-table');
                if (table) {
                    let tableHTML = `<thead class="bg-black/30 text-brand-gold uppercase text-xs"><tr><th class="px-4 py-3 border-b border-brand-border">${t.prosConsHeader1}</th><th class="px-4 py-3 border-b border-brand-border">${t.prosConsHeader2}</th></tr></thead><tbody class="text-gray-400">`;
                    const maxRows = Math.max(t.pros.length, t.cons.length);
                    for (let i = 0; i < maxRows; i++) {
                        tableHTML += `<tr class="hover:bg-brand-border/10"><td class="px-4 py-3 border-b border-brand-border/30 align-top"><i class="fas fa-check text-green-500 mr-2"></i>${t.pros[i] || ''}</td><td class="px-4 py-3 border-b border-brand-border/30 align-top"><i class="fas fa-times text-red-500 mr-2"></i>${t.cons[i] || ''}</td></tr>`;
                    }
                    tableHTML += '</tbody>';
                    table.innerHTML = tableHTML;
                }
            };

                if (originalChangeLang) originalChangeLang(language);
                updateContent(language);
            };
