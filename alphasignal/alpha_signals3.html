<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha V3 Triple MA - MGL Signal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 'dark': '#05070a', 'dark-blue': '#0f1217', 'gold': '#c5a059', 'border': '#1f242d' }
                    },
                    fontFamily: { 'inter': ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/main_style.css">
</head>
<body class="bg-brand-dark text-white font-inter flex flex-col min-h-screen">
    <script src="/static/js/header.js"></script>

    <main class="flex-grow pt-20 flex flex-col gap-4 pb-12">
        <div class="max-w-7xl mx-auto px-6 mb-6">
            <div class="flex justify-between items-end">
                <div>
                    <h1 class="text-3xl font-black text-white uppercase tracking-tighter">Alpha <span class="text-brand-gold italic">V3</span> Triple MA</h1>
                    <p class="text-gray-500 text-[10px] mt-1 uppercase font-bold tracking-[0.3em]">Trend Alignment Intelligence</p>
                </div>
                <div class="text-right hidden md:block">
                    <div class="text-[9px] text-brand-gold font-bold uppercase tracking-widest animate-pulse">● Alpha Stream Active</div>
                    <div id="current-pair-display" class="text-xl font-black text-white leading-none">BTCUSDT</div>
                </div>
            </div>
        </div>

        <!-- Chart & Controls -->
        <div class="controls-container flex flex-wrap items-center gap-4 p-4 bg-brand-dark-blue border border-brand-border rounded-xl shadow-lg">
            <!-- Market -->
            <div class="control-item flex items-center space-x-2">
                <label class="text-gray-500 font-bold uppercase text-[10px]">Market:</label>
                <select id="market" class="bg-brand-dark border border-brand-border text-white rounded px-3 py-1.5 text-xs shadow-inner">
                    <option value="spot">Spot</option>
                    <option value="futures">Futures</option>
                </select>
            </div>

            <!-- Timeframe -->
            <div class="control-item flex items-center space-x-2">
                <label class="text-gray-500 font-bold uppercase text-[10px]">Time:</label>
                <select id="interval" class="bg-brand-dark border border-brand-border text-white rounded px-3 py-1.5 text-xs shadow-inner">
                    <option value="1s">1s</option>
                    <option value="1m" selected>1m</option>
                    <option value="3m">3m</option>
                    <option value="5m">5m</option>
                    <option value="15m">15m</option>
                    <option value="30m">30m</option>
                    <option value="1h">1h</option>
                    <option value="2h">2h</option>
                    <option value="4h">4h</option>
                    <option value="6h">6h</option>
                    <option value="8h">8h</option>
                    <option value="12h">12h</option>
                    <option value="1d">1d</option>
                    <option value="3d">3d</option>
                    <option value="1w">1w</option>
                    <option value="1M">1M</option>
                </select>
            </div>

            <!-- Ticker -->
            <div id="pair-container" class="control-item flex items-center space-x-2">
                <label class="text-gray-500 font-bold uppercase text-[10px]">Pair:</label>
                <input type="text" id="coin" value="BTCUSDT" list="coin-list" placeholder="Search..." class="bg-brand-dark border border-brand-border text-white rounded px-3 py-1.5 w-32 uppercase font-bold text-xs shadow-inner transition-colors" />
                <datalist id="coin-list"></datalist>
            </div>

            <!-- Amount -->
            <div class="control-item flex items-center space-x-2">
                <label class="text-gray-500 font-bold uppercase text-[10px]">Amount:</label>
                <input type="number" id="amount" value="100" class="bg-brand-dark border border-brand-border text-white rounded px-3 py-1.5 w-24 text-xs shadow-inner" />
            </div>

            <!-- Leverage -->
            <div class="control-item flex items-center space-x-2">
                <label class="text-gray-500 font-bold uppercase text-[10px]">Leverage:</label>
                <input type="number" id="leverage" value="10" min="1" max="125" class="bg-brand-dark border border-brand-border text-white rounded px-3 py-1.5 w-16 text-xs shadow-inner" />
            </div>

        </div>
              
        <!-- Chart Area -->
        <div class="max-w-7xl mx-auto px-6 w-full">
            <div id="chart-wrapper" class="bg-brand-dark-blue border border-brand-border rounded-2xl p-4 h-[500px] relative shadow-2xl overflow-hidden">
                <canvas id="chart" class="block w-full h-full cursor-crosshair"></canvas>
            </div>
        </div>

        <!-- Alpha V3 Dashboard -->
        <div class="max-w-7xl mx-auto px-6 mt-8">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                
                <!-- Signal Logic Card -->
                <div class="lg:col-span-2 bg-brand-dark-blue border border-brand-border rounded-2xl p-6 shadow-2xl relative overflow-hidden">
                    <div class="text-[10px] text-gray-500 font-black uppercase tracking-widest mb-4">Market Sentiment</div>
                    <div class="flex items-center justify-between mb-8">
                        <div id="alpha-v3-direction" class="text-6xl font-black italic tracking-tighter text-white">CALCULATING</div>
                        <div class="text-center bg-black/40 px-6 py-3 rounded-2xl border border-brand-border">
                            <div class="text-[9px] text-gray-500 font-bold uppercase mb-1">Alignment</div>
                            <div id="alpha-v3-score" class="text-2xl font-black text-brand-gold leading-none">--</div>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-4">
                        <div class="bg-black/20 p-3 rounded-xl border border-brand-border text-center">
                            <div class="text-[8px] text-yellow-500 font-bold uppercase mb-1">EMA 20 (Fast)</div>
                            <div id="ma-fast" class="text-xs font-mono font-bold">--</div>
                        </div>
                        <div class="bg-black/20 p-3 rounded-xl border border-brand-border text-center">
                            <div class="text-[8px] text-blue-500 font-bold uppercase mb-1">EMA 50 (Mid)</div>
                            <div id="ma-mid" class="text-xs font-mono font-bold">--</div>
                        </div>
                        <div class="bg-black/20 p-3 rounded-xl border border-brand-border text-center">
                            <div class="text-[8px] text-red-500 font-bold uppercase mb-1">EMA 200 (Slow)</div>
                            <div id="ma-slow" class="text-xs font-mono font-bold">--</div>
                        </div>
                    </div>
                </div>

                <!-- Risk/Targets Card -->
                <div class="bg-brand-dark-blue border border-brand-border rounded-2xl p-6 shadow-lg">
                    <div class="text-[10px] text-gray-500 font-black uppercase tracking-widest mb-6">Strategic Targets</div>
                    <div class="space-y-4">
                        <div class="flex justify-between items-center"><span class="text-xs text-gray-400">Target 2:</span> <span id="v3-tp2" class="text-sm font-mono font-bold text-green-400">--</span></div>
                        <div class="flex justify-between items-center"><span class="text-xs text-gray-400">Target 1:</span> <span id="v3-tp1" class="text-sm font-mono font-bold text-green-500">--</span></div>
                        <div class="flex justify-between items-center border-y border-brand-border py-2"><span class="text-xs text-white uppercase font-bold">Entry:</span> <span id="v3-entry" class="text-sm font-mono font-bold text-brand-gold">--</span></div>
                        <div class="flex justify-between items-center"><span class="text-xs text-gray-400">Stop Loss:</span> <span id="v3-sl" class="text-sm font-mono font-bold text-red-500">--</span></div>
                    </div>
                </div>

                <!-- MA Flow Card -->
                <div class="bg-brand-dark-blue border border-brand-border rounded-2xl p-6 shadow-lg">
                    <div class="text-[10px] text-gray-500 font-black uppercase tracking-widest mb-6">Indicator Convergence</div>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center p-2.5 bg-black/30 rounded-xl border border-brand-border">
                            <span class="text-[10px] text-gray-400 font-bold uppercase">Alignment</span>
                            <span id="flow-alignment" class="text-[10px] font-black uppercase text-white">SCANNING</span>
                        </div>
                        <div class="flex justify-between items-center p-2.5 bg-black/30 rounded-xl border border-brand-border">
                            <span class="text-[10px] text-gray-400 font-bold uppercase">Market Gap</span>
                            <span id="flow-gap" class="text-[10px] font-black uppercase text-white">--</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>

        document.addEventListener('DOMContentLoaded', () => {
        const canvas = document.getElementById("chart");
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        let socket;

        const marketEl = document.getElementById("market");
        const intervalEl = document.getElementById("interval");
        const coinEl = document.getElementById("coin");

        let symbol = coinEl?.value.toUpperCase() || "BTCUSDT";
        let interval = intervalEl?.value || "1m";
        let allData = [];
        let visibleCount = 80;
        let offset = 0;
        let mouse = { x:null, y:null }, lastPriceRange = 0, lastChartHeight = 0;
        let dragging = false, lastX = 0, priceScale = 1, priceOffset = 0, draggingPrice = false, lastY = 0;

        // --- EMA MATH ---
        const calculateEMA = (d, p) => {
            if (d.length < p) return null;
            let ema = d.slice(0, p).reduce((a, b) => a + b, 0) / p;
            const mult = 2 / (p + 1);
            for (let i = p; i < d.length; i++) ema = (d[i] - ema) * mult + ema;
            return ema;
        };

        // Dynamic formatting for low-priced coins (PEPE, SHIB, etc.)
        const formatPrice = (p) => {
            if (!p && p !== 0) return "--";
            const price = parseFloat(p);
            if (price >= 100) return price.toFixed(2);
            if (price >= 1) return price.toFixed(4);
            if (price >= 0.0001) return price.toFixed(6);
            return price.toFixed(8); // Show 8 decimals for very low prices
        };

        async function fetchCandles() {
            const endpoint = marketEl.value === "futures" ? "fapi.binance.com/fapi/v1/klines" : "api.binance.com/api/v3/klines";
            try {
                const res = await fetch(`https://${endpoint}?symbol=${symbol}&interval=${interval}&limit=500`);
                allData = await res.json();
                document.getElementById("current-pair-display").textContent = symbol;
                draw();
                startWebSocket();
            } catch (e) { console.error(e); }
        }

        function draw() {
            if (!allData.length) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const padding = 40, priceWidth = 80, chartH = canvas.height - padding * 2 - 30, chartW = canvas.width - padding * 2 - priceWidth;
            const end = allData.length - offset, start = Math.max(0, end - visibleCount), data = allData.slice(start, end);
            if (allData.length < 200 || !data.length) return;

            // --- TRIPLE MA ANALYTICS ---
            // PRO TIP: Use the last CLOSED candle (index -2) for the signal to prevent flickering/repainting
            const closes = allData.map(d => +d[4]);
            const lastClosedIdx = closes.length - 2;
            const livePrice = closes[closes.length - 1];
            
            const closedCloses = closes.slice(0, lastClosedIdx + 1);
            const ema20 = calculateEMA(closedCloses, 20);
            const ema50 = calculateEMA(closedCloses, 50);
            const ema200 = calculateEMA(closedCloses, 200);
            const entryPrice = closes[lastClosedIdx];

            let direction = "NEUTRAL";
            let color = "#666";
            let alignmentText = "Scanning...";

            if (ema20 && ema50 && ema200) {
                const isBullish = ema20 > ema50 && ema50 > ema200;
                const isBearish = ema20 < ema50 && ema50 < ema200;

                // Check Trend Momentum (Are EMAs fanning out?)
                const prevCloses = closes.slice(0, lastClosedIdx);
                const pEma20 = calculateEMA(prevCloses, 20);
                const pEma50 = calculateEMA(prevCloses, 50);
                const momentum = Math.abs(ema20 - ema50) > Math.abs(pEma20 - pEma50);

                // Full Bullish Alignment: 20 > 50 > 200
                if (isBullish) {
                    direction = momentum ? "STRONG BUY" : "BUY";
                    color = "#4ade80";
                    alignmentText = momentum ? "Bullish Breakout" : "Bullish Trend";
                } 
                // Full Bearish Alignment: 20 < 50 < 200
                else if (isBearish) {
                    direction = momentum ? "STRONG SELL" : "SELL";
                    color = "#f87171";
                    alignmentText = momentum ? "Bearish Breakdown" : "Bearish Trend";
                } else {
                    direction = "CONSOLIDATION";
                    color = "#fbbf24";
                    alignmentText = "No Clear Trend";
                }
            }

            // Dashboard Updates
            document.getElementById("alpha-v3-direction").textContent = direction;
            document.getElementById("alpha-v3-direction").style.color = color;
            document.getElementById("alpha-v3-score").textContent = alignmentText;
            document.getElementById("ma-fast").textContent = formatPrice(ema20);
            document.getElementById("ma-mid").textContent = formatPrice(ema50);
            document.getElementById("ma-slow").textContent = formatPrice(ema200);
            document.getElementById("flow-alignment").textContent = alignmentText;
            document.getElementById("flow-alignment").style.color = color;

            // Strategic Targets (Wider ranges for better Risk:Reward)
            const baseGap = Math.abs(ema20 - ema50);
            const minGap = entryPrice * 0.015; // Ensure at least 1.5% gap
            const gap = Math.max(baseGap, minGap);
            
            const isBull = ema20 > ema50;
            const tp1Price = isBull ? entryPrice + gap * 2 : entryPrice - gap * 2;
            const tp2Price = isBull ? entryPrice + gap * 4 : entryPrice - gap * 4;
            const slPrice = isBull ? Math.min(ema50, entryPrice - gap * 1.5) : Math.max(ema50, entryPrice + gap * 1.5);

            document.getElementById("v3-entry").textContent = formatPrice(entryPrice);
            document.getElementById("v3-tp1").textContent = formatPrice(tp1Price);
            document.getElementById("v3-tp2").textContent = formatPrice(tp2Price);
            document.getElementById("v3-sl").textContent = formatPrice(slPrice);
            document.getElementById("flow-gap").textContent = (gap / entryPrice * 100).toFixed(2) + "%";

            // --- DRAWING ---
            const prices = data.flatMap(d => [+d[2], +d[3]]);
            let maxP = Math.max(...prices), minP = Math.min(...prices);
            if (priceScale !== 1) {
                const mid = (maxP + minP) / 2;
                maxP = mid + (maxP - mid) * priceScale;
                minP = mid - (mid - minP) * priceScale;
            }
            lastPriceRange = maxP - minP;
            lastChartHeight = chartH;

            maxP += priceOffset; minP += priceOffset;
            const priceToY = p => padding + (maxP - p) / (maxP - minP) * chartH;
            const candleW = chartW / data.length;

            // Draw MA Lines on Chart
            const drawMA = (period, lineColor, width) => {
                ctx.strokeStyle = lineColor; ctx.lineWidth = width; ctx.beginPath();
                data.forEach((d, i) => {
                    const localIdx = start + i;
                    const val = calculateEMA(closes.slice(0, localIdx + 1), period);
                    if (val) {
                        const x = padding + i * candleW + candleW / 2;
                        const y = priceToY(val);
                        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    }
                });
                ctx.stroke();
            };
            
            if (ema200) drawMA(200, "rgba(239, 68, 68, 0.5)", 2); // Slow - Red
            if (ema50) drawMA(50, "rgba(59, 130, 246, 0.6)", 1.5); // Mid - Blue
            if (ema20) drawMA(20, "rgba(250, 204, 21, 0.8)", 1.5); // Fast - Yellow

            // Grid
            ctx.font = "10px Arial"; ctx.fillStyle = "#444"; ctx.strokeStyle = "#1f242d";
            for (let i = 0; i <= 5; i++) {
                const p = minP + (i / 5) * (maxP - minP);
                const y = priceToY(p);
                ctx.beginPath(); ctx.moveTo(padding, y); ctx.lineTo(padding + chartW, y); ctx.stroke();
                ctx.fillText(formatPrice(p), padding + chartW + 5, y + 4);
            }

            // Candles
            data.forEach((d, i) => {
                const o = +d[1], h = +d[2], l = +d[3], c = +d[4], x = padding + i * candleW, bull = c >= o;
                ctx.strokeStyle = ctx.fillStyle = bull ? "#0ecb81" : "#f6465d";
                ctx.beginPath(); ctx.moveTo(x + candleW / 2, priceToY(h)); ctx.lineTo(x + candleW / 2, priceToY(l)); ctx.stroke();
                ctx.fillRect(x + candleW * 0.2, Math.min(priceToY(o), priceToY(c)), candleW * 0.6, Math.max(1, Math.abs(priceToY(o) - priceToY(c))));
            });

            // --- Draw Strategic Levels ---
            const drawLevel = (price, label, color) => {
                const y = priceToY(price);
                if (y < padding || y > padding + chartH) return;
                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = color;
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(padding, y); ctx.lineTo(padding + chartW, y); ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillStyle = color;
                ctx.font = "bold 9px Inter";
                ctx.fillText(label, padding + 5, y - 5);
            };

            if (ema20 && ema50 && direction !== "WAITING" && direction !== "NEUTRAL") {
                drawLevel(tp2Price, "TARGET 2", "#3ee69b");
                drawLevel(tp1Price, "TARGET 1", "#10b981");
                drawLevel(slPrice, "STOP LOSS", "#f6465d");
            }

            // Price Line
            const yLast = priceToY(livePrice);
            ctx.strokeStyle = "#c5a059"; ctx.setLineDash([2, 2]);
            ctx.beginPath(); ctx.moveTo(padding, yLast); ctx.lineTo(padding + chartW, yLast); ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = "#c5a059"; ctx.fillRect(padding + chartW, yLast - 10, priceWidth, 20);
            ctx.fillStyle = "#000"; ctx.fillText(formatPrice(livePrice), padding + chartW + 5, yLast + 4);
            ctx.fillStyle = "#c5a059"; ctx.font = "bold 9px Inter"; ctx.fillText("LIVE PRICE", padding + 5, yLast - 5);
        }

        // --- EVENTS ---
        const resize = () => { if (canvas.parentElement) { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; } draw(); };
        window.addEventListener("resize", resize); setTimeout(resize, 100);

        const triggerAutoUpdate = () => {
            if (!coinEl || !intervalEl) return;
            symbol = coinEl.value.toUpperCase();
            interval = intervalEl.value;
            if (socket) { socket.onclose = null; socket.close(); }
            fetchCandles();
        };

        if (marketEl) marketEl.addEventListener("change", triggerAutoUpdate);
        if (intervalEl) intervalEl.addEventListener("change", triggerAutoUpdate);
        if (coinEl) {
            coinEl.addEventListener("change", triggerAutoUpdate);
            coinEl.addEventListener("keydown", (e) => { if (e.key === "Enter") triggerAutoUpdate(); });
        }

        canvas.addEventListener("mousemove", e => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
            
            // Handle Price Scale Dragging
            if (draggingPrice) {
                const dy = e.clientY - lastY;
                lastY = e.clientY;
                // Drag down (+) -> Zoom out (increase range) -> scale increases
                // Drag up (-) -> Zoom in (decrease range) -> scale decreases
                priceScale *= (1 + dy * 0.005);
                priceScale = Math.max(0.1, Math.min(priceScale, 10)); // Limits
                draw();
                return;
            }

            if (dragging) {
                const dx = e.clientX - lastX;
                const move = Math.round(dx / 10);
                offset = Math.max(0, Math.min(allData.length - visibleCount, offset + move));
                lastX = e.clientX;
                
                // Y Pan (Vertical Drag)
                const dy = e.clientY - lastY;
                if (lastChartHeight > 0) {
                    const pricePerPixel = lastPriceRange / lastChartHeight;
                    priceOffset += dy * pricePerPixel;
                }
                lastY = e.clientY;
            }
            
            // Change cursor if hovering over price scale
            const padding = 40;
            const priceScaleWidth = 80;
            if (mouse.x > canvas.width - padding - priceScaleWidth) {
                canvas.style.cursor = "ns-resize";
            } else if (dragging) {
                canvas.style.cursor = "grabbing";
            } else {
                canvas.style.cursor = "crosshair";
            }
            
            draw();
        });

        canvas.addEventListener("mousedown", e => { 
            const padding = 40;
            const priceScaleWidth = 80;
            const scaleStartX = canvas.width - padding - priceScaleWidth;
            
            if (mouse.x > scaleStartX) {
                draggingPrice = true;
                lastY = e.clientY;
            } else {
                dragging = true; 
                lastX = e.clientX; 
                lastY = e.clientY;
            }
        });
        
        canvas.addEventListener("mouseup", () => { 
            dragging = false; 
            draggingPrice = false; 
        });
        
        canvas.addEventListener("mouseleave", () => { 
            dragging = false; 
            draggingPrice = false;
            mouse.x = null; 
            draw(); 
        });

        // Double click to reset price scale
        canvas.addEventListener("dblclick", () => {
            priceScale = 1;
            priceOffset = 0;
            draw();
        });
        
        canvas.addEventListener("wheel", e => {
            e.preventDefault();
            visibleCount += e.deltaY > 0 ? 10 : -10;
            visibleCount = Math.max(minVisible, Math.min(maxVisible, visibleCount));
            offset = Math.min(offset, allData.length - visibleCount);
            draw();
        }, { passive:false });

        function startWebSocket() {
            const wsMarket = marketEl.value === "futures" ? "fstream" : "stream";
            socket = new WebSocket(`wss://${wsMarket}.binance.com/ws/${symbol.toLowerCase()}@kline_${interval}`);
            socket.onmessage = e => {
                const msg = JSON.parse(e.data);
                if (msg.k) {
                    const c = [msg.k.t, msg.k.o, msg.k.h, msg.k.l, msg.k.c, msg.k.v];
                    const last = allData[allData.length - 1];
                    if (last && last[0] === c[0]) allData[allData.length - 1] = c;
                    else { allData.push(c); if (allData.length > 500) allData.shift(); }
                    requestAnimationFrame(draw);
                }
            };
        }

        fetchCandles();
    });
    </script>

    <script src="/static/js/footer.js"></script>
    <script src="/static/lock.js"></script>
</body>
</html>
