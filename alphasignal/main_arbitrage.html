<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGL Crypto | Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/main_style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-gold': '#f0b90b',
                        'brand-dark': '#05070a',
                        'brand-dark-blue': '#0b0e11',
                        'brand-border': '#1e2329'
                    }
                }
            }
        }
    </script>
    <style>
        .glass-card { background: rgba(11, 14, 17, 0.7); backdrop-filter: blur(12px); border: 1px solid #1e2329; }
        .active-link { background: #f0b90b; color: black !important; }
        .sidebar-item:hover:not(.active-link) { background: rgba(240, 185, 11, 0.1); color: #f0b90b; }
    </style>
</head>
<body class="bg-brand-dark text-white min-h-screen overflow-hidden">

    <!-- Global Header Integration -->
    <script src="/static/js/main_translate.js"></script>
    <script src="/static/js/header.js"></script>

    <div class="flex h-screen pt-[84px]"> <!-- Header-ийн өндөртэй тааруулж (Donate bar 28px + Nav 56px) pt-[84px] болгов -->

    <!-- Sidebar -->
    <aside class="w-64 border-r border-brand-border flex flex-col h-full bg-brand-dark-blue">
        <div class="p-6 text-xl font-black tracking-tighter italic">PRO <span class="text-brand-gold">DASHBOARD</span></div>
        
        <nav class="flex-1 px-4 space-y-2 mt-4 font-bold text-xs uppercase tracking-wider text-gray-400">
            
            <!-- Market Tools Section -->
            <div class="mb-6">
                <p class="px-3 mb-3 text-[9px] text-gray-600 font-black tracking-[0.2em] uppercase text-brand-gold/50">Market Intelligence</p>
                <a href="#" onclick="showTool('arbitrage')" id="link-arbitrage" class="sidebar-item flex items-center p-3 rounded-lg transition-all active-link">
                    <i class="fas fa-exchange-alt mr-3"></i> Arbitrage Scanner
                </a>
                <a href="#" onclick="showTool('kucoin_spot')" id="link-kucoin-spot" class="sidebar-item flex items-center p-3 rounded-lg transition-all" data-i18n="nav-kucoin-spot">
                    <i class="fas fa-chart-line mr-3"></i> KuCoin Spot Data
                </a>
            </div>

            <!-- Referral/Exchange Section -->
            <div class="pt-6 border-t border-brand-border/50">
                <p class="px-3 mb-3 text-[9px] text-brand-gold font-black tracking-[0.2em] uppercase">Partner Exchanges</p>
                <a href="YOUR_BINANCE_LINK" target="_blank" class="sidebar-item flex items-center p-3 rounded-lg transition-all hover:text-brand-gold">
                    <i class="fab fa-binance mr-3 text-lg"></i> Binance
                </a>
                <a href="YOUR_MEXC_LINK" target="_blank" class="sidebar-item flex items-center p-3 rounded-lg transition-all hover:text-brand-gold">
                    <i class="fas fa-chart-line mr-3 text-lg"></i> MEXC Global
                </a>
                <a href="YOUR_BYBIT_LINK" target="_blank" class="sidebar-item flex items-center p-3 rounded-lg transition-all hover:text-brand-gold">
                    <i class="fas fa-layer-group mr-3 text-lg"></i> Bybit
                </a>
                <a href="#" onclick="showTool('kucoin_spot')" class="sidebar-item flex items-center p-3 rounded-lg transition-all hover:text-brand-gold">
                    <i class="fas fa-coins mr-3 text-lg"></i> KuCoin
                </a>
            </div>
        </nav>

        <div class="p-6 border-t border-brand-border bg-black/20">
            <div id="user-info" class="text-[10px] text-brand-gold font-black uppercase tracking-widest">Connect Wallet...</div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-8 relative">
        <div id="update-alert-placeholder"></div>
        
        <header class="flex justify-between items-center mb-8">
            <h1 id="tool-title" class="text-3xl font-black uppercase italic tracking-tighter text-white">Arbitrage <span class="text-brand-gold">Scanner</span></h1>
            <div id="market-status" class="text-[10px] font-black px-4 py-1.5 bg-green-500/10 text-green-400 rounded-full border border-green-500/20 uppercase">
                <i class="fas fa-circle text-[8px] mr-2 animate-pulse"></i> Live Market Data
            </div>
        </header>

        <div id="content-area">
            <!-- Dynamic Content Loaded Here -->
        </div>
    </main>
    </div>

    <!-- Footer Integration -->
    <div class="relative z-10">
        <script src="/static/js/footer.js"></script>
    </div>

    <script src="/static/js/arbitrage-scanner.js"></script>
    <script src="/static/js/dashboard-engine.js"></script>    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            showTool('arbitrage');
            if (typeof fetchMarketOverview === 'function') fetchMarketOverview();
        });
    </script>
</body>
</html>
