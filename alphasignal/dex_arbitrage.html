<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEX Arbitrage | MGL Signal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-gold': '#f0b90b',
                        'brand-dark': '#05070a',
                        'brand-dark-blue': '#0b0e11',
                        'brand-border': '#1e2329'
                    }
                }
            }
        }
    </script>
    <style>
        .glass-card { background: rgba(11, 14, 17, 0.7); backdrop-filter: blur(12px); border: 1px solid #1e2329; }
    </style>
</head>
<body class="bg-brand-dark text-white min-h-screen">
    <script src="static/js/main_translate.js"></script>
    <script src="static/js/header.js"></script>

    <main class="pt-32 pb-12 px-6 max-w-7xl mx-auto">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-black uppercase italic tracking-tighter text-white">DEX <span class="text-brand-gold">Arbitrage</span></h1>
            <p class="text-gray-500 text-sm mt-2 uppercase font-bold tracking-widest">Decentralized Wallet Execution</p>
        </div>

        <div class="flex flex-col gap-6 animate-in fade-in duration-500">
            <div class="glass-card p-12 rounded-2xl border border-brand-border flex flex-col items-center justify-center text-center bg-gradient-to-b from-brand-dark-blue to-black">
                <div class="w-24 h-24 bg-brand-gold/10 rounded-full flex items-center justify-center mb-8 border border-brand-gold/20 shadow-2xl shadow-brand-gold/5">
                    <i class="fas fa-wallet text-brand-gold text-4xl"></i>
                </div>
                <h2 class="text-3xl font-black text-white uppercase tracking-tighter mb-3">Connect Your Web3 Wallet</h2>
                <p class="text-gray-500 text-sm max-w-lg mb-10 leading-relaxed font-medium">Энэхүү хэрэгсэл нь таны хэтэвчийг Uniswap, PancakeSwap болон бусад DEX-үүдтэй холбож, үнийн зөрүүг автоматаар арилжаалах зориулалттай.</p>
                
                <button onclick="alert('Web3 Integration is under development.')" class="bg-brand-gold text-black font-black py-4 px-12 rounded-xl hover:bg-white hover:scale-105 transition-all shadow-2xl shadow-brand-gold/20 uppercase text-xs tracking-widest">
                    <i class="fas fa-plug mr-2"></i> Connect MetaMask
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 opacity-30 grayscale pointer-events-none">
                <div class="glass-card p-6 rounded-2xl border border-brand-border">
                    <div class="text-[10px] font-black text-gray-600 uppercase tracking-widest mb-4">Total Profit Today</div>
                    <div class="text-2xl font-black text-white italic">$0.00</div>
                </div>
                <div class="glass-card p-6 rounded-2xl border border-brand-border">
                    <div class="text-[10px] font-black text-gray-600 uppercase tracking-widest mb-4">Gas Status</div>
                    <div class="text-2xl font-black text-white italic">-- Gwei</div>
                </div>
                <div class="glass-card p-6 rounded-2xl border border-brand-border">
                    <div class="text-[10px] font-black text-gray-600 uppercase tracking-widest mb-4">Connected Chain</div>
                    <div class="text-2xl font-black text-white italic">None</div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
