<body class="bg-brand-dark text-white font-inter flex flex-col min-h-screen">

    <!-- Global Header -->
    <script src="/static/js/main_translate.js"></script>
    <script src="/static/js/header.js"></script>

    <!-- Main Content Area -->
    <main class="flex-grow pt-32 pb-12 px-4 md:px-6">
        <div class="max-w-7xl mx-auto flex flex-col gap-6">
            
            <!-- 1. Controls Component (Market, Time, Pair, etc.) -->
            <script>
            (function() {
                const currentScript = document.currentScript;
                if (!currentScript) return;

                const controlHTML = `
                <div class="controls-container flex flex-wrap items-center gap-4 p-4 bg-brand-dark-blue border border-brand-border rounded-xl shadow-lg">
                    <!-- Market -->
                    <div class="control-item flex items-center space-x-2">
                        <label class="text-gray-500 font-bold uppercase text-[10px]">Market:</label>
                        <select id="market" class="bg-brand-dark border border-brand-border text-white rounded px-3 py-1.5 text-xs shadow-inner">
                            <option value="futures" selected>Futures</option>
                            <option value="spot">Spot</option>
                        </select>
                    </div>

                    <!-- Timeframe -->
                    <div class="control-item flex items-center space-x-2">
                        <label class="text-gray-500 font-bold uppercase text-[10px]">Time:</label>
                        <select id="interval" class="bg-brand-dark border border-brand-border text-white rounded px-3 py-1.5 text-xs shadow-inner">
                            <option value="1s">1s</option>
                            <option value="1m" selected>1m</option>
                            <option value="3m">3m</option>
                            <option value="5m">5m</option>
                            <option value="15m">15m</option>
                            <option value="30m">30m</option>
                            <option value="1h">1h</option>
                            <option value="2h">2h</option>
                            <option value="4h">4h</option>
                            <option value="6h">6h</option>
                            <option value="8h">8h</option>
                            <option value="12h">12h</option>
                            <option value="1d">1d</option>
                            <option value="3d">3d</option>
                            <option value="1w">1w</option>
                            <option value="1M">1M</option>
                        </select>
                    </div>

                    <!-- Ticker -->
                    <div id="pair-container" class="control-item flex items-center space-x-2">
                        <label class="text-gray-500 font-bold uppercase text-[10px]">Pair:</label>
                        <input type="text" id="coin" value="BTCUSDT" list="coin-list" placeholder="Search..." class="bg-brand-dark border border-brand-border text-white rounded px-3 py-1.5 w-32 uppercase font-bold text-xs shadow-inner transition-colors" />
                        <datalist id="coin-list"></datalist>
                    </div>
                </div>
                `;

                currentScript.insertAdjacentHTML('beforebegin', controlHTML);

                // LIVE Статус индикатор нэмэх (UI-д харагдана)
                const controls = document.querySelector('.controls-container');
                controls.insertAdjacentHTML('beforeend', `<div id="ws-status" class="ml-auto flex items-center space-x-2 bg-black/40 px-3 py-1.5 rounded-lg border border-brand-border"><span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse" id="ws-dot"></span><span class="text-[9px] font-black uppercase text-gray-500" id="ws-text">Disconnected</span></div>`);

                // Logic from ticker.js to populate symbols
                async function fetchAndPopulateSymbols() {
                    const marketEl = document.getElementById("market");
                    const coinList = document.getElementById('coin-list');
                    
                    if (coinList) coinList.innerHTML = '';

                    const market = marketEl ? marketEl.value : 'spot';
                    
                    const url = market === 'futures' 
                        ? 'https://fapi.binance.com/fapi/v1/exchangeInfo' 
                        : 'https://api.binance.com/api/v3/exchangeInfo';
                    
                    try {
                        const response = await fetch(url);
                        const data = await response.json();
                        if (!document.getElementById('coin-list')) return;

                        const symbols = data.symbols || [];
                        let usdtSymbols = [];

                        if (market === 'futures') {
                            usdtSymbols = symbols.filter(s => s.quoteAsset === 'USDT' && s.status === 'TRADING' && s.contractType === 'PERPETUAL').map(s => s.symbol);
                        } else {
                            usdtSymbols = symbols.filter(s => s.quoteAsset === 'USDT' && s.status === 'TRADING' && !s.symbol.endsWith('UP') && !s.symbol.endsWith('DOWN') && !s.symbol.endsWith('BEAR') && !s.symbol.endsWith('BULL')).map(s => s.symbol);
                        }

                        usdtSymbols.sort().forEach(symbol => {
                            const option = document.createElement('option');
                            option.value = symbol;
                            coinList.appendChild(option);
                        });
                    } catch (error) {
                        console.error("Failed to fetch symbol list:", error);
                    }
                }

                // Run logic after DOM is ready
                document.addEventListener('DOMContentLoaded', () => {
                    const marketEl = document.getElementById("market");
                    const intervalEl = document.getElementById("interval");

                    // Удирдлагын логикийг нэгтгэсэн функц
                    window.syncControlsAndFetch = function() {
                        if (!marketEl || !intervalEl) return;
                        
                        const isFutures = marketEl.value === 'futures';
                        const option1s = intervalEl.querySelector('option[value="1s"]');

                        if (isFutures) {
                            if (option1s) option1s.style.display = 'none';
                            if (intervalEl.value === '1s') intervalEl.value = '1m';
                        } else {
                            if (option1s) option1s.style.display = 'block';
                        }

                        // Түлхүүр үгсийг шинэчлэх
                        fetchAndPopulateSymbols();
                    }

                    syncControlsAndFetch();
                });
            })();
            </script>

            <!-- 2. Chart Component -->
            <script>
            (function() {
                const currentScript = document.currentScript;
                if (!currentScript) return;

                const chartHTML = `
                <div id="chart-wrapper" class="relative w-full h-[600px] bg-[#05070a] border-y border-brand-border overflow-hidden">
                    <canvas id="chart" class="block w-full h-full cursor-crosshair"></canvas>
                </div>
                `;
                currentScript.insertAdjacentHTML('beforebegin', chartHTML);
            })();

            // Дуудагдахгүй байсан функцийг тодорхойлж алдаанаас сэргийлнэ
            window.dispatchChartUpdate = function() { /* Шаардлагатай бол энд UI синхрончлол хийж болно */ }

            document.addEventListener('DOMContentLoaded', () => {
                const canvas = document.getElementById("chart");
                if (!canvas) return;
                
                const ctx = canvas.getContext("2d");
                let socket;
                
                // DOM Elements form Controls
                const marketEl = document.getElementById("market");
                const intervalEl = document.getElementById("interval");
                const coinEl = document.getElementById("coin");

                // State
                let symbol = coinEl && coinEl.value ? coinEl.value.toUpperCase() : "BTCUSDT";
                let interval = intervalEl ? intervalEl.value : "1m";
                let allData = [];
                let visibleCount = 80;
                let offset = 0; // pan offset
                const minVisible = 20;
                const maxVisible = 200;
                let mouse = { x:null, y:null };
                let dragging = false;
                let lastX = 0;
                
                // Price Scale State
                let priceScale = 1; // Y-тэнхлэгийн масштабын коэффициент
                let priceOffset = 0;
                let draggingPrice = false;
                let lastY = 0;
                let lastPriceRange = 0;
                let lastChartHeight = 0;

                function resize() {
                    if (canvas.parentElement) {
                        canvas.width = canvas.parentElement.clientWidth;
                        canvas.height = canvas.parentElement.clientHeight;
                    } else {
                        canvas.width = window.innerWidth;
                        canvas.height = window.innerHeight;
                    }
                    draw();
                }
                
                window.addEventListener("resize", resize);
                // Initial resize after a short delay to ensure container is rendered
                setTimeout(resize, 100);

                function formatPrice(price) {
                    if (price >= 100) return price.toFixed(2);
                    if (price >= 1) return price.toFixed(4);
                    if (price >= 0.001) return price.toFixed(6);
                    return price.toPrecision(4);
                }

                async function fetchCandles() {
                    if (!marketEl || !coinEl) return;

                    // Ensure symbol is valid
                    if (!symbol) symbol = "BTCUSDT";
                    
                    let url;
                    if (marketEl.value === "futures") {
                        url = `https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=${interval}&limit=500`;
                    } else {
                        url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=500`;
                    }

                    try {
                        console.log(`[FetchCandles] Fetching historical data from: ${url}`);
                        const res = await fetch(url);
                        if (!res.ok) {
                            throw new Error(`HTTP error! status: ${res.status} - ${res.statusText}`);
                        }
                        allData = await res.json(); // JSON датаг татаж авна
                        console.log(`[FetchCandles] Fetched ${allData.length} candles for ${symbol} (${interval}) on ${marketEl.value}`);
                        draw();
                        dispatchChartUpdate();
                        startWebSocket();
                    } catch (e) {
                        console.error("Error fetching candles:", e);
                        // График дээр алдааны мессеж харуулах
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        ctx.fillStyle = "red";
                        ctx.font = "16px Arial";
                        ctx.textAlign = "center";
                        ctx.fillText(`Error fetching data: ${e.message}`, canvas.width / 2, canvas.height / 2);
                        // Алдаа гарвал WebSocket-ийг хаах
                        if (socket) { socket.onclose = null; socket.close(); socket = null; }
                    }
                }

                function draw() {
                    if (!allData || !allData.length) return;
                    
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    const padding = 40;
                    const priceScaleWidth = 80;
                    const timeScaleHeight = 30;
                    const chartHeight = canvas.height - padding * 2 - timeScaleHeight;
                    lastChartHeight = chartHeight;
                    const chartWidth = canvas.width - padding * 2 - priceScaleWidth;

                    const end = allData.length - offset;
                    const start = Math.max(0, end - visibleCount);
                    const data = allData.slice(start, end);
                    if (!data.length) return;

                    const prices = data.flatMap(d => [+d[2], +d[3]]);
                    let maxPrice = Math.max(...prices);
                    let minPrice = Math.min(...prices);

                    if (maxPrice === minPrice) {
                        const pricePadding = maxPrice > 1 ? maxPrice * 0.001 : 0.001;
                        maxPrice += pricePadding;
                        minPrice -= pricePadding;
                    }
                    if (maxPrice === minPrice) maxPrice += 1;

                    // Apply Price Scaling (Zoom Y)
                    if (priceScale !== 1) {
                        const mid = (maxPrice + minPrice) / 2;
                        const halfRange = (maxPrice - minPrice) / 2;
                        const scaledHalf = halfRange * priceScale;
                        maxPrice = mid + scaledHalf;
                        minPrice = mid - scaledHalf;
                    }

                    lastPriceRange = maxPrice - minPrice;

                    // Apply Price Offset (Pan Y)
                    maxPrice += priceOffset;
                    minPrice += priceOffset;

                    const priceToY = p => padding + (maxPrice - p) / (maxPrice - minPrice) * chartHeight;
                    const yToPrice = y => maxPrice - ((y - padding) / chartHeight) * (maxPrice - minPrice);
                    const candleWidth = chartWidth / data.length;

                    // Price grid
                    ctx.font = "12px Arial";
                    ctx.strokeStyle = "#1f2630";
                    ctx.fillStyle = "#aaa";

                    for (let i = 0; i <= 6; i++) {
                        const price = minPrice + (i / 6) * (maxPrice - minPrice);
                        const y = priceToY(price);
                        ctx.beginPath(); ctx.moveTo(padding, y); ctx.lineTo(padding + chartWidth, y); ctx.stroke();
                        ctx.fillText(formatPrice(price), padding + chartWidth + 5, y + 4);
                    }
                    
                    // Time grid
                    const numTicks = Math.max(2, Math.floor(chartWidth / 100));
                    const step = Math.ceil(data.length / numTicks);
                    ctx.textAlign = "center";

                    for (let i = 0; i < data.length; i += step) {
                        const x = padding + i * candleWidth + candleWidth / 2;
                        const ts = data[i][0];
                        const date = new Date(ts);
                        
                        let label;
                        if (interval.endsWith('d') || interval.endsWith('w') || interval.endsWith('M')) {
                            label = date.toLocaleDateString(undefined, { year: 'numeric', month: 'numeric', day: 'numeric' });
                        } else {
                            label = date.getHours().toString().padStart(2, '0') + ':' + date.getMinutes().toString().padStart(2, '0');
                        }

                        ctx.strokeStyle = "#1f2630";
                        ctx.beginPath(); ctx.moveTo(x, padding); ctx.lineTo(x, padding + chartHeight); ctx.stroke();
                        
                        ctx.fillStyle = "#aaa";
                        ctx.fillText(label, x, padding + chartHeight + 20);
                    }
                    ctx.textAlign = "left";

                    // Candles
                    data.forEach((d, i) => {
                        const open = +d[1], high = +d[2], low = +d[3], close = +d[4];
                        const x = padding + i * candleWidth;
                        const yO = priceToY(open);
                        const yC = priceToY(close);
                        const yH = priceToY(high);
                        const yL = priceToY(low);
                        const bull = close >= open;

                        const grd = ctx.createLinearGradient(x, yH, x, yL);
                        if (bull) {
                            grd.addColorStop(0, "#3ee69b");
                            grd.addColorStop(1, "#0ecb81");
                        } else {
                            grd.addColorStop(0, "#ffffff");
                            grd.addColorStop(1, "#ffffff");
                        }

                        ctx.fillStyle = grd;
                        ctx.strokeStyle = bull ? "#0ecb81" : "#ffffff";
                        ctx.shadowColor = bull ? "#0ecb81" : "#ffffff";
                        ctx.shadowBlur = 1;
                        
                        ctx.beginPath(); ctx.moveTo(x + candleWidth / 2, yH); ctx.lineTo(x + candleWidth / 2, yL); ctx.stroke();
                        ctx.fillRect(x + candleWidth * 0.2, Math.min(yO, yC), candleWidth * 0.6, Math.max(1, Math.abs(yO - yC)));
                        
                        ctx.shadowBlur = 0;
                    });

                    // Current price line
                    const lastClose = +data[data.length - 1][4];
                    const yLast = priceToY(lastClose);
                    ctx.setLineDash([5, 5]);
                    ctx.strokeStyle = "#f0b90b";
                    ctx.beginPath();
                    ctx.moveTo(padding, yLast);
                    ctx.lineTo(padding + chartWidth, yLast);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.fillStyle = "#f0b90b";
                    ctx.fillText(formatPrice(lastClose), padding + chartWidth + 5, yLast - 4);

                    // Crosshair
                    if (mouse.x && mouse.y && mouse.x > padding && mouse.x < padding + chartWidth && mouse.y > padding && mouse.y < padding + chartHeight) {
                        const index = Math.floor((mouse.x - padding) / candleWidth);
                        const candle = data[index];
                        if (candle) {
                            const candleX = padding + index * candleWidth + candleWidth / 2;
                            ctx.strokeStyle = "#888";
                            ctx.beginPath(); ctx.moveTo(candleX, padding); ctx.lineTo(candleX, padding + chartHeight); ctx.stroke();
                            ctx.beginPath(); ctx.moveTo(padding, mouse.y); ctx.lineTo(padding + chartWidth, mouse.y); ctx.stroke();

                            const price = yToPrice(mouse.y);
                            ctx.fillStyle = "#111"; ctx.fillRect(padding + chartWidth, mouse.y - 10, priceScaleWidth, 20);
                            ctx.fillStyle = "#fff"; ctx.fillText(formatPrice(price), padding + chartWidth + 5, mouse.y + 4);
                        }
                    }
                }

                const triggerAutoUpdate = () => {
                    if (!coinEl || !intervalEl || !marketEl) return;
                    
                    // 1. Market-аас хамаарч интервалыг засах
                    if (typeof window.syncControlsAndFetch === 'function') {
                        window.syncControlsAndFetch();
                    }

                    interval = intervalEl.value;
                    
                    // 2. БИНАНС-д зориулж симболыг цэвэрлэх (Зураас, ташуу зураас устгах)
                    // Жишээ нь: BTC-USDT -> BTCUSDT
                    let cleanSymbol = coinEl.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
                    if (!cleanSymbol) cleanSymbol = "BTCUSDT";
                    symbol = cleanSymbol;

                    // 3. ЧУХАЛ: Зах зээл солигдох үед графикийн байршлыг Reset хийх
                    // Ингэж байж Фьючерс дээр график "цогцос" шиг харагдахгүй, автоматаар голлогдоно
                    if (typeof window.resetChartView === 'function') {
                        window.resetChartView();
                    }
                    
                    if (socket) { socket.onclose = null; socket.close(); }
                    fetchCandles();
                };

                // Бүх удирдлагын элементүүд дээр өөрчлөлт сонсогч нэмэх
                if (marketEl) marketEl.addEventListener("change", triggerAutoUpdate);
                if (intervalEl) intervalEl.addEventListener("change", triggerAutoUpdate);
                if (coinEl) {
                    coinEl.addEventListener("change", triggerAutoUpdate);
                    coinEl.addEventListener("keydown", (e) => { if (e.key === "Enter") triggerAutoUpdate(); });
                }

                canvas.addEventListener("mousemove", e => {
                    const rect = canvas.getBoundingClientRect();
                    mouse.x = e.clientX - rect.left;
                    mouse.y = e.clientY - rect.top;
                    
                    // Handle Price Scale Dragging
                    if (draggingPrice) {
                        const dy = e.clientY - lastY;
                        lastY = e.clientY;
                        // Drag down (+) -> Zoom out (increase range) -> scale increases
                        // Drag up (-) -> Zoom in (decrease range) -> scale decreases
                        priceScale *= (1 + dy * 0.005);
                        priceScale = Math.max(0.1, Math.min(priceScale, 10)); // Limits
                        draw();
                        return;
                    }

                    if (dragging) {
                        const dx = e.clientX - lastX;
                        const move = Math.round(dx / 10);
                        offset = Math.max(0, Math.min(allData.length - visibleCount, offset + move));
                        lastX = e.clientX;
                        
                        // Y Pan (Vertical Drag)
                        const dy = e.clientY - lastY;
                        if (lastChartHeight > 0) {
                            const pricePerPixel = lastPriceRange / lastChartHeight;
                            priceOffset += dy * pricePerPixel;
                        }
                        lastY = e.clientY;
                    }
                    
                    // Change cursor if hovering over price scale
                    const padding = 40;
                    const priceScaleWidth = 80;
                    if (mouse.x > canvas.width - padding - priceScaleWidth) {
                        canvas.style.cursor = "ns-resize";
                    } else if (dragging) {
                        canvas.style.cursor = "grabbing";
                    } else {
                        canvas.style.cursor = "crosshair";
                    }
                    
                    draw();
                });

                canvas.addEventListener("mousedown", e => { 
                    const padding = 40;
                    const priceScaleWidth = 80;
                    const scaleStartX = canvas.width - padding - priceScaleWidth;
                    
                    if (mouse.x > scaleStartX) {
                        draggingPrice = true;
                        lastY = e.clientY;
                    } else {
                        dragging = true; 
                        lastX = e.clientX; 
                        lastY = e.clientY;
                    }
                });
                
                canvas.addEventListener("mouseup", () => { 
                    dragging = false; 
                    draggingPrice = false; 
                });
                
                canvas.addEventListener("mouseleave", () => { 
                    dragging = false; 
                    draggingPrice = false;
                    mouse.x = null; 
                    draw(); 
                });

                // Double click to reset price scale
                canvas.addEventListener("dblclick", () => {
                    priceScale = 1;
                    priceOffset = 0;
                    draw();
                });
                
                canvas.addEventListener("wheel", e => {
                    e.preventDefault();
                    visibleCount += e.deltaY > 0 ? 10 : -10;
                    visibleCount = Math.max(minVisible, Math.min(maxVisible, visibleCount));
                    offset = Math.min(offset, allData.length - visibleCount);
                    draw();
                }, { passive:false });

                function startWebSocket() {
                    // Өмнөх WebSocket холболтыг цэвэрхэн хаах
                    if (socket) {
                        socket.onclose = null;
                        socket.close();
                        console.log(`[WebSocket] Closed previous socket`);
                    }

                    const isFutures = marketEl.value === "futures";
                    
                    // БИНАНС ФЬЮЧЕРС ДЭЭР ЗООСНЫ НЭРИЙГ ЯГ ТАГ ПОД ХИЙТЭЛ ХӨРВҮҮЛЭХ
                    let currentCoin = coinEl.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
                    if (!currentCoin) currentCoin = "BTCUSDT";

                    // 🚨 ЧУХАЛ: Фьючерсийн домэйн болон урсгалын нэрийг засах
                    const baseDomain = isFutures ? "fstream.binance.com" : "stream.binance.com";
                    
                    // Бинанс Фьючерсийн клайн урсгал: btcudst@kline_1m
                    const streamName = `${currentCoin.toLowerCase()}@kline_${interval}`;
                    
                    // Фьючерс дээр 'ws' биш 'stream' ашиглах нь холболтыг тасралтгүй амьд байлгадаг
                    const wsUrl = isFutures 
                        ? `wss://${baseDomain}/stream?streams=${streamName}`
                        : `wss://${baseDomain}/ws/${streamName}`;
                    
                    console.log(`[WebSocket] Connecting to: ${wsUrl}`);
                    socket = new WebSocket(wsUrl);

                    const dot = document.getElementById('ws-dot');
                    const text = document.getElementById('ws-text');

                    socket.onopen = () => {
                        console.log(`[WebSocket] Opened for ${currentCoin} on ${marketEl.value.toUpperCase()}`);
                        if (dot) dot.className = "w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse";
                        if (text) {
                            text.innerText = `${marketEl.value.toUpperCase()} LIVE`;
                            text.className = "text-[9px] font-black uppercase text-green-500";
                        }
                    };

                    socket.onerror = (error) => {
                        console.error(`[WebSocket] Error:`, error);
                        if (dot) dot.className = "w-1.5 h-1.5 rounded-full bg-red-500";
                        if (text) text.innerText = "Error";
                    };

                    socket.onclose = (event) => {
                        console.log(`[WebSocket] Closed. Code: ${event.code}`);
                        if (dot) dot.className = "w-1.5 h-1.5 rounded-full bg-gray-600";
                        if (text) text.innerText = "Offline";
                    };

                    socket.onmessage = e => { 
                        const responseData = JSON.parse(e.data);
                        
                        // 🚨 БИНАНС ФЬЮЧЕРСИЙН СҮЙРЭЛ ДАНГАНЫГ ДАРСАН ЖИНХЭНЭ ШАЛГАЛТ:
                        let k = null;
                        
                        if (responseData.data && responseData.data.k) {
                            // Хэрэв Фьючерсийн /stream урсгал бол дата нь responseData.data.k дотор байна
                            k = responseData.data.k;
                        } else if (responseData.k) {
                            // Хэрэв хуучин Спотын урсгал бол дата нь шууд responseData.k дотор байна
                            k = responseData.k;
                        }

                        if (k) {
                            // Ногоон цэгийг анивчуулж амьд байгааг баталгаажуулна
                            if (dot) dot.style.opacity = (dot.style.opacity === '1') ? '0.5' : '1';

                            // Бүх стринг утгуудыг Canvas-д зориулж Тоо (Number) болгож хөрвүүлнэ
                            const openPrice  = Number(k.o);
                            const highPrice  = Number(k.h);
                            const lowPrice   = Number(k.l);
                            const closePrice = Number(k.c);
                            const volume     = Number(k.v);
                            const klineTime  = k.t;

                            // Шинэ лааны Array бэлдэх [Timestamp, Open, High, Low, Close, Volume]
                            const currentCandle = [klineTime, openPrice, highPrice, lowPrice, closePrice, volume]; 
                            
                            if (allData && allData.length > 0) {
                                const lastCandle = allData[allData.length - 1]; 
                                
                                // Хэрэв тухайн минут дуусаагүй, одоо үргэлжилж байгаа лаа бол хамгийн сүүлийн лааг шинэчилнэ
                                if (lastCandle && lastCandle[0] === currentCandle[0]) {
                                    allData[allData.length - 1] = currentCandle; 
                                } else { 
                                    // Минут солигдвол шинэ лаа болгож Array-ийн ард нэмнэ
                                    allData.push(currentCandle); 
                                    if (allData.length > 500) allData.shift(); 
                                } 
                                
                                // 🔥 ЦААСАН ДЭЭР ДАХИН ЗУРАХЫГ ШУУД ТҮЛХЭХ (Амьд организм болгох)
                                draw();
                                
                                if (typeof window.dispatchChartUpdate === 'function') {
                                    window.dispatchChartUpdate();
                                }
                            }
                        } 
                    };
                }

                // Initial Load
                fetchCandles();
            });
            </script>
            
        </div>
    </main>

    <script src="/static/js/footer.js"></script>
