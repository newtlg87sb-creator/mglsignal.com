                    { title: 'DEX Эрдэнэс Ангууч', description: 'Honeypot илрүүлэлт зэрэг аюулгүй байдлын шалгалттай шинэ токенуудыг бодит цагт хайгч.', link: 'dex_GEM_hunter.html' },
                    { title: 'Футпринт Хяналт', description: 'Скальпинг хийхэд зориулсан бодит цагийн захиалгын урсгал ба футпринт график.', link: 'footprint.html' },

                    { title: 'Investor Signal', description: 'A long-term signal designed for investors to find \'buy the dip\' opportunities.', link: 'signal/investment.html' },
                    { title: 'Backtester', description: 'Test your trading strategies against historical data with customizable parameters.', link: 'Backtest.html' },
                    { title: 'Candlestick Patterns', description: 'Automatically identify common candlestick patterns on the chart.', link: 'Candle_patterns.html' },
                    { title: 'DEX Gem Hunter', description: 'Live scanner for new tokens with safety checks like honeypot detection.', link: 'dex_GEM_hunter.html' },
                    { title: 'Footprint Monitor', description: 'Live order flow and footprint chart for scalping.', link: 'footprint.html' },
                    { title: 'Orderflow Full Chart', description: 'A full-screen, detailed canvas-based order flow footprint chart.', link: 'footprint_full.html' },
                    { title: 'Arbitrage Scanner', description: 'Find real-time profit opportunities using price differences between multiple exchanges.', link: '/alphasignal/main_arbitrage.html' }

        };

        // Initialize window.translations if it doesn't exist yet
        if (typeof window.translations === 'undefined') window.translations = { mn: {}, en: {} };
        
        // Merge page translations into the global translations object
        Object.keys(pageTranslations).forEach(lang => {
            window.translations[lang] = { 
                ...window.translations[lang], 
                ...pageTranslations[lang] 
            };
        });

        document.addEventListener('DOMContentLoaded', () => {
            const renderTools = () => {
                const lang = localStorage.getItem('lang') || 'mn';
                const container = document.getElementById('tools-container');
                
                if(!container || !window.translations[lang] || !window.translations[lang]['signal-list']) return;

                // Render List
                container.innerHTML = window.translations[lang]['signal-list']
                    .filter(item => 
                        item.link !== 'future.html' && 
                        item.link !== 'spot.html'
                    )
                    .map(item => {
                        const isComingSoon = item.status === 'coming_soon';
                        const openToolText = window.translations[lang]['btn-open-tool'] || 'Open';
                        const comingSoonText = window.translations[lang]['sig-coming-soon'] || 'Coming Soon';
                        return `
                    <a href="${isComingSoon ? '#' : item.link}" class="bg-brand-dark-blue border border-brand-border rounded-xl p-8 hover:border-brand-gold transition duration-300 group flex flex-col ${isComingSoon ? 'opacity-60 cursor-not-allowed grayscale' : ''}">
                        <div class="w-12 h-12 bg-brand-gold/10 rounded-lg flex items-center justify-center mb-6 group-hover:bg-brand-gold/20 transition">
                            <i class="fas fa-tools text-brand-gold text-2xl"></i>
                        </div>
                        <h3 class="text-white text-lg font-bold mb-3 uppercase tracking-wider group-hover:text-brand-gold transition">${item.title}</h3>
                        <p class="text-gray-500 text-sm leading-relaxed mb-6 flex-grow">${item.description}</p>
                        ${isComingSoon ? 
                            `<span class="text-[9px] bg-gray-800 text-gray-400 px-2 py-1 rounded uppercase font-black tracking-tighter w-fit">${comingSoonText}</span>` : 
                            `<span class="text-brand-gold text-[10px] font-black uppercase tracking-widest flex items-center mt-auto">${openToolText} <i class="fas fa-arrow-right ml-2 group-hover:translate-x-1 transition"></i></span>`
                        }
                    </a>
                `}).join('');
            };

            renderTools();

            // Language change listener
            const originalChangeLang = window.changeLang;
            window.changeLang = function(language) {
                if (originalChangeLang) originalChangeLang(language);
                renderTools();
            };
        });
    </script>
</body>
</html>
