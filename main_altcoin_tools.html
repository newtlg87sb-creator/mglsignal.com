<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Tools - MGL Signal</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 'dark': '#05070a', 'dark-blue': '#0f1217', 'gold': '#c5a059', 'border': '#1f242d' }
                    },
                    fontFamily: { 'inter': ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/main_style.css">
</head>
<body class="bg-brand-dark text-white font-inter flex flex-col min-h-screen">

    <script src="/static/js/main_translate.js"></script>
    <script src="/static/js/header.js"></script>

    <!-- Main Content -->
    <main class="flex-grow pt-24 pb-12 px-6">
        <div class="max-w-4xl mx-auto">
            <!-- Header -->
            <div class="text-center mb-12">
                <h1 class="text-3xl md:text-5xl font-black uppercase tracking-tight text-white mb-4">
                    Market <span class="text-brand-gold italic">Tools</span>
                </h1>
                <p id="tools-subtitle" class="text-gray-400 max-w-2xl mx-auto">
                    Professional analytical tools and signals for Crypto trading.
                </p>
                <div class="w-20 h-1 bg-brand-gold mx-auto mt-6"></div>
            </div>

            <!-- Tools Grid -->
            <div id="tools-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Content injected by JS -->
            </div>
        </div>
    </main>

    <script src="/static/js/footer.js"></script>
    <script src="/static/lock.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const renderTools = () => {
                const lang = localStorage.getItem('lang') || 'mn';
                const container = document.getElementById('tools-container');
                const subtitle = document.getElementById('tools-subtitle');
                
                if(!container || !translations[lang] || !translations[lang]['signal-list']) return;

                // Update Subtitle
                subtitle.textContent = lang === 'mn' 
                    ? "Крипто арилжаанд зориулсан мэргэжлийн шинжилгээний хэрэгсэл болон сигналууд."
                    : "Professional analytical tools and signals for Crypto trading.";

                // Render List
                container.innerHTML = translations[lang]['signal-list']
                    .filter(item => 
                        item.link !== 'future.html' && 
                        item.link !== 'spot.html'
                    )
                    .map(item => {
                        const isComingSoon = item.status === 'coming_soon';
                        return `
                    <a href="${isComingSoon ? '#' : item.link}" class="bg-brand-dark-blue border border-brand-border rounded-xl p-8 hover:border-brand-gold transition duration-300 group flex flex-col ${isComingSoon ? 'opacity-60 cursor-not-allowed grayscale' : ''}">
                        <div class="w-12 h-12 bg-brand-gold/10 rounded-lg flex items-center justify-center mb-6 group-hover:bg-brand-gold/20 transition">
                            <i class="fas fa-tools text-brand-gold text-2xl"></i>
                        </div>
                        <h3 class="text-white text-lg font-bold mb-3 uppercase tracking-wider group-hover:text-brand-gold transition">${item.title}</h3>
                        <p class="text-gray-500 text-sm leading-relaxed mb-6 flex-grow">${item.description}</p>
                        ${isComingSoon ? 
                            `<span class="text-[9px] bg-gray-800 text-gray-400 px-2 py-1 rounded uppercase font-black tracking-tighter w-fit">Coming Soon</span>` : 
                            `<span class="text-brand-gold text-[10px] font-black uppercase tracking-widest flex items-center mt-auto">Нээх <i class="fas fa-arrow-right ml-2 group-hover:translate-x-1 transition"></i></span>`
                        }
                    </a>
                `}).join('');
            };

            renderTools();

            // Language change listener
            const originalChangeLang = window.changeLang;
            window.changeLang = function(language) {
                if (originalChangeLang) originalChangeLang(language);
                renderTools();
            };
        });
    </script>
</body>
</html>
