    <script src="/static/js/footer.js"></script>
    <script src="/static/lock.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('lang') || 'mn';

            const texts = {
                en: {
                    pageTitle: "Forex Basics: Lot & Pip | MGL Signal",
                    lotaboutTitle: "Forex Basics: What are Lot and Pip?",
                    whatIsLotTitle: "What is a Lot?",
                    whatIsLotDesc: "In Forex trading, a 'Lot' refers to the size or volume of your trade. There are 3 main types:",
                    lot1: "✔ 1.00 Lot = 100,000 units (Standard Lot)",
                    lot2: "✔ 0.10 Lot = 10,000 units (Mini Lot)",
                    lot3: "✔ 0.01 Lot = 1,000 units (Micro Lot)",
                    lotExample: "For example, 0.01 lot means you gain or lose about $0.10 per pip movement.",
                    whatIsPipTitle: "What is a Pip?",
                    whatIsPipDesc1: `"Pip" is the smallest price change in a currency pair. For most major pairs, this is 0.0001.`,
                    whatIsPipDesc2: "Example: If EUR/USD changes from 1.1000 → 1.1001, that is 1 pip.",
                    profitLossTitle: "Profit/Loss Calculation:",
                    profitNote: "☝️ Profit and loss may slightly vary depending on the currency pair and broker settings."
                },
                mn: {
                    pageTitle: "Форекс-н үндэс: Лот ба Пип | MGL Signal",
                    lotaboutTitle: "Форекс-н үндэс: Лот ба Пип гэж юу вэ?",
                    whatIsLotTitle: "Лот гэж юу вэ?",
                    whatIsLotDesc: "Форекс арилжаанд 'Лот' гэдэг нь таны арилжааны хэмжээ буюу эзлэхүүнийг хэлнэ. Үндсэн 3 төрөл байдаг:",
                    lot1: "✔ 1.00 Лот = 100,000 нэгж (Стандарт Лот)",
                    lot2: "✔ 0.10 Лот = 10,000 нэгж (Мини Лот)",
                    lot3: "✔ 0.01 Лот = 1,000 нэгж (Микро Лот)",
                    lotExample: "Жишээлбэл, 0.01 лот гэдэг нь пип хөдөлгөөн тутамд ойролцоогоор $0.10-ын ашиг олох эсвэл алдахыг хэлнэ.",
                    whatIsPipTitle: "Пип гэж юу вэ?",
                    whatIsPipDesc1: `"Пип" гэдэг нь валютын хосын үнийн хамгийн бага өөрчлөлт юм. Ихэнх гол хосуудын хувьд энэ нь 0.0001 байна.`,
                    whatIsPipDesc2: "Жишээ: Хэрэв EUR/USD 1.1000 → 1.1001 болж өөрчлөгдвөл энэ нь 1 пип юм.",
                    profitLossTitle: "Ашиг/Алдагдлын тооцоолол:",
                    profitNote: "☝️ Ашиг, алдагдал нь валютын хос болон брокерийн тохиргооноос хамаарч бага зэрэг ялгаатай байж болно."
                }
            };

            const setText = (id, text) => {
                const el = document.getElementById(id);
                if (el) el.textContent = text;
            };

            const updateContent = (language) => {
                const t = texts[language] || texts.en;
                document.title = t.pageTitle;
                
                setText('lotabout-title', t.lotaboutTitle);
                setText('what-is-lot-title', t.whatIsLotTitle);
                setText('what-is-lot-desc', t.whatIsLotDesc);
                setText('lot-1', t.lot1);
                setText('lot-2', t.lot2);
                setText('lot-3', t.lot3);
                setText('lot-example', t.lotExample);
                setText('what-is-pip-title', t.whatIsPipTitle);
                setText('what-is-pip-desc1', t.whatIsPipDesc1);
                setText('what-is-pip-desc2', t.whatIsPipDesc2);
                setText('profit-loss-title', t.profitLossTitle);
                setText('profit-note', t.profitNote);
            };

            updateContent(savedLang);

            const originalChangeLang = window.changeLang;
            window.changeLang = function(language) {
                if (originalChangeLang) originalChangeLang(language);
                updateContent(language);
            };
        });
    </script>
