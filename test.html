<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controls Template - MGL Signal</title>

    <!-- SEO & Metadata -->
    <meta name="description" content="MGL Signal - Live Trading Charts and Controls">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="icon" type="image/png" href="/static/new/images/logogo1.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 'dark': '#05070a', 'dark-blue': '#0f1217', 'gold': '#c5a059', 'border': '#1f242d' }
                    },
                    fontFamily: { 'inter': ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/main_style.css">

    <!-- Content Security Policy (Optional - based on your other pages) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https:; script-src 'self' https://cdn.tailwindcss.com 'unsafe-inline' https://s3.tradingview.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://api.binance.com https://fapi.binance.com wss://stream.binance.com wss://fstream.binance.com;">
</head>
<body class="bg-brand-dark text-white font-inter flex flex-col min-h-screen">

    <!-- Global Header -->
    <script src="/static/js/main_translate.js"></script>
    <script src="/static/js/header.js"></script>

    <!-- Main Content Area -->
    <main class="flex-grow pt-32 pb-12 px-4 md:px-6">
        <div class="max-w-7xl mx-auto flex flex-col gap-6">
            
            <!-- 1. Controls Component (Market, Time, Pair, etc.) -->
            <script src="/static/js/control.js"></script>

            <!-- 2. Chart Component -->
            <script src="/static/js/chart.js"></script>
            
        </div>
    </main>

    <!-- Global Footer -->
    <script src="/static/js/footer.js"></script>

    <!-- Security/Lock Logic -->
    <script src="/static/js/lock.js"></script>

</body>
</html>
