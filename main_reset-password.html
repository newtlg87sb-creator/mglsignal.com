<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шинэ нууц үг - MGL Signal</title>
    <link rel="icon" type="image/png" href="/static/new/images/logogo1.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { brand: { 'dark': '#05070a', 'dark-blue': '#0f1217', 'gold': '#c5a059', 'border': '#1f242d' } }, fontFamily: { 'inter': ['Inter', 'sans-serif'] } }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/main_style.css">
</head>
<body class="bg-brand-dark text-white font-inter flex flex-col min-h-screen">
    <script>
        const pageTranslations = {
            mn: {
                "rp-title": "Шинэ нууц үг",
                "rp-subtitle": "Шинэ нууц үгээ оруулна уу",
                "lbl-password": "Шинэ нууц үг",
                "lbl-confirm-password": "Давтан оруулах",
                "btn-change-pass": "Солих",
                "btn-loading": "Уншиж байна..."
            },
            en: {
                "rp-title": "New Password",
                "rp-subtitle": "Enter your new password",
                "lbl-password": "New Password",
                "lbl-confirm-password": "Confirm Password",
                "btn-change-pass": "Change Password",
                "btn-loading": "Loading..."
            }
        };
        Object.keys(pageTranslations).forEach(lang => {
            if (!window.translations) window.translations = { mn: {}, en: {} };
            Object.assign(window.translations[lang], pageTranslations[lang]);
        });
    </script>
    <script src="/static/js/header.js"></script>

    <main class="flex-grow flex items-center justify-center pt-32 pb-20 px-4">
        <div class="w-full max-w-md bg-brand-dark-blue border border-brand-border rounded-xl p-8 shadow-2xl relative">
            <div class="text-center mb-8">
                <h1 data-i18n="rp-title" class="text-2xl font-black uppercase tracking-wider text-white mb-2">Шинэ нууц үг</h1>
                <p data-i18n="rp-subtitle" class="text-xs text-gray-500">Шинэ нууц үгээ оруулна уу</p>
            </div>
            
            <form id="reset-form" class="space-y-5">
                <div class="space-y-1">
                    <label data-i18n="lbl-password" class="text-[10px] font-bold uppercase text-gray-500">Шинэ нууц үг</label>
                    <input type="password" id="newPassword" required class="w-full bg-[#05070a] border border-brand-border rounded-lg py-3 px-3 text-sm focus:border-brand-gold text-white">
                </div>
                <div class="space-y-1">
                    <label data-i18n="lbl-confirm-password" class="text-[10px] font-bold uppercase text-gray-500">Давтан оруулах</label>
                    <input type="password" id="confirmPassword" required class="w-full bg-[#05070a] border border-brand-border rounded-lg py-3 px-3 text-sm focus:border-brand-gold text-white">
                </div>

                <div id="message-area" class="hidden text-xs text-center p-2 rounded border"></div>

                <button type="submit" id="submit-btn" class="w-full bg-brand-gold text-black font-bold py-3.5 rounded-lg hover:bg-white transition uppercase text-xs tracking-widest">
                    <span data-i18n="btn-change-pass">Солих</span>
                </button>
            </form>
        </div>
    </main>
    <script src="/static/js/footer.js"></script>
    <script src="/static/lock.js"></script>
    <script>
        // header.js-д үүсгэгдсэн 'sb' client-ийг ашиглана
        const supabaseClient = sb;

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const msgArea = document.getElementById('message-area');
            const btn = document.getElementById('submit-btn');

            const currentLang = localStorage.getItem('lang') || 'mn';
            const t = (window.translations && window.translations[currentLang]) ? 
                window.translations[currentLang] : 
                { 'btn-loading': 'Уншиж байна...', 'btn-change-pass': 'Солих' };

            if(newPassword !== confirmPassword) {
                msgArea.className = "text-red-500 bg-red-500/10 border-red-500/20 p-2 rounded text-center text-xs block";
                msgArea.textContent = currentLang === 'mn' ? "Нууц үг таарахгүй байна." : "Passwords do not match.";
                msgArea.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin mr-2"></i> ${t['btn-loading']}`;
            msgArea.classList.add('hidden');

            try {
                // Supabase-ийн session ашиглан нууц үгийг шинэчлэх
                const { error } = await supabaseClient.auth.updateUser({
                    password: newPassword
                });

                if (error) throw error;
                
                msgArea.classList.remove('hidden');
                msgArea.className = "text-green-500 bg-green-500/10 border-green-500/20 p-2 rounded text-center text-xs block";
                msgArea.textContent = currentLang === 'mn' ? "Нууц үг амжилттай солигдлоо! Нэвтрэх хуудас руу шилжиж байна." : "Password updated successfully! Redirecting to login.";
                
                // Бүх сессийг цэвэрлээд нэвтрэх рүү шилжүүлнэ
                await supabaseClient.auth.signOut();
                localStorage.removeItem('user');
                setTimeout(() => window.location.href = 'main_login.html', 3000);

            } catch (err) {
                msgArea.className = "text-red-500 bg-red-500/10 border-red-500/20 p-2 rounded text-center text-xs block";
                msgArea.textContent = err.message;
                btn.disabled = false;
                btn.textContent = t['btn-change-pass'];
            }
        });
    </script>
</body>
</html>
