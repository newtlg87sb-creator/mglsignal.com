
    <main class="flex-grow pt-24 pb-12 px-6">
        <div class="max-w-7xl mx-auto">
            <div class="text-center mb-12">
                <h1 id="main-title" data-i18n="tun-title" class="text-3xl md:text-5xl font-black uppercase tracking-tight text-white mb-4">
                    Trading <span class="text-brand-gold italic">Tunnel</span>
                </h1>
                <div class="w-20 h-1 bg-brand-gold mx-auto mt-6"></div>
            </div>

            <!-- Controls -->
            

            <!-- Chart Wrapper -->
            <div class="bg-brand-dark-blue border border-brand-border rounded-2xl p-4 h-[650px] relative shadow-2xl overflow-hidden">
                <div id="loading-chart" data-i18n="tun-loading" class="absolute inset-0 flex items-center justify-center bg-brand-dark-blue/80 z-10 hidden">
                    <div class="text-brand-gold font-bold animate-pulse uppercase tracking-widest text-xs">⚙️ Generating Tunnel...</div>
                </div>
                <div id="chart-canvas-container" class="w-full h-full">
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/footer.js"></script>
    <script src="/static/lock.js"></script>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const canvas = document.getElementById("chart");
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        let socket;

        // State
        let allData = [];
        let tunnelData = [];
        let visibleCount = 80;
        let offset = 0;
        let mouse = { x:null, y:null };
        let dragging = false;
        let lastX = 0;

        const minVisible = 20;
        const maxVisible = 500;

        function resize() {
            if (canvas.parentElement) {
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = canvas.parentElement.clientHeight;
            }
            draw();
        }
        window.addEventListener("resize", resize);
        setTimeout(resize, 100);
        
        document.addEventListener('input', (e) => {
            if(e.target.id === 'candle-slider') {
                document.getElementById('candle-count-display').textContent = e.target.value;
            }
        });

        function calculateRSI(closes, period) {
            let rsi = [];
            if (closes.length <= period) return rsi;
            let gains = 0, losses = 0;
            for (let i = 1; i <= period; i++) {
                const diff = closes[i] - closes[i - 1];
                if (diff >= 0) gains += diff; else losses -= diff;
            }
            let avgGain = gains / period;
            let avgLoss = losses / period;
            rsi.push(100 - (100 / (1 + (avgLoss === 0 ? 100 : avgGain / avgLoss))));
            for (let i = period + 1; i < closes.length; i++) {
                const diff = closes[i] - closes[i - 1];
                avgGain = ((avgGain * (period - 1)) + Math.max(diff, 0)) / period;
                avgLoss = ((avgLoss * (period - 1)) + Math.max(-diff, 0)) / period;
                rsi.push(100 - (100 / (1 + (avgLoss === 0 ? 100 : avgGain / avgLoss))));
            }
            return rsi;
        }

        async function generateChart() {
            const loadingEl = document.getElementById('loading-chart');
            loadingEl.style.display = 'flex';

            const market = document.getElementById('market').value;
            const symbol = document.getElementById('coin').value.toUpperCase() || "BTCUSDT";
            const interval = document.getElementById('interval').value;
            const rsiPeriod = parseInt(document.getElementById('rsi-period').value, 10);
            const candleCount = parseInt(document.getElementById('candle-slider')?.value || 360, 10);

            const baseUrl = market === 'futures' ? 'https://fapi.binance.com/fapi/v1/klines' : 'https://api.binance.com/api/v3/klines';
            const url = `${baseUrl}?symbol=${symbol}&interval=${interval}&limit=${candleCount}`;

            try {
                const res = await fetch(url);
                allData = await res.json();
                
                // Calculate Tunnel Logic
                const closes = allData.map(k => parseFloat(k[4]));
                const rsiArray = calculateRSI(closes, rsiPeriod);
                tunnelData = new Array(allData.length).fill(null);

                let last_long_30 = null, last_short_70 = null;
                for (let i = 1; i < rsiArray.length; i++) {
                    const kIdx = i + rsiPeriod;
                    if (!allData[kIdx]) continue;
                    const prevRsi = rsiArray[i - 1], beforePrevRsi = rsiArray[i - 2];
                    
                    if (beforePrevRsi < 30 && prevRsi >= 30) {
                        last_long_30 = Math.min(...allData.slice(Math.max(0, kIdx - 3), kIdx + 1).map(k => parseFloat(k[3])));
                    }
                    if (beforePrevRsi > 70 && prevRsi <= 70) {
                        last_short_70 = Math.max(...allData.slice(Math.max(0, kIdx - 3), kIdx + 1).map(k => parseFloat(k[2])));
                    }

                    tunnelData[kIdx] = { 
                        up: last_short_70, 
                        low: last_long_30, 
                        avg: (last_short_70 && last_long_30) ? (last_short_70 + last_long_30) / 2 : null 
                    };
                }
                draw();
            } catch (e) { console.error(e); }
            loadingEl.style.display = 'none';
        }

        function draw() {
            if (!allData || !allData.length) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const padding = 40, priceScaleWidth = 80, timeScaleHeight = 30;
            const chartHeight = canvas.height - padding * 2 - timeScaleHeight;
            const chartWidth = canvas.width - padding * 2 - priceScaleWidth;

            const end = allData.length - offset;
            const start = Math.max(0, end - visibleCount);
            const data = allData.slice(start, end);
            const visibleTunnel = tunnelData.slice(start, end);

            const prices = data.flatMap(d => [+d[2], +d[3]]);
            let maxP = Math.max(...prices), minP = Math.min(...prices);
            const pRange = maxP - minP;
            maxP += pRange * 0.1; minP -= pRange * 0.1;

            const priceToY = p => padding + (maxP - p) / (maxP - minP) * chartHeight;
            const candleWidth = chartWidth / data.length;

            // Draw Grid
            ctx.strokeStyle = "#1f2630"; ctx.lineWidth = 1;
            for(let i=0; i<=6; i++) {
                const y = padding + (i/6)*chartHeight;
                ctx.beginPath(); ctx.moveTo(padding, y); ctx.lineTo(padding+chartWidth, y); ctx.stroke();
            }

            // Draw Tunnel Bands (Manual Context Path)
            const drawBand = (key, color, dash = []) => {
                ctx.strokeStyle = color; ctx.setLineDash(dash); ctx.lineWidth = 2;
                ctx.beginPath();
                let first = true;
                visibleTunnel.forEach((t, i) => {
                    if (t && t[key]) {
                        const x = padding + i * candleWidth + candleWidth/2;
                        const y = priceToY(t[key]);
                        if (first) { ctx.moveTo(x, y); first = false; }
                        else ctx.lineTo(x, y); // Stepped line style can be added here
                    }
                });
                ctx.stroke(); ctx.setLineDash([]);
            };

            if (visibleTunnel.length) {
                drawBand('up', 'rgba(239, 68, 68, 0.8)'); // Resistance
                drawBand('low', 'rgba(16, 185, 129, 0.8)'); // Support
                drawBand('avg', 'rgba(255, 255, 255, 0.3)', [5, 5]); // Mid
            }

            // Draw Candles (Чиний үндсэн chart.js-ийн glow стиль)
            data.forEach((d, i) => {
                const o = +d[1], h = +d[2], l = +d[3], c = +d[4];
                const x = padding + i * candleWidth;
                const yO = priceToY(o), yC = priceToY(c), yH = priceToY(h), yL = priceToY(l);
                const bull = c >= o;

                ctx.shadowBlur = 4; ctx.shadowColor = bull ? "#0ecb81" : "#ffffff";
                ctx.fillStyle = bull ? "#0ecb81" : "#ffffff";
                ctx.strokeStyle = bull ? "#0ecb81" : "#ffffff";
                
                ctx.beginPath(); ctx.moveTo(x + candleWidth/2, yH); ctx.lineTo(x + candleWidth/2, yL); ctx.stroke();
                ctx.fillRect(x + candleWidth*0.2, Math.min(yO, yC), candleWidth*0.6, Math.max(1, Math.abs(yO - yC)));
                ctx.shadowBlur = 0;
            });

            // Price Labels
            ctx.fillStyle = "#aaa"; ctx.font = "10px Inter";
            for(let i=0; i<=6; i++) {
                const p = maxP - (i/6)*(maxP-minP);
                ctx.fillText(p.toFixed(2), padding + chartWidth + 5, padding + (i/6)*chartHeight + 4);
            }
        }

        // Interactions (Pan & Zoom)
        canvas.addEventListener("mousedown", e => { dragging = true; lastX = e.clientX; });
        canvas.addEventListener("mouseup", () => dragging = false);
        canvas.addEventListener("mousemove", e => {
            if (dragging) {
                const dx = e.clientX - lastX;
                if (Math.abs(dx) > 5) {
                    const move = Math.round(dx / 10);
                    offset = Math.max(0, Math.min(allData.length - visibleCount, offset + move));
                    lastX = e.clientX;
                    draw();
                }
            }
        });
        canvas.addEventListener("wheel", e => {
            e.preventDefault();
            visibleCount += e.deltaY > 0 ? 10 : -10;
            visibleCount = Math.max(minVisible, Math.min(maxVisible, visibleCount));
            draw();
        }, { passive: false });

        setTimeout(() => {
            const btn = document.getElementById('updateChart');
            if(btn) btn.addEventListener('click', generateChart);
            generateChart();
        }, 200);
    });
    </script>
</body>
</html>
