
<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy The Dip - MGL Signal</title>

    <!-- SEO & Metadata -->
    <meta name="description" content="MGL Signal - Investor 'Buy The Dip' Signal Strategy">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="/static/new/images/logogo1.png">

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 'dark': '#05070a', 'dark-blue': '#0f1217', 'gold': '#c5a059', 'border': '#1f242d' }
                    },
                    fontFamily: { 'inter': ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/main_style.css">
</head>
<body class="bg-brand-dark text-white font-inter flex flex-col min-h-screen">

    <!-- Global Header -->
    <script src="/static/js/main_translate.js"></script>
    <script src="/static/js/header.js"></script>

    <main class="flex-grow pt-32 pb-12 px-4 md:px-6">
        <div class="max-w-7xl mx-auto flex flex-col gap-6">
            
            <!-- 1. Controls Component -->
            <div class="controls-container flex flex-wrap items-center gap-4 p-4 bg-brand-dark-blue border border-brand-border rounded-xl shadow-lg">
                <!-- Market -->
                <div class="control-item flex items-center space-x-2">
                    <label class="text-gray-500 font-bold uppercase text-[10px]">Market:</label>
                    <select id="market" class="bg-brand-dark border border-brand-border text-white rounded px-3 py-1.5 text-xs shadow-inner">
                        <option value="spot">Spot</option>
                        <option value="futures">Futures</option>
                    </select>
                </div>

                <!-- Timeframe -->
                <div class="control-item flex items-center space-x-2">
                    <label class="text-gray-500 font-bold uppercase text-[10px]">Time:</label>
                    <select id="interval" class="bg-brand-dark border border-brand-border text-white rounded px-3 py-1.5 text-xs shadow-inner">
                        <option value="1s">1s</option>
                        <option value="1m" selected>1m</option>
                        <option value="3m">3m</option>
                        <option value="5m">5m</option>
                        <option value="15m">15m</option>
                        <option value="30m">30m</option>
                        <option value="1h">1h</option>
                        <option value="2h">2h</option>
                        <option value="4h">4h</option>
                        <option value="6h">6h</option>
                        <option value="8h">8h</option>
                        <option value="12h">12h</option>
                        <option value="1d">1d</option>
                        <option value="3d">3d</option>
                        <option value="1w">1w</option>
                        <option value="1M">1M</option>
                    </select>
                </div>

                <!-- Ticker -->
                <div id="pair-container" class="control-item flex items-center space-x-2">
                    <label class="text-gray-500 font-bold uppercase text-[10px]">Pair:</label>
                    <input type="text" id="coin" value="BTCUSDT" list="coin-list" placeholder="Search..." class="bg-brand-dark border border-brand-border text-white rounded px-3 py-1.5 w-32 uppercase font-bold text-xs shadow-inner transition-colors" />
                    <datalist id="coin-list"></datalist>
                </div>
            </div>

            <!-- Title -->
            <div class="text-center mb-12">
                <h1 id="main-title" data-i18n="inv-title" class="text-3xl md:text-5xl font-black uppercase tracking-tight text-white mb-4">
                    Investor <span class="text-brand-gold italic">'Buy The Dip'</span> Signal
                </h1>
                <div class="w-20 h-1 bg-brand-gold mx-auto mt-6"></div>
            </div>

            <!-- Investor Info -->
            <div class="max-w-3xl mx-auto mb-12 text-center space-y-4">
                <p id="info-text-1" data-i18n="inv-info-1" class="text-sm text-gray-400 leading-relaxed"></p>
                <p id="info-text-2" data-i18n="inv-info-2" class="text-sm text-gray-400 leading-relaxed"></p>
                <p><strong id="info-text-3" data-i18n="inv-info-3" class="text-[10px] text-brand-gold font-black uppercase tracking-widest block py-2 border-y border-brand-gold/10"></strong></p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Left: Chart Area -->
                <div class="lg:col-span-2 space-y-6">
                    <div id="chart-wrapper" class="bg-brand-dark-blue border border-brand-border rounded-2xl p-4 h-[500px] relative shadow-2xl">
                        <div id="loading-chart" class="absolute inset-0 flex items-center justify-center bg-brand-dark-blue/80 z-10 hidden" data-i18n="inv-loading">
                            <div class="text-brand-gold font-bold animate-pulse text-sm uppercase tracking-widest">⚙️ Analyzing Market...</div>
                        </div>
                        <canvas id="invest-chart"></canvas>
                    </div>
                </div>

                <!-- Right: Signal & Suggestions -->
                <div class="space-y-6">
                    <!-- Current Signal Status -->
                    <div class="bg-brand-dark-blue border border-brand-border rounded-2xl p-6 shadow-xl">
                        <h3 data-i18n="inv-label-status" class="text-[10px] text-gray-500 font-black uppercase tracking-[0.2em] mb-4">Market Status</h3>
                        <div id="signal-box" class="text-4xl font-black text-center py-8 rounded-xl border-2 uppercase tracking-tighter transition-all duration-500">
                            --
                        </div>
                        <div id="signal-price" data-i18n="inv-status-wait" class="text-center mt-4 text-xs text-gray-400 italic">
                            Waiting for analysis...
                        </div>
                    </div>

                    <!-- Top Opportunities -->
                    <div class="bg-brand-dark-blue border border-brand-border rounded-2xl p-6 shadow-xl">
                        <h3 id="suggestions-title" data-i18n="inv-suggestions-title" class="text-[10px] text-gray-500 font-black uppercase tracking-[0.2em] mb-6 flex items-center">
                            <i class="fas fa-search-dollar mr-2 text-brand-gold"></i> Top 3 Opportunities
                        </h3>
                        <div id="suggestions-box" class="space-y-4">
                            <p data-i18n="inv-suggestions-ready" class="text-xs text-gray-600 text-center py-4 uppercase font-bold tracking-widest">Ready to scan...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/footer.js"></script>
    <script src="/static/js/lock.js"></script>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const marketEl = () => document.getElementById('market');
        const intervalEl = () => document.getElementById('interval');
        const coinEl = () => document.getElementById('coin');
        
        const loadingEl = document.getElementById('loading-chart');
        const canvas = document.getElementById('invest-chart');
        const signalBox = document.getElementById('signal-box');
        const suggestionsBox = document.getElementById('suggestions-box');
        const ctx = canvas.getContext('2d');
        let chartInstance = null;

        // Pull translations from main_translate.js system
        const currentLang = localStorage.getItem('lang') || 'mn';
        const t = translations[currentLang];

        const i18n = {
            fetchError: (s) => currentLang === 'mn' ? `${s}-н мэдээллийг татаж чадсангүй.` : `Could not fetch data for ${s}`,
            insufficientData: t["inv-insufficient"],
            buyReason: t["inv-reason-buy"],
            waitReason: t["inv-reason-wait"],
            prepareReason: t["inv-reason-prepare"],
            watchoutReason: t["inv-reason-watchout"],
            scanning: t["inv-scanning"],
            noOpportunities: t["inv-no-opp"],
            scanError: t["inv-scan-error"]
        };

        async function fetchKlines(symbol, interval) {
            const market = marketEl() ? marketEl().value : 'spot';
            const baseUrl = market === 'futures' ? 'https://fapi.binance.com/fapi/v1/klines' : 'https://api.binance.com/api/v3/klines';
            const url = `${baseUrl}?symbol=${symbol}&interval=${interval}&limit=300`;

            const response = await fetch(url);
            if (!response.ok) throw new Error(i18n.fetchError(symbol));
            return await response.json();
        }

        function calculateEMA(closes, period) {
            const k = 2 / (period + 1);
            let emaArray = [closes[0]];
            for (let i = 1; i < closes.length; i++) {
                emaArray.push(closes[i] * k + emaArray[i - 1] * (1 - k));
            }
            return emaArray;
        }

        function findBuySignal(klines) {
            const closes = klines.map(k => parseFloat(k[4]));
            if (closes.length < 200) return { signal: 'WAIT', reason: i18n.insufficientData, price: 0 };

            const ema50 = calculateEMA(closes, 50);
            const ema200 = calculateEMA(closes, 200);
            const lastIdx = closes.length - 2;
            const prevIdx = closes.length - 3;

            const lastClose = closes[lastIdx], last50 = ema50[lastIdx], last200 = ema200[lastIdx];
            const prevClose = closes[prevIdx], prev50 = ema50[prevIdx], prev200 = ema200[prevIdx];

            if (lastClose > last50 && lastClose > last200) {
                return { signal: 'BUY', reason: i18n.buyReason, price: lastClose };
            } else if (lastClose < last50 && lastClose < last200) {
                return { signal: 'WAIT', reason: i18n.waitReason, price: 0 };
            } else {
                const wasBear = prevClose < prev50 && prevClose < prev200;
                if (wasBear) return { signal: 'PREPARE', reason: i18n.prepareReason, price: lastClose };
                return { signal: 'WATCH OUT', reason: i18n.watchoutReason, price: lastClose };
            }
        }

        async function scanOpportunities() {
            suggestionsBox.innerHTML = `<div class="text-center py-4"><i class="fas fa-spinner fa-spin text-brand-gold mb-2"></i><p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">${i18n.scanning}</p></div>`;
            let opportunities = [];
            const interval = intervalEl() ? intervalEl().value : '1d';

            try {
                const tickerRes = await fetch('https://api.binance.com/api/v3/ticker/24hr');
                const tickers = await tickerRes.json();
                const topSymbols = tickers
                    .filter(t => t.symbol.endsWith('USDT') && !/UP|DOWN|BEAR|BULL/.test(t.symbol))
                    .sort((a, b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume))
                    .slice(0, 50) // Scan top 50 for performance
                    .map(t => t.symbol);

                for (const symbol of topSymbols) {
                    if (opportunities.length >= 3) break;
                    try {
                        const klines = await fetchKlines(symbol, interval);
                        const { signal, price } = findBuySignal(klines);
                        if (signal === 'BUY') opportunities.push({ symbol, price });
                    } catch (e) {}
                }

                if (opportunities.length > 0) {
                    suggestionsBox.innerHTML = opportunities.map(op => `
                        <div class="suggestion-card cursor-pointer" onclick="loadOpportunityChart('${op.symbol}')">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-white font-black uppercase text-sm">${op.symbol.replace('USDT', '')}</span>
                                <span class="bg-green-500/20 text-green-400 text-[9px] font-black px-2 py-0.5 rounded uppercase tracking-tighter">Buy Dip</span>
                            </div>
                            <div class="text-[10px] font-mono text-brand-gold font-bold">$${parseFloat(op.price).toLocaleString()}</div>
                        </div>
                    `).join('');
                } else {
                    suggestionsBox.innerHTML = `<p class="text-xs text-gray-500 text-center py-4">${i18n.noOpportunities}</p>`;
                }
            } catch (error) {
                suggestionsBox.innerHTML = `<p class="text-red-500 text-xs text-center">${i18n.scanError}</p>`;
            }
        }

        // New function: Loads a specific opportunity into the main chart
        window.loadOpportunityChart = async (symbol) => {
            if (coinEl()) {
                coinEl().value = symbol;
                // Optionally, trigger a visual update on the input if needed
            }
            await generateChart(); // Trigger the main chart generation with the new symbol
        }

        async function generateChart() {
            loadingEl.classList.remove('hidden');
            if (chartInstance) chartInstance.destroy();

            const symbol = coinEl() ? coinEl().value.toUpperCase() : 'BTCUSDT';
            const interval = intervalEl() ? intervalEl().value : '1d';

            try {
                const klines = await fetchKlines(symbol, interval);
                const priceData = klines.map(k => ({ x: k[0], y: parseFloat(k[4]) }));
                const { signal, reason, price } = findBuySignal(klines);

                // Update Signal UI
                signalBox.textContent = signal;
                let signalClasses = "text-4xl font-black text-center py-8 rounded-xl border-2 uppercase tracking-tighter transition-all duration-500";
                switch (signal) {
                    case 'BUY':
                        signalClasses += " bg-green-500/20 border-green-500 text-green-400";
                        break;
                    case 'WAIT':
                        signalClasses += " bg-red-500/20 border-red-500 text-red-400";
                        break;
                    case 'PREPARE':
                        signalClasses += " bg-yellow-500/20 border-yellow-500 text-yellow-400";
                        break;
                    case 'WATCH OUT':
                        signalClasses += " bg-orange-500/20 border-orange-500 text-orange-400";
                        break;
                    default:
                        signalClasses += " bg-gray-700/20 border-gray-700 text-gray-400";
                        break;
                }
                signalBox.className = signalClasses;
                
                const priceEl = document.getElementById('signal-price');
                priceEl.innerHTML = `${reason} ${price ? `<br><span class="text-white font-mono font-bold mt-1 block">$${price.toLocaleString()}</span>` : ''}`;

                // EMA Data
                const closes = klines.map(k => parseFloat(k[4]));
                const ema50Data = calculateEMA(closes, 50).map((v, i) => ({ x: klines[i][0], y: v }));
                const ema200Data = calculateEMA(closes, 200).map((v, i) => ({ x: klines[i][0], y: v }));

                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        datasets: [
                            { label: 'Price', data: priceData, borderColor: 'rgba(255, 255, 255, 0.9)', borderWidth: 2, pointRadius: 0, fill: false },
                            { label: '50 EMA', data: ema50Data, borderColor: '#3b82f6', borderWidth: 1.5, pointRadius: 0, fill: false },
                            { label: '200 EMA', data: ema200Data, borderColor: '#c5a059', borderWidth: 1.5, pointRadius: 0, borderDash: [5, 5], fill: false }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        scales: {
                            x: { type: 'time', grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#4b5563', font: { size: 10 } } },
                            y: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#4b5563', font: { size: 10 } } }
                        },
                        plugins: {
                            legend: { display: true, labels: { color: '#9ca3af', font: { size: 10, weight: 'bold' }, usePointStyle: true } },
                            tooltip: { backgroundColor: 'rgba(5, 7, 10, 0.9)', titleFont: { size: 12 }, bodyFont: { size: 12 }, padding: 12, borderColor: '#1f242d', borderWidth: 1 }
                        }
                    }
                });

                scanOpportunities();
            } catch (error) {
                console.error(error);
                signalBox.textContent = 'ERROR';
                document.getElementById('signal-price').textContent = error.message;
            } finally {
                loadingEl.classList.add('hidden');
            }
        }

        // Auto-update setup
        const initAutoUpdate = () => {
            const m = marketEl();
            const i = intervalEl();
            const c = coinEl();
            
            if (m && i && c) {
                const update = () => generateChart();
                m.addEventListener('change', update);
                i.addEventListener('change', update);
                c.addEventListener('change', update);
                c.addEventListener('keydown', (e) => { if (e.key === 'Enter') update(); });
                
                generateChart(); // Initial Load
            } else {
                setTimeout(initAutoUpdate, 100);
            }
        };

        initAutoUpdate();
    });
    </script>
</body>
</html>
