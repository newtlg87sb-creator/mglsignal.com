    <script>
        const canvas = document.getElementById('dualChart');
        const ctx = canvas.getContext('2d');
        const intervalEl = document.getElementById('interval');
        const timezoneEl = document.getElementById('timezone');
        
        let dataXAU = [];
        let dataPAXG = [];
        let wsSocket = null;

        async function loadAllHistory() {
            try {
                const _0xf1 = atob("aHR0cHM6Ly9mYXBpLmJpbmFuY2UuY29tL2ZhcGkvdjEva2xpbmVz");
                const _0xf2 = atob("aHR0cHM6Ly9hcGkuYmluYW5jZS5jb20vYXBpL3YzL2tsaW5lcw==");
                const interval = intervalEl.value;
                const xauInterval = interval === '1s' ? '1m' : interval;

                dataXAU = []; dataPAXG = [];

                const resXAU = await fetch(`${_0xf1}?symbol=XAUUSDT&interval=${xauInterval}&limit=50`);
                const jsonXAU = await resXAU.json();
                
                const resPAXG = await fetch(`${_0xf2}?symbol=PAXGUSDT&interval=${interval}&limit=50`);
                const jsonPAXG = await resPAXG.json();

                if (Array.isArray(jsonXAU)) {
                    dataXAU = jsonXAU.map(c => ({ time: c[0], open: parseFloat(c[1]), high: parseFloat(c[2]), low: parseFloat(c[3]), close: parseFloat(c[4]) }));
                    document.getElementById('price-xau').innerText = dataXAU[dataXAU.length - 1].close.toFixed(2);
                }
                if (Array.isArray(jsonPAXG)) {
                    dataPAXG = jsonPAXG.map(c => ({ time: c[0], open: parseFloat(c[1]), high: parseFloat(c[2]), low: parseFloat(c[3]), close: parseFloat(c[4]) }));
                    document.getElementById('price-paxg').innerText = dataPAXG[dataPAXG.length - 1].close.toFixed(2);
                }

                drawDualChart();
            } catch (err) {
                console.error("History Bootstrap Error:", err);
            }
            connectCombinedWSS();
        }

        function connectCombinedWSS() {
            if (wsSocket) {
                wsSocket.onclose = null;
                wsSocket.close();
                wsSocket = null;
            }

            const _0xws = atob("d3NzOi8vc3RyZWFtLmJpbmFuY2UuY29tOjk0NDMvc3RyZWFtP3N0cmVhbXM9");
            const interval = intervalEl.value;
            const xauWssInterval = interval === '1s' ? '1m' : interval;
            
            wsSocket = new WebSocket(`${_0xws}paxgusdt@kline_${interval}/xauusdt@kline_${xauWssInterval}`);

            wsSocket.onopen = () => {
                const lang = localStorage.getItem('lang') || 'mn';
                const t = window.translations[lang];
                document.getElementById('status').innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-ping"></span> ${t["ws-connected"] || "🟢 DUAL FEED CONNECTED: 0ms LATENCY"}`;
            };

            wsSocket.onmessage = (event) => {
                const packet = JSON.parse(event.data);
                const streamName = packet.stream;
                const data = packet.data;
                if (!data || !data.k) return;

                const k = data.k;
                const liveCandle = {
                    time: k.t,
                    open: parseFloat(k.o),
                    high: parseFloat(k.h),
                    low: parseFloat(k.l),
                    close: parseFloat(k.c)
                };

                if (streamName.includes('xauusdt')) {
                    updateLivePrice('price-xau', liveCandle.close);
                    updateCandleArray(dataXAU, liveCandle);
                } else if (streamName.includes('paxgusdt')) {
                    updateLivePrice('price-paxg', liveCandle.close);
                    updateCandleArray(dataPAXG, liveCandle);
                }

                document.getElementById('last-update').innerHTML = `<i class="far fa-clock text-slate-500 mr-1"></i> Sync Packet: <span class="text-slate-300 font-bold">${new Date(packet.data.E).toLocaleTimeString()}</span>`;
                drawDualChart();
            };

            wsSocket.onclose = () => {
                if (!wsSocket) return;
                const lang = localStorage.getItem('lang') || 'mn';
                const t = window.translations[lang];
                document.getElementById('status').innerText = t["ws-retry"] || "🔴 Connection Dropped. Retrying...";
                setTimeout(() => {
                    if (interval === intervalEl.value) connectCombinedWSS();
                }, 3000);
            };
        }

        function updateCandleArray(targetArray, liveCandle) {
            if (targetArray.length > 0 && targetArray[targetArray.length - 1].time === liveCandle.time) {
                targetArray[targetArray.length - 1] = liveCandle;
            } else {
                targetArray.push(liveCandle);
                if (targetArray.length > 70) targetArray.shift();
            }
        }

        intervalEl.addEventListener('change', () => loadAllHistory());
        timezoneEl.addEventListener('change', () => drawDualChart());

        function getGoldMarketCountdown() {
            const now = new Date();
            const day = now.getUTCDay();
            const hour = now.getUTCHours();
            
            let isClosed = false;
            if (day === 6) isClosed = true;
            if (day === 5 && hour >= 21) isClosed = true;
            if (day === 0 && hour < 22) isClosed = true;
            
            if (isClosed) {
                let target = new Date(now);
                const daysUntilSunday = (day === 0) ? 0 : (day === 5 ? 2 : 1);
                target.setUTCDate(now.getUTCDate() + daysUntilSunday);
                target.setUTCHours(22, 0, 0, 0);
                
                const diff = target - now;
                const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                return `${h}:${m}:${s}`;
            }
            return null;
        }

        function drawDualChart() {
            const rect = canvas.parentNode.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.width * (2.2 / 5); // Дэлгэцийн харьцааг улам ганган болгов

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const midY = canvas.height / 2;

            const lang = localStorage.getItem('lang') || 'mn';
            const t = window.translations[lang];

            // Голын тусгаарлагч шугам (High-Tech зааглагч)
            ctx.strokeStyle = 'rgba(30, 41, 59, 0.8)';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([8, 4]); // Тасархай шугам
            ctx.beginPath();
            ctx.moveTo(0, midY);
            ctx.lineTo(canvas.width, midY);
            ctx.stroke();
            ctx.setLineDash([]); // Шугамыг буцааж хэвийн болгох

            // Дээд тал: XAU/USD
            renderSingleSide(dataXAU, 0, midY, t["chart-gold-title"] || "GOLD / USD (FOREX REAL-TIME FUTURES)", "#94a3b8", true);
            
            // Доод тал: PAXG/USDT
            renderSingleSide(dataPAXG, midY, canvas.height, t["chart-paxg-title"] || "PAXG / USDT (CRYPTO GOLD 24/7 LIQUIDITY)", "#fbbf24", false);

            // Баруун дээд талын усан тэмдэг текстүүд
            ctx.fillStyle = 'rgba(34, 197, 94, 1.0)'; // Опаситиг 1.0 болгож тодруулав
            ctx.font = '900 12px Inter'; 
            ctx.textAlign = 'right';
            ctx.fillText(t["crypto-open"] || "• CRYPTO TRADING OPEN", canvas.width - 25, midY + 30);

            const countdown = getGoldMarketCountdown();
            if (countdown) {
                ctx.fillStyle = 'rgba(239, 68, 68, 1.0)'; // Улаан өнгийг тодруулав
                ctx.font = '900 12px Inter';
                ctx.fillText(`${t["forex-closed"] || "• FOREX CLOSED | OPEN IN:"} ${countdown}`, canvas.width - 25, 30);
            } else {
                ctx.fillStyle = 'rgba(34, 197, 94, 1.0)'; // Ногоон өнгийг тодруулав
                ctx.font = '900 12px Inter';
                ctx.fillText(t["forex-open"] || "• FOREX TRADING OPEN", canvas.width - 25, 30);
            }
            ctx.textAlign = 'left';
        }

        // Language change listener - Redraw chart on language change
        const originalChangeLang = window.changeLang;
        window.changeLang = function(lang) {
            if (originalChangeLang) originalChangeLang(lang);
            drawDualChart();
        };

        function renderSingleSide(candlesArray, startY, endY, title, titleColor, isTop) {
            if (candlesArray.length === 0) return;

            const paddingRight = 65;
            const paddingTop = 45;
            const paddingBottom = 25;
            const viewWidth = canvas.width - paddingRight;
            const viewHeight = (endY - startY) - paddingTop - paddingBottom;

            let highs = candlesArray.map(c => c.high);
            let lows = candlesArray.map(c => c.low);
            let minPrice = Math.min(...lows);
            let maxPrice = Math.max(...highs);
            let priceRange = maxPrice - minPrice || 1;

            // Хөгжүүлэгчийн цэвэрхэн Гарчиг
            ctx.fillStyle = titleColor;
            ctx.font = '800 11px Inter';
            ctx.fillText(title, 20, startY + 28);

            // Цэгтэй Төгс Сүлжээ шугам (Bloomberg Dotted Grid)
            ctx.strokeStyle = 'rgba(30, 41, 59, 0.3)';
            ctx.lineWidth = 1;
            ctx.setLineDash([2, 4]); // Цэгтэй шугам үүсгэх
            
            for (let i = 0; i <= 4; i++) {
                let y = startY + paddingTop + (viewHeight / 4) * i;
                let price = maxPrice - (priceRange / 4) * i;
                
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(viewWidth, y);
                ctx.stroke();

                ctx.setLineDash([]); // Текстэнд зураас нөлөөлөхгүй
                ctx.fillStyle = '#64748b';
                ctx.font = 'bold 9px JetBrains Mono';
                ctx.fillText(price.toFixed(2), viewWidth + 10, y + 3);
                ctx.setLineDash([2, 4]);
            }
            ctx.setLineDash([]);

            const count = 65; // Сүүлийн 65 кандлыг илүү зайтай гоё харуулна
            const displayData = candlesArray.slice(-count);
            const spacing = viewWidth / count;
            const width = spacing * 0.70; // Лааны өргөнийг харьцааг тааруулав

            // X тэнхлэгийн Цагийн заалтыг маш цэвэрхэн зурах
            ctx.fillStyle = '#475569';
            ctx.font = '700 9px JetBrains Mono';
            const timeStep = Math.floor(count / 5);
            displayData.forEach((c, i) => {
                if (i % timeStep === 0) {
                    const x = (i * spacing) + spacing / 2;
                    const d = new Date(c.time);
                    const tz = timezoneEl.value === 'local' ? undefined : timezoneEl.value;
                    const timeStr = new Intl.DateTimeFormat('en-GB', {
                        hour: '2-digit', minute: '2-digit', hour12: false, timeZone: tz
                    }).format(d);

                    ctx.fillText(timeStr, x, startY + paddingTop + viewHeight + 15);
                }
            });

            // КАНДЛ ЗУРАХ ГОЁ ҮЙЛДЭЛ (Капсул ба Амьд гэрэлтүүлэг)
            displayData.forEach((c, idx) => {
                const x = (idx * spacing) + (spacing - width) / 2;
                
                const yOpen = startY + paddingTop + viewHeight - ((c.open - minPrice) / priceRange) * viewHeight;
                const yClose = startY + paddingTop + viewHeight - ((c.close - minPrice) / priceRange) * viewHeight;
                const yHigh = startY + paddingTop + viewHeight - ((c.high - minPrice) / priceRange) * viewHeight;
                const yLow = startY + paddingTop + viewHeight - ((c.low - minPrice) / priceRange) * viewHeight;

                const isBullish = c.close >= c.open;
                
                // Шинэ лааны соргог өнгөнүүд (Neon Green vs Electric Crimson)
                const mainColor = isBullish ? '#10b981' : '#f43f5e';
                const glowColor = isBullish ? 'rgba(16, 185, 129, 0.4)' : 'rgba(244, 63, 94, 0.4)';

                ctx.strokeStyle = mainColor;
                ctx.fillStyle = mainColor;
                ctx.lineWidth = 1.5;

                // 1. Сүүдэр зурах
                ctx.beginPath();
                ctx.moveTo(x + width / 2, yHigh);
                ctx.lineTo(x + width / 2, yLow);
                ctx.stroke();

                // 2. Бие зурах (Капсул маягийн бөөрөнхий ирмэг)
                const bHeight = Math.max(Math.abs(yOpen - yClose), 1.5);
                const yTop = Math.min(yOpen, yClose);

                // Хамгийн сүүлийн лаа буюу АМЬД гүйж байгаа лаанд Glow эффект өгөх
                if (idx === displayData.length - 1) {
                    ctx.save();
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = mainColor;
                    ctx.fillStyle = mainColor;
                    roundRect(ctx, x, yTop, width, bHeight, 2);
                    ctx.restore();
                } else {
                    // Энгийн кандлууд
                    roundRect(ctx, x, yTop, width, bHeight, 1.5);
                }
            });
        }

        // Бөөрөнхий лаа зурах ухаалаг Canvas функц
        function roundRect(ctx, x, y, width, height, radius) {
            if (width < radius * 2) radius = width / 2;
            if (height < radius * 2) radius = height / 2;
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            ctx.fill();
        }

        function updateLivePrice(elementId, price) {
            const el = document.getElementById(elementId);
            const old = parseFloat(el.innerText) || 0;
            el.innerText = price.toFixed(2);
            
            if(price > old) {
                el.className = "text-2xl font-extrabold cell-mono text-[#10b981] scale-105 transition-all duration-75";
            } else if(price < old) {
                el.className = "text-2xl font-extrabold cell-mono text-[#f43f5e] scale-105 transition-all duration-75";
            } else {
                el.className = "text-2xl font-extrabold cell-mono text-white transition-all duration-75";
            }
        }

        document.addEventListener('DOMContentLoaded', loadAllHistory);
    </script>
</body>
</html>
