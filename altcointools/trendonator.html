    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const marketEl = () => document.getElementById('market');
        const intervalEl = () => document.getElementById('interval');
        const coinEl = () => document.getElementById('coin');
        const rsiPeriodEl = () => document.getElementById('rsi-period');
        
    let intervalId;
    let trendChart = null;

    async function fetchKlines(market, symbol, interval, limit = 1000) {
        const endpoint = market === "futures" ? "https://fapi.binance.com/fapi/v1/klines" : "https://api.binance.com/api/v3/klines";
        const url = `${endpoint}?symbol=${symbol}&interval=${interval}&limit=${limit}`;
        const response = await fetch(url);
        if (!response.ok) throw new Error(`Failed to fetch klines for ${symbol}`);
        return await response.json();
    }

    function calculateTrueRSI(closes, period) {
        const rsi = [];
        if (closes.length <= period) return rsi;
        let gains = 0, losses = 0;
        for (let i = 1; i <= period; i++) {
            const change = closes[i] - closes[i - 1];
            if (change >= 0) gains += change; else losses -= change;
        }
        let avgGain = gains / period; let avgLoss = losses / period;
        rsi.push(100 - 100 / (1 + (avgLoss === 0 ? 100 : avgGain / avgLoss)));
        for (let i = period + 1; i < closes.length; i++) {
            const change = closes[i] - closes[i - 1];
            avgGain = (avgGain * (period - 1) + (change > 0 ? change : 0)) / period;
            avgLoss = (avgLoss * (period - 1) + (change < 0 ? -change : 0)) / period;
            rsi.push(100 - 100 / (1 + (avgLoss === 0 ? 100 : avgGain / avgLoss)));
        }
        return rsi;
    }

    async function updateTrendMetr() {
        const market = marketEl()?.value || 'spot';
        const symbol = coinEl()?.value.trim().toUpperCase() || 'BTCUSDT';
        const period = parseInt(rsiPeriodEl()?.value) || 14;
        const interval = intervalEl()?.value || '15m';

        try {
            const klines = await fetchKlines(market, symbol, interval, period + 500);
            const closes = klines.map(k => parseFloat(k[4]));
            const rsi = calculateTrueRSI(closes, period);

            let longTriggerLL_30 = null, shortTriggerHH_70 = null;
            const rsiOffset = period;

            for (let i = 2; i < rsi.length; i++) {
                const rsiBefore = rsi[i - 2], rsiPrev = rsi[i - 1], cIdx = i + rsiOffset;
                if (!klines[cIdx]) continue;
                if (rsiBefore < 30 && rsiPrev > 30) longTriggerLL_30 = Math.min(parseFloat(klines[cIdx-2][3]), parseFloat(klines[cIdx-1][3]), parseFloat(klines[cIdx][3]));
                if (rsiBefore > 70 && rsiPrev < 70) shortTriggerHH_70 = Math.max(parseFloat(klines[cIdx-2][2]), parseFloat(klines[cIdx-1][2]), parseFloat(klines[cIdx][2]));
            }

            const latestPrice = closes[closes.length - 1];
            const avgTrend = (longTriggerLL_30 && shortTriggerHH_70) ? (longTriggerLL_30 + shortTriggerHH_70) / 2 : null;
            let trendMetr = null;
            if (avgTrend) {
                if (latestPrice >= avgTrend) trendMetr = ((latestPrice - avgTrend) / (shortTriggerHH_70 - avgTrend)) * 100;
                else trendMetr = -((avgTrend - latestPrice) / (avgTrend - longTriggerLL_30)) * 100;
            }

            // Dashboard Update
            const valEl = document.getElementById('trendmetr-value');
            valEl.textContent = trendMetr !== null ? `${trendMetr.toFixed(2)}%` : '—';
            valEl.className = `text-6xl font-black mb-4 tracking-tighter ${trendMetr >= 0 ? 'text-green-400' : 'text-red-500'}`;
            
            const fill = document.getElementById('progress-bar-fill');
            fill.style.width = `${Math.max(0, Math.min(100, 50 + (trendMetr / 2)))}%`;
            fill.className = `h-full transition-all duration-1000 ${trendMetr >= 0 ? 'bg-green-500 shadow-[0_0_15px_rgba(34,197,94,0.5)]' : 'bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)]'}`;

            const statusEl = document.getElementById('trend-status');
            let s = "⚖️ Neutral";
            if (trendMetr >= 80) s = "🔥 Strong Uptrend"; else if (trendMetr >= 50) s = "📈 Moderate Uptrend"; else if (trendMetr > 0) s = "🔼 Weak Uptrend";
            else if (trendMetr <= -80) s = "❄️ Strong Downtrend"; else if (trendMetr <= -50) s = "📉 Moderate Downtrend"; else if (trendMetr < 0) s = "🔽 Weak Downtrend";
            statusEl.textContent = s;
            statusEl.style.color = trendMetr >= 0 ? '#4ade80' : '#f87171';

            document.getElementById('trend-extra').innerHTML = `
                <div class="flex justify-between border-b border-brand-border/50 pb-2"><span>Strength:</span><span class="text-white font-bold">${s}</span></div>
                <div class="flex justify-between border-b border-brand-border/50 pb-2"><span>Price:</span><span class="text-white font-mono">$${latestPrice.toLocaleString()}</span></div>
                <div class="flex justify-between"><span>S/R Range:</span><span class="text-brand-gold font-mono">${longTriggerLL_30?.toFixed(2)} - ${shortTriggerHH_70?.toFixed(2)}</span></div>
            `;
            updateChart(klines, longTriggerLL_30, shortTriggerHH_70);
        } catch (e) { console.error(e); }
    }

    function updateChart(klines, support, resistance) {
        const canvas = document.getElementById('trend-chart');
        if (!canvas) return;
        
        const ctx = canvas.getContext('2d');
        const priceData = klines.map(k => ({ x: k[0], y: parseFloat(k[4]) }));
        
        const annotations = {};
        if (support) annotations.s = { type: 'line', yMin: support, yMax: support, borderColor: '#10b981', borderWidth: 2, borderDash: [5, 5], label: { display: true, content: 'Support', position: 'start', backgroundColor: 'rgba(16, 185, 129, 0.8)', color: '#fff', font: { size: 10 } } };
        if (resistance) annotations.r = { type: 'line', yMin: resistance, yMax: resistance, borderColor: '#ef4444', borderWidth: 2, borderDash: [5, 5], label: { display: true, content: 'Resistance', position: 'start', backgroundColor: 'rgba(239, 68, 68, 0.8)', color: '#fff', font: { size: 10 } } };

        if (trendChart) {
            trendChart.data.datasets[0].data = priceData;
            trendChart.options.plugins.annotation.annotations = annotations;
            trendChart.update();
        } else {
            trendChart = new Chart(ctx, {
                type: 'line',
                data: { 
                    datasets: [{ 
                        label: 'Price', 
                        data: priceData, 
                        borderColor: 'rgba(255, 255, 255, 0.9)', 
                        borderWidth: 2, 
                        pointRadius: 0, 
                        fill: true,
                        backgroundColor: 'rgba(197, 160, 89, 0.05)'
                    }] 
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { display: false }, 
                        annotation: { annotations },
                        tooltip: { 
                            backgroundColor: 'rgba(5, 7, 10, 0.9)', 
                            titleFont: { size: 12 }, 
                            bodyFont: { size: 12 }, 
                            padding: 12, 
                            borderColor: '#1f242d', 
                            borderWidth: 1 
                        }
                    },
                    scales: {
                        x: { type: 'time', grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#4b5563', font: { size: 10 } } },
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#4b5563', font: { size: 10 } } }
                    }
                }
            });
        }
    }

    const triggerAutoUpdate = () => {
        clearInterval(intervalId);
        updateTrendMetr();
        intervalId = setInterval(updateTrendMetr, 15000);
    };

    const initAutoUpdate = () => {
        const m = marketEl();
        const i = intervalEl();
        const c = coinEl();
        const r = rsiPeriodEl();
        
        if (m && i && c && r) {
            m.addEventListener('change', triggerAutoUpdate);
            i.addEventListener('change', triggerAutoUpdate);
            r.addEventListener('change', triggerAutoUpdate);
            c.addEventListener('change', triggerAutoUpdate);
            c.addEventListener('keydown', (e) => { if (e.key === "Enter") triggerAutoUpdate(); });
            
            triggerAutoUpdate(); // Initial Load
        } else {
            setTimeout(initAutoUpdate, 100);
        }
    };

    initAutoUpdate();
    });
    </script>
