<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Bubbles - MGL Signal</title>

    <!-- SEO & Metadata -->
    <meta name="description" content="MGL Signal - Live Crypto Market Bubble Chart Visualization">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="/static/new/images/logogo1.png">

    <!-- Libraries -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 'dark': '#05070a', 'dark-blue': '#0f1217', 'gold': '#c5a059', 'border': '#1f242d' }
                    },
                    fontFamily: { 'inter': ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/main_style.css">

    <style>
        #bubble-chart { width: 100%; height: 100%; min-height: 550px; }
        #tooltip {
            position: absolute;
            opacity: 0;
            background: rgba(15, 18, 23, 0.95);
            border: 1px solid #1f242d;
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 50;
            font-size: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            transition: opacity 0.2s;
        }
        .bubble-node text {
            fill: white;
            text-anchor: middle;
            font-weight: bold;
            pointer-events: none;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-brand-dark text-white font-inter flex flex-col min-h-screen">

    <!-- Global Header -->
    <script src="/static/js/main_translate.js"></script>
    <script src="/static/js/header.js"></script>

    <!-- Main Content Area -->
    <main class="flex-grow pt-32 pb-12 px-4 md:px-6">
        <div class="max-w-7xl mx-auto flex flex-col gap-6">
            
            <!-- 1. Controls Component -->
            <div class="controls-container flex flex-wrap items-center gap-4 p-4 bg-brand-dark-blue border border-brand-border rounded-xl shadow-lg">
                <!-- Market -->
                <div class="control-item flex items-center space-x-2">
                    <label class="text-gray-500 font-bold uppercase text-[10px]">Market:</label>
                    <select id="market" class="bg-brand-dark border border-brand-border text-white rounded px-3 py-1.5 text-xs shadow-inner">
                        <option value="spot">Spot</option>
                        <option value="futures">Futures</option>
                    </select>
                </div>

                <!-- Timeframe -->
                <div class="control-item flex items-center space-x-2">
                    <label class="text-gray-500 font-bold uppercase text-[10px]">Time:</label>
                    <select id="interval" class="bg-brand-dark border border-brand-border text-white rounded px-3 py-1.5 text-xs shadow-inner">
                        <option value="1s">1s</option>
                        <option value="1m" selected>1m</option>
                        <option value="3m">3m</option>
                        <option value="5m">5m</option>
                        <option value="15m">15m</option>
                        <option value="30m">30m</option>
                        <option value="1h">1h</option>
                        <option value="2h">2h</option>
                        <option value="4h">4h</option>
                        <option value="6h">6h</option>
                        <option value="8h">8h</option>
                        <option value="12h">12h</option>
                        <option value="1d">1d</option>
                        <option value="3d">3d</option>
                        <option value="1w">1w</option>
                        <option value="1M">1M</option>
                    </select>
                </div>

                <!-- Ticker -->
                <div id="pair-container" class="control-item flex items-center space-x-2">
                    <label class="text-gray-500 font-bold uppercase text-[10px]">Pair:</label>
                    <input type="text" id="coin" value="BTCUSDT" list="coin-list" placeholder="Search..." class="bg-brand-dark border border-brand-border text-white rounded px-3 py-1.5 w-32 uppercase font-bold text-xs shadow-inner transition-colors" />
                    <datalist id="coin-list"></datalist>
                </div>
            </div>

            <!-- 2. Bubble Chart Container -->
            <div class="flex-grow bg-brand-dark-blue border border-brand-border rounded-xl shadow-2xl relative overflow-hidden p-4 min-h-[600px]">
                <div id="loading-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-brand-dark-blue/90 z-40">
                    <i class="fas fa-circle-notch fa-spin text-4xl text-brand-gold mb-4"></i>
                    <span class="text-sm text-gray-400 font-bold uppercase tracking-widest animate-pulse">Loading Market Data...</span>
                </div>
                
                <svg id="bubble-chart" class="w-full h-full"></svg>
                <div id="tooltip"></div>
            </div>
        </div>
    </main>

    <!-- Global Footer -->
    <script src="/static/js/footer.js"></script>

    <!-- Security/Lock Logic -->
    <script src="/static/js/lock.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loadingOverlay = document.getElementById('loading-overlay');
            const tooltip = document.getElementById('tooltip');
            const svg = d3.select("#bubble-chart");

            // Auto-update setup
            const initAutoUpdate = () => {
                const marketEl = document.getElementById('market');
                const intervalEl = document.getElementById('interval');
                
                if (marketEl && intervalEl) {
                    const update = () => runVisualization(marketEl.value, intervalEl.value);
                    marketEl.addEventListener('change', update);
                    intervalEl.addEventListener('change', update);
                    update(); // Initial load
                } else {
                    // Retry if controls aren't injected yet
                    setTimeout(initAutoUpdate, 100);
                }
            };

            initAutoUpdate();

            async function fetchBubbleData(marketType, interval) {
                const tickerUrl = marketType === 'futures' 
                    ? 'https://fapi.binance.com/fapi/v1/ticker/24hr' 
                    : 'https://api.binance.com/api/v3/ticker/24hr';
                const infoUrl = marketType === 'futures' 
                    ? 'https://fapi.binance.com/fapi/v1/exchangeInfo' 
                    : 'https://api.binance.com/api/v3/exchangeInfo';

                try {
                    const [tickerRes, infoRes] = await Promise.all([fetch(tickerUrl), fetch(infoUrl)]);
                    const tickerData = await tickerRes.json();
                    const infoData = await infoRes.json();
                    
                    const allowedSymbols = new Set();
                    if (infoData.symbols) {
                        infoData.symbols.forEach(s => {
                            if (s.status === 'TRADING' && s.quoteAsset === 'USDT') {
                                if (marketType === 'futures' && s.contractType === 'PERPETUAL') allowedSymbols.add(s.symbol);
                                else if (marketType !== 'futures' && !/[A-Z]+(UP|DOWN|BEAR|BULL)USDT/.test(s.symbol)) {
                                    allowedSymbols.add(s.symbol);
                                }
                            }
                        });
                    }
                    
                    return tickerData
                        .filter(d => allowedSymbols.has(d.symbol))
                        .map(d => ({
                            symbol: d.symbol.replace('USDT', ''),
                            change: parseFloat(d.priceChangePercent),
                            price: parseFloat(d.lastPrice),
                            volume: parseFloat(d.quoteVolume),
                            value: Math.abs(parseFloat(d.priceChangePercent)) || 0.1
                        }))
                        .sort((a, b) => b.volume - a.volume)
                        .slice(0, 100);
                } catch (e) {
                    console.error("Fetch Error:", e);
                    return [];
                }
            }

            async function runVisualization(marketType, interval) {
                if (!svg.node()) return;
                loadingOverlay.style.display = 'flex';
                svg.selectAll("*").remove();

                const data = await fetchBubbleData(marketType, interval);
                if (!data || data.length === 0) {
                    loadingOverlay.querySelector('span').textContent = "Failed to load market data";
                    loadingOverlay.querySelector('i').className = "fas fa-exclamation-triangle text-red-500 mb-4";
                    return;
                }
                loadingOverlay.style.display = 'none';

                const svgRect = svg.node().getBoundingClientRect();
                const width = svgRect.width || 800;
                const height = svgRect.height || 600;
                const minDim = Math.min(width, height);

                const color = d3.scaleLinear()
                    .domain([-5, 0, 5])
                    .range(["#ef4444", "#374151", "#10b981"])
                    .clamp(true);

                const maxRadius = minDim * 0.10;
                const minRadius = Math.max(minDim * 0.03, 10);

                const size = d3.scaleSqrt()
                    .domain([0, d3.max(data, d => d.value)])
                    .range([minRadius, maxRadius]); 

                const nodes = data.map(d => ({...d, r: size(d.value)}));

                const simulation = d3.forceSimulation(nodes)
                    .force("charge", d3.forceManyBody().strength(5))
                    .force("x", d3.forceX(width / 2).strength(0.05))
                    .force("y", d3.forceY(height / 2).strength(0.05))
                    .force("center", d3.forceCenter(width / 2, height / 2))
                    .force("collision", d3.forceCollide().radius(d => d.r + 2));

                const node = svg.append("g")
                    .selectAll("g")
                    .data(nodes)
                    .join("g")
                    .attr("class", "bubble-node")
                    .call(d3.drag()
                        .on("start", dragstarted)
                        .on("drag", dragged)
                        .on("end", dragended));

                node.append("circle")
                    .attr("r", d => d.r)
                    .attr("fill", d => color(d.change))
                    .attr("stroke", d => d3.rgb(color(d.change)).darker(0.7))
                    .attr("stroke-width", 2);

                node.append("text")
                    .attr("class", "symbol")
                    .attr("dy", "-0.4em")
                    .style("font-size", d => Math.min(d.r * 0.4, 16) + "px")
                    .text(d => d.symbol);

                node.append("text")
                    .attr("class", "percentage")
                    .attr("dy", "0.9em")
                    .style("font-size", d => Math.min(d.r * 0.3, 12) + "px")
                    .text(d => d.change.toFixed(2) + "%");

                node.on("mouseover", (event, d) => {
                    tooltip.style.opacity = 1;
                    tooltip.innerHTML = `
                        <div class="font-bold text-brand-gold mb-1">${d.symbol}</div>
                        <div>Price: $${d.price}</div>
                        <div class="${d.change >= 0 ? 'text-green-400' : 'text-red-400'}">Change: ${d.change.toFixed(2)}%</div>
                        <div class="text-xs text-gray-400 mt-1">Vol: $${(d.volume / 1000000).toFixed(2)}M</div>
                    `;
                })
                .on("mousemove", (event) => {
                    tooltip.style.left = (event.pageX + 10) + "px";
                    tooltip.style.top = (event.pageY + 10) + "px";
                })
                .on("mouseout", () => tooltip.style.opacity = 0);

                simulation.on("tick", () => {
                    node.attr("transform", d => {
                        d.x = Math.max(d.r, Math.min(width - d.r, d.x));
                        d.y = Math.max(d.r, Math.min(height - d.r, d.y));
                        return `translate(${d.x},${d.y})`;
                    });
                });

                window.addEventListener('resize', () => {
                    const newRect = svg.node().getBoundingClientRect();
                    simulation.force("x", d3.forceX(newRect.width / 2).strength(0.05));
                    simulation.force("y", d3.forceY(newRect.height / 2).strength(0.05));
                    simulation.force("center", d3.forceCenter(newRect.width / 2, newRect.height / 2));
                    simulation.alpha(0.3).restart();
                });

                function dragstarted(event, d) {
                    if (!event.active) simulation.alphaTarget(0.3).restart();
                    d.fx = d.x;
                    d.fy = d.y;
                }
                function dragged(event, d) {
                    d.fx = event.x;
                    d.fy = event.y;
                }
                function dragended(event, d) {
                    if (!event.active) simulation.alphaTarget(0);
                    d.fx = null;
                    d.fy = null;
                }
            }
        });
    </script>
</body>
</html>
